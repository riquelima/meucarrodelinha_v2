    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Pulse Animation for User Location */
        .user-location-marker {
            position: relative;
        }

        .user-location-dot {
            width: 12px;
            height: 12px;
            background-color: #4285F4;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .user-location-pulse {
            width: 40px;
            height: 40px;
            background-color: rgba(66, 133, 244, 0.4);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 2s infinite;
            z-index: 1;
        }

        @keyframes pulse-ring {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Page Transition */
        main {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Click Animation */
        .active-scale:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Stagger Delays */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .delay-400 {
            animation-delay: 400ms;
        }

        .delay-500 {
            animation-delay: 500ms;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Interactive Leaflet Map
            const map = L.map('motorista-map', {
                zoomControl: false,
                attributionControl: false,
                touchZoom: true,
                zoomAnimation: true
            }).setView([-12.8711, -38.7614], 14);

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            // Geolocation Logic
            const defaultLocation = [-12.8711, -38.7614];
            let userMarker = null;
            let isFirstLocationUpdate = true;

            // Custom Pulse Icon
            const pulseIcon = L.divIcon({
                className: 'user-location-marker',
                html: '<div class="user-location-pulse"></div><div class="user-location-dot"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            function updateUserMarker(lat, lng) {
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    userMarker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map)
                        .bindPopup('Você está aqui');
                }

                if (isFirstLocationUpdate) {
                    map.setView([lat, lng], 16);
                    isFirstLocationUpdate = false;
                }
            }

            function handleLocationError(error) {
                console.warn('Geolocation error:', error);
                if (!userMarker) {
                    userMarker = L.marker(defaultLocation, { icon: pulseIcon }).addTo(map)
                        .bindPopup('Localização indisponível (Padrão: Salinas)');
                    map.setView(defaultLocation, 14);
                }
            }

            const geoOptions = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            // Start watching position
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        updateUserMarker(position.coords.latitude, position.coords.longitude);
                    },
                    handleLocationError,
                    geoOptions
                );
            } else {
                console.error('Geolocation is not supported by this browser.');
                updateUserMarker(defaultLocation[0], defaultLocation[1]);
            }

            // Toggle Online/Offline Logic
            const toggleBtn = document.getElementById('toggle-online-btn');
            const toggleIcon = document.getElementById('toggle-icon');
            const toggleText = document.getElementById('toggle-text');
            const statusText = document.getElementById('status-text');
            const notificationContainer = document.getElementById('notification-container');
            const notificationBox = document.getElementById('notification-box');
            const notificationIcon = document.getElementById('notification-icon');
            const notificationText = document.getElementById('notification-text');
            let isOnline = false;

            function showNotification(message, isOnlineStatus) {
                notificationText.textContent = message;
                if (isOnlineStatus) {
                    notificationBox.classList.remove('bg-slate-700');
                    notificationBox.classList.add('bg-green-500');
                    notificationIcon.textContent = 'check_circle';
                } else {
                    notificationBox.classList.remove('bg-green-500');
                    notificationBox.classList.add('bg-slate-700');
                    notificationIcon.textContent = 'power_settings_new';
                }

                notificationContainer.classList.remove('-translate-y-full');
                setTimeout(() => {
                    notificationContainer.classList.add('-translate-y-full');
                }, 3000); // Hide after 3 seconds
            }

            toggleBtn.addEventListener('click', () => {
                isOnline = !isOnline;

                if (isOnline) {
                    // Go Online State
                    toggleBtn.classList.remove('bg-primary', 'shadow-primary/20', 'text-white');
                    toggleBtn.classList.add('bg-slate-700', 'text-slate-300', 'shadow-none');
                    toggleText.textContent = 'Ficar Offline';
                    statusText.textContent = 'Você está online e visível para passageiros';
                    statusText.classList.add('text-green-500');
                    statusText.classList.remove('text-slate-500');

                    showNotification('Você está online', true);

                } else {
                    // Go Offline State
                    toggleBtn.classList.add('bg-primary', 'shadow-primary/20', 'text-white');
                    toggleBtn.classList.remove('bg-slate-700', 'text-slate-300', 'shadow-none');
                    toggleText.textContent = 'Ficar Online';
                    statusText.textContent = 'Você está offline no momento';
                    statusText.classList.remove('text-green-500');
                    statusText.classList.add('text-slate-500');

                    showNotification('Você está offline', false);
                }
            });
        });
    </script>
