<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Home</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <!-- Google Maps SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8&libraries=places,marker&callback=initMap&loading=async" async defer></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "success": "#10b981",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                        "accent-blue": "#272e45"
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* [AESTHETICS]: Floating Deep Sea Navbar Standard */
        /* [AESTHETICS]: Navbar items are now handled by global CSS */
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-active {
            color: #FF9100 !important;
        }

        .nav-active span:first-child {
            transform: translateY(-4px) scale(1.1);
            color: #FF9100;
        }

        /* Indicador Ativo */
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: 10px;
            width: 4px;
            height: 4px;
            background: #FF9100;
            border-radius: 50%;
            box-shadow: 0 0 10px #FF9100;
        }

        .view-section {
            padding-bottom: 120px !important;
        }

        /* Pulse Animation for User Location */
        .user-location-marker { position: relative; }
        .user-location-dot {
            width: 12px; height: 12px;
            background-color: #4285F4; border-radius: 50%;
            border: 2px solid white; box-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2;
        }
        .user-location-pulse {
            width: 40px; height: 40px;
            background-color: rgba(66, 133, 244, 0.4); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: pulse-ring 2s infinite; z-index: 1;
        }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display overflow-hidden">
    <!-- [SPA_HORIZONTAL_MANDATE]: Contêiner Raiz -->
    <div id="app-root" class="relative flex h-[100vh] h-[100dvh] w-full flex-col overflow-hidden">
        
        <!-- Header Universal -->
        <header class="absolute top-0 left-0 right-0 z-[100] flex items-center justify-between p-4 bg-gradient-to-b from-background-dark/90 to-transparent">
            <div class="flex items-center gap-3">
                <div class="size-10 rounded-full border-2 border-primary overflow-hidden bg-surface-dark shadow-xl">
                    <img id="header-avatar" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Motorista&background=random" />
                </div>
                <div>
                    <h1 class="text-sm font-bold text-slate-100">Olá, <span id="header-username">Motorista</span></h1>
                    <div class="flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px] text-yellow-400">star</span>
                        <span id="header-rating" class="text-xs text-slate-300 font-bold">5.0</span>
                    </div>
                </div>
            </div>
            <button class="size-10 flex items-center justify-center rounded-full bg-surface-dark/90 text-slate-100 shadow-xl backdrop-blur-md active-scale">
                <span class="material-symbols-outlined">notifications</span>
            </button>
        </header>

        <!-- [SPA_HORIZONTAL_MANDATE]: Slider de Views -->
        <div id="view-slider" class="flex h-full w-[500vw] transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] will-change-transform">
            
            <!-- ABA 1: INÍCIO (MAPA) -->
            <section id="view-home" class="view-section shrink-0 w-[100vw] h-full relative overflow-hidden flex flex-col">
                <main class="relative flex-1 w-full bg-surface-dark overflow-hidden">
                    <div id="motorista-map" class="absolute inset-0 z-0 h-full w-full"></div>
                    
                    <!-- Floating Online Controls -->
                    <div class="absolute bottom-[96px] left-0 right-0 z-30 px-8 animate-slide-up">
                        <div class="p-2.5 bg-background-dark/95 backdrop-blur-2xl border border-white/10 rounded-full shadow-2xl flex items-center gap-4">
                            <button id="toggle-online-btn" class="group relative flex flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 bg-primary text-white text-xs font-black transition-all shadow-lg shadow-primary/20 active-scale">
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-lg" id="toggle-icon">power_settings_new</span>
                                    <span class="uppercase tracking-tighter" id="toggle-text">Ficar Online</span>
                                </div>
                            </button>
                            <div class="pr-4 shrink-0">
                                <p id="status-text" class="text-[9px] text-slate-500 font-black uppercase tracking-tighter leading-none mb-0.5">Status</p>
                                <p id="status-label" class="text-[10px] text-slate-400 font-bold uppercase tracking-tight leading-none">Offline</p>
                            </div>
                        </div>
                    </div>
                </main>
            </section>

            <!-- ABA 2: GANHOS -->
            <section id="view-earnings" class="view-section shrink-0 w-[100vw] h-full relative bg-background-light dark:bg-background-dark flex flex-col pt-20">
                <div class="px-6 py-4 overflow-y-auto no-scrollbar">
                    <h2 class="text-3xl font-black mb-8 tracking-tighter">Seus Ganhos</h2>
                    <div class="p-8 bg-white dark:bg-slate-800 rounded-[2.5rem] text-center border border-white/5 shadow-xl mb-6">
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Total de Hoje</p>
                        <h3 class="text-4xl font-black text-primary">R$ 0,00</h3>
                    </div>
                    <div id="earnings-container" class="space-y-4">
                        <div class="p-6 text-center opacity-40">
                            <span class="material-symbols-outlined text-4xl mb-2">payments</span>
                            <p class="font-bold">Nenhum ganho registrado hoje</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ABA 3: CHAT -->
            <section id="view-chats" class="view-section shrink-0 w-[100vw] h-full relative bg-background-light dark:bg-background-dark flex flex-col pt-20">
                <div class="px-6 py-4 overflow-y-auto no-scrollbar">
                    <h2 class="text-3xl font-black mb-8 tracking-tighter">Mensagens</h2>
                    <div id="chats-list-container" class="space-y-4">
                        <div class="p-6 text-center opacity-40">
                            <span class="material-symbols-outlined text-4xl mb-2">forum</span>
                            <p class="font-bold">Suas conversas aparecerão aqui</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ABA 4: HISTÓRICO -->
            <section id="view-history" class="view-section shrink-0 w-[100vw] h-full relative bg-background-light dark:bg-background-dark flex flex-col pt-20">
                <div class="px-6 py-4 overflow-y-auto no-scrollbar">
                    <h2 class="text-3xl font-black mb-8 tracking-tighter">Histórico</h2>
                    <div id="history-container" class="space-y-4">
                        <div class="p-6 text-center opacity-40">
                            <span class="material-symbols-outlined text-4xl mb-2">history</span>
                            <p class="font-bold">Nenhuma corrida concluída ainda</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ABA 5: PERFIL -->
            <section id="view-profile" class="view-section shrink-0 w-[100vw] h-full relative bg-background-light dark:bg-background-dark flex flex-col pt-20">
                <div class="px-6 py-4 overflow-y-auto no-scrollbar">
                    <div class="p-6 bg-white dark:bg-slate-800 rounded-[2.5rem] border border-white/5 shadow-xl mb-8">
                        <div class="flex items-center gap-4">
                            <div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary border-4 border-primary/20">
                                <span class="material-symbols-outlined text-4xl">account_circle</span>
                            </div>
                            <div>
                                <h3 id="profile-name" class="text-xl font-black tracking-tight">Motorista Parceiro</h3>
                                <p class="text-sm font-bold text-slate-500 uppercase">Perfil Ativo</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <button class="w-full flex items-center justify-between p-6 bg-white dark:bg-slate-800 rounded-3xl active-scale border border-white/5">
                            <div class="flex items-center gap-4">
                                <span class="material-symbols-outlined text-primary">directions_car</span>
                                <span class="font-black text-slate-700 dark:text-slate-200 uppercase tracking-widest text-xs">Dados do Veículo</span>
                            </div>
                            <span class="material-symbols-outlined text-slate-400">chevron_right</span>
                        </button>
                        <button onclick="handleLogout()" class="w-full flex items-center justify-between p-6 bg-red-500/10 text-red-500 rounded-3xl active-scale border border-red-500/20">
                            <div class="flex items-center gap-4">
                                <span class="material-symbols-outlined">logout</span>
                                <span class="font-black uppercase tracking-widest text-xs">Sair da Conta</span>
                            </div>
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <!-- [BOTTOM_NAVBAR_PERSISTENCE] -->
        <nav class="fixed-navbar !z-[200]" id="main-nav">
            <button onclick="switchTab('home')" class="nav-item nav-active" id="nav-home">
                <span class="material-symbols-outlined">home</span>
                <span>Início</span>
            </button>
            <button onclick="switchTab('earnings')" class="nav-item" id="nav-earnings">
                <span class="material-symbols-outlined">payments</span>
                <span>Ganhos</span>
            </button>
            <button onclick="switchTab('chats')" class="nav-item" id="nav-chats">
                <span class="material-symbols-outlined">chat</span>
                <span>Chat</span>
                <span id="chat-badge" class="chat-badge hidden">0</span>
            </button>
            <button onclick="switchTab('history')" class="nav-item" id="nav-history">
                <span class="material-symbols-outlined">history</span>
                <span>Histórico</span>
            </button>
            <button onclick="switchTab('profile')" class="nav-item" id="nav-profile">
                <span class="material-symbols-outlined">account_circle</span>
                <span>Perfil</span>
            </button>
        </nav>

        <!-- SPA Navigation Logic -->
        <script>
            function switchTab(tabName) {
                const slider = document.getElementById('view-slider');
                const tabs = ['home', 'earnings', 'chats', 'history', 'profile'];
                const index = tabs.indexOf(tabName);
                
                if (index === -1) return;

                // Hardware Accelerated Navigation
                slider.style.transform = `translate3d(${-index * 100}vw, 0, 0)`;

                // Update UI State
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.remove('nav-active');
                    if (btn.id === `nav-${tabName}`) btn.classList.add('nav-active');
                });

                // Optimization: Hide non-neighbor sections
                document.querySelectorAll('.view-section').forEach((sec, i) => {
                    sec.style.visibility = (Math.abs(i - index) <= 1) ? 'visible' : 'hidden';
                });
            }
        </script>
    </div>
    <script src="js/location-modal.js"></script>
    <script>
        let googleMap;
        let userMarker;
        let isFirstLocationUpdate = true;

        window.initMap = function () {
            const mapContainer = document.getElementById('motorista-map');
            if (mapContainer) {
                googleMap = new google.maps.Map(mapContainer, {
                    center: { lat: -12.8711, lng: -38.7614 },
                    zoom: 14,
                    disableDefaultUI: true,
                    styles: [
                        { "elementType": "geometry", "stylers": [{ "color": "#242f3e" }] },
                        { "elementType": "labels.text.stroke", "stylers": [{ "color": "#242f3e" }] },
                        { "elementType": "labels.text.fill", "stylers": [{ "color": "#746855" }] },
                        { "featureType": "administrative.locality", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                        { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                        { "featureType": "poi.park", "elementType": "geometry", "stylers": [{ "color": "#263c3f" }] },
                        { "featureType": "poi.park", "elementType": "labels.text.fill", "stylers": [{ "color": "#6b9a76" }] },
                        { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#38414e" }] },
                        { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#212a37" }] },
                        { "featureType": "road", "elementType": "labels.text.fill", "stylers": [{ "color": "#9ca5b1" }] },
                        { "featureType": "road.highway", "elementType": "geometry", "stylers": [{ "color": "#746855" }] },
                        { "featureType": "road.highway", "elementType": "geometry.stroke", "stylers": [{ "color": "#1f2835" }] },
                        { "featureType": "road.highway", "elementType": "labels.text.fill", "stylers": [{ "color": "#f3d19c" }] },
                        { "featureType": "transit", "elementType": "geometry", "stylers": [{ "color": "#2f3948" }] },
                        { "featureType": "transit.station", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                        { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#17263c" }] },
                        { "featureType": "water", "elementType": "labels.text.fill", "stylers": [{ "color": "#515c6d" }] },
                        { "featureType": "water", "elementType": "labels.text.stroke", "stylers": [{ "color": "#17263c" }] }
                    ]
                });

                // Geolocation Logic
                const defaultLocation = { lat: -12.8711, lng: -38.7614 };

                function updateUserMarker(lat, lng) {
                    const pos = { lat, lng };
                    if (userMarker) {
                        userMarker.setPosition(pos);
                    } else {
                        userMarker = new google.maps.Marker({
                            position: pos,
                            map: googleMap,
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 7,
                                fillColor: "#4285F4",
                                fillOpacity: 1,
                                strokeColor: "#ffffff",
                                strokeWeight: 2,
                            },
                        });
                    }

                    if (isFirstLocationUpdate) {
                        googleMap.setCenter(pos);
                        googleMap.setZoom(16);
                        isFirstLocationUpdate = false;
                    }
                }

                function handleLocationError(error) {
                    console.warn('Geolocation error:', error);
                    if (!userMarker) {
                        updateUserMarker(defaultLocation.lat, defaultLocation.lng);
                    }
                }

                const geoOptions = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };

                // Start watching position
                if (window.requestLocationPermission) {
                    window.requestLocationPermission().then(() => {
                        navigator.geolocation.watchPosition(
                            (position) => {
                                updateUserMarker(position.coords.latitude, position.coords.longitude);
                            },
                            handleLocationError,
                            geoOptions
                        );
                    }).catch(error => {
                        console.log("Location permission dismissed:", error);
                        updateUserMarker(defaultLocation.lat, defaultLocation.lng);
                    });
                } else if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(
                        (position) => {
                            updateUserMarker(position.coords.latitude, position.coords.longitude);
                        },
                        handleLocationError,
                        geoOptions
                    );
                } else {
                    updateUserMarker(defaultLocation.lat, defaultLocation.lng);
                }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/motorista-dashboard.js"></script>
    <!-- PWA Logic moved to unified sw.js -->
    <!-- Note: loadDriverData and rating updates should be handled in motorista-dashboard.js -->
</body>

</html>
