    <style>
        @keyframes scale-pulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-logo-entrance {
            animation: scale-pulse 2s ease-out forwards;
        }

        @keyframes fill-loading {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .animate-loading-bar {
            width: 0%;
            animation: fill-loading 2s linear forwards;
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        @keyframes popIn3D {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(20px) rotateX(20deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.05) translateY(-5px) rotateX(0deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .font-3d-orange {
            font-family: 'Titan One', cursive;
            color: #FF9100;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: visible;
            line-height: 1.2;
            padding-bottom: 5px;
            letter-spacing: 1px;
        }

        .animate-pop-in-3d {
            animation: popIn3D 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            animation-delay: 0.2s;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Stagger Delays */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .delay-400 {
            animation-delay: 400ms;
        }

        .delay-500 {
            animation-delay: 500ms;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/data-cache.js"></script>
    <script src="js/swipe-back.js"></script>
    <script>
        // Força atualização do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(reg => reg.update());
            });
        }
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                        registration.addEventListener('updatefound', () => {
                            const newSW = registration.installing;
                            if (newSW) newSW.addEventListener('statechange', () => {
                                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                    newSW.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                }
                            });
                        });
                        setTimeout(preloadAssets, 500);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        async function preloadAssets() {
            console.log('[Preload] Starting preloading...');
            try {
                const cache = window.DataCache;

                const [drivers, ads, posts] = await Promise.all([
                    supabaseClient.from('motoristas')
                        .select('modelo_veiculo,avaliacao_media,status_online,usuarios(nome,foto_perfil_url)')
                        .order('status_online', { ascending: false })
                        .order('avaliacao_media', { ascending: false })
                        .limit(10),
                    supabaseClient.from('anuncios')
                        .select('*')
                        .eq('ativo', true)
                        .order('criado_em', { ascending: false }),
                    supabaseClient.from('postagens')
                        .select('*')
                        .eq('publicado', true)
                        .order('criado_em', { ascending: false })
                        .limit(3)
                ]);

                if (drivers?.data) {
                    cache.set(cache.KEYS.KEY_DRIVERS, drivers.data, 5 * 60 * 1000);
                    drivers.data.forEach(d => {
                        if (d.usuarios?.foto_perfil_url) preloadImage(d.usuarios.foto_perfil_url);
                    });
                }

                if (ads?.data) {
                    cache.set(cache.KEYS.KEY_ADS, ads.data, 10 * 60 * 1000);
                    ads.data.forEach(ad => {
                        if (ad.imagem_url) preloadImage(ad.imagem_url);
                    });
                }

                if (posts?.data) {
                    cache.set(cache.KEYS.KEY_BLOG, posts.data, 10 * 60 * 1000);
                    posts.data.forEach(p => {
                        if (p.imagem_capa_url) preloadImage(p.imagem_capa_url);
                    });
                }

                console.log('[Preload] Dados cacheados com sucesso');
            } catch (e) {
                console.warn('[Preload] Error preloading:', e);
            }
        }

        function preloadImage(url) {
            const img = new Image();
            img.src = url;
        }
    </script>
    <script>
        function playStartupChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;

                const notes = [523.25, 659.25];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, now + i * 0.15);
                    gain.gain.linearRampToValueAtTime(0.08, now + i * 0.15 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.6);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.15);
                    osc.stop(now + i * 0.15 + 0.6);
                });
            } catch (e) { /* fallback silencioso */ }
        }

        // Auto-redirect after splash - verifica sessão primeiro
        setTimeout(async () => {
            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session?.user) {
                    const { data: profile } = await window.supabaseClient
                        .from('usuarios')
                        .select('tipo_usuario')
                        .eq('id', session.user.id)
                        .single();
                    const role = profile?.tipo_usuario || 'passageiro';
                    let destino = role === 'motorista' ? 'motorista.html' :
                                  role === 'admin' ? 'admin.html' :
                                  'passageiro.html';
                    window.location.replace(destino);
                    return;
                }
            } catch (e) {
                console.warn('[Splash] Erro ao verificar sessão:', e);
            }
            playStartupChime();
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.replace('homepage.html');
            }, 300);
        }, 2000);
    </script>
    <script src="js/pwa-register.js"></script>
