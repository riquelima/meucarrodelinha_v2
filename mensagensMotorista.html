<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Conversas Motorista</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="page-container">
        <!-- Header -->
        <header
            class="flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 shadow-sm z-20 shrink-0 border-b border-white/10 sticky top-0">
            <a href="motorista.html" class="text-white p-2 -ml-2 rounded-full hover:bg-white/20 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-lg font-bold text-white">Mensagens</h1>
            <div class="w-10"></div>
        </header>

        <main id="conversations-list" class="page-content px-4 pt-6 no-scrollbar">
            <div class="p-8 text-center text-slate-500 animate-pulse">Carregando conversas...</div>
        </main>

        <!-- Bottom Navigation Bar (Fixed) -->
        <nav class="fixed-navbar" id="main-nav">
            <a href="motorista.html" id="nav-home">
                <span class="material-symbols-outlined">home</span>
                <span>Início</span>
            </a>
            <a href="meusganhos.html" id="nav-earnings">
                <span class="material-symbols-outlined">payments</span>
                <span>Ganhos</span>
            </a>
            <a class="nav-active" href="mensagensMotorista.html" id="nav-chats">
                <span class="material-symbols-outlined">chat</span>
                <span>Chat</span>
                <span id="chat-badge" class="chat-badge hidden absolute top-0 right-4 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-background-dark">0</span>
            </a>
            <a href="historicoViagens.html" id="nav-history">
                <span class="material-symbols-outlined">history</span>
                <span>Histórico</span>
            </a>
            <a href="perfilMotorista.html" id="nav-profile">
                <span class="material-symbols-outlined">account_circle</span>
                <span>Perfil</span>
            </a>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
    <script src="js/conversas-motorista.js"></script>
    <script src="js/pwa-register.js"></script>
</body>

</html>
