<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Fale Conosco - Atendimento Motorista</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1949e6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }
        
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }

        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(25, 73, 230, 0.2);
            border-radius: 10px;
        }
        /* Page Transitions */
        .page-enter {
            animation: fade-in 0.3s ease-out forwards;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased overflow-hidden page-enter">
    <!-- Header -->
    <header
        class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-primary/20 shrink-0">
        <div class="flex items-center justify-between px-4 h-16 max-w-md mx-auto">
            <a href="motorista.html"
                class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios_new</span>
            </a>
            <h1 class="text-lg font-bold tracking-tight">Fale Conosco</h1>
            <div class="size-10"></div> <!-- Spacer for centering -->
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto px-4 py-6 overflow-y-auto pb-24">
        <!-- Title Section -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold mb-2">Como podemos ajudar?</h2>
            <p class="text-slate-500 dark:text-slate-400">Preencha o formulário abaixo ou utilize nossos canais diretos.
            </p>
        </div>
        <!-- Form Section -->
        <form class="space-y-5">
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium px-1" for="name">Nome</label>
                <input
                    class="w-full h-14 rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/10 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    id="name" placeholder="Seu nome completo" type="text" />
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium px-1" for="email">E-mail</label>
                <input
                    class="w-full h-14 rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/10 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    id="email" placeholder="seuemail@exemplo.com" type="email" />
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium px-1" for="phone">Telefone</label>
                <input
                    class="w-full h-14 rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/10 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    id="phone" placeholder="(11) 99999-9999" type="tel" maxlength="15" />
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium px-1" for="subject">Assunto</label>
                <select
                    class="w-full h-14 rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/10 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none appearance-none"
                    id="subject">
                    <option disabled="" selected="" value="">Selecione um assunto</option>
                    <option value="duvida">Dúvidas sobre viagens</option>
                    <option value="reclamacao">Reclamações</option>
                    <option value="sugestao">Sugestões</option>
                    <option value="financeiro">Financeiro / Pagamentos</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium px-1" for="message">Mensagem</label>
                <textarea
                    class="w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/10 p-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none"
                    id="message" placeholder="Descreva como podemos te ajudar..." rows="5"></textarea>
            </div>
            <button
                class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-colors shadow-lg shadow-primary/20"
                type="submit">
                Enviar Mensagem
            </button>
        </form>
        <!-- Divider -->
        <div class="relative my-10">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200 dark:border-primary/20"></div>
            </div>
            <div class="relative flex justify-center text-sm uppercase">
                <span
                    class="bg-background-light dark:bg-background-dark px-4 text-slate-500 font-medium tracking-wider">Ou
                    fale agora</span>
            </div>
        </div>
        <!-- Quick Contact Buttons -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <a class="flex flex-col items-center justify-center p-4 rounded-xl bg-cyan-500/10 border border-cyan-500/30 hover:bg-cyan-500/20 transition-all group"
                href="#">
                <span
                    class="material-symbols-outlined text-cyan-500 text-3xl mb-2 group-hover:scale-110 transition-transform">chat</span>
                <span
                    class="text-sm font-bold text-cyan-600 dark:text-cyan-400 uppercase tracking-tight">WhatsApp</span>
            </a>
            <a class="flex flex-col items-center justify-center p-4 rounded-xl bg-primary/10 border border-primary/30 hover:bg-primary/20 transition-all group"
                href="#">
                <span
                    class="material-symbols-outlined text-primary text-3xl mb-2 group-hover:scale-110 transition-transform">mail</span>
                <span class="text-sm font-bold text-primary uppercase tracking-tight">E-mail</span>
            </a>
        </div>
    </main>

    <!-- Bottom Navigation Bar (Fixed) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#121520] border-t border-slate-800 py-3 z-50 pb-safe pb-4">
        <div class="flex justify-around items-end px-2">
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="motorista.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="meusganhos.html">
                <span class="material-symbols-outlined">payments</span>
                <span class="text-[10px] font-bold">Ganhos</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="conversasMotorista.html">
                <span class="material-symbols-outlined">chat</span>
                <span class="text-[10px] font-bold">Chat</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="historicoViagens.html">
                <span class="material-symbols-outlined">history</span>
                <span class="text-[10px] font-bold">Histórico</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="perfilMotorista.html">
                <span class="material-symbols-outlined">account_circle</span>
                <span class="text-[10px] font-bold">Perfil</span>
            </a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Phone mask handler
            const phoneInput = document.getElementById('phone');
            if (phoneInput) {
                phoneInput.addEventListener('input', function (e) {
                    let v = e.target.value.replace(/\D/g, "");
                    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
                    v = v.replace(/(\d)(\d{4})$/, "$1-$2");
                    e.target.value = v;
                });
            }
        });
    </script>
</body>

</html>
