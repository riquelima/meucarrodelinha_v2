<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Conexão - Meu Carro de Linha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#121520] text-slate-100 flex flex-col items-center justify-center h-screen px-6 text-center">
    <div class="mb-8 p-6 bg-slate-800/50 rounded-full border-4 border-slate-700 animate-pulse">
        <span class="material-symbols-outlined text-6xl text-slate-400">cloud_off</span>
    </div>

    <h1 class="text-3xl font-bold mb-4">Você está offline</h1>
    <p class="text-slate-400 mb-8 max-w-xs text-sm leading-relaxed">
        Não conseguimos conectar aos nossos serviços. Verifique sua conexão com a internet e tente novamente.
    </p>

    <button onclick="window.location.reload()"
        class="w-full max-w-xs bg-[#1e3fae] text-white py-4 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-xl">refresh</span>
        Tentar Novamente
    </button>

    <p class="mt-8 text-[10px] text-slate-500 uppercase tracking-widest">Meu Carro de Linha Salinas</p>
</body>

</html>
