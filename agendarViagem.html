    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
        }

        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }

        /* Page Transition */
        main {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Click Animation */
        .active-scale:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Stagger Delays */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .delay-400 {
            animation-delay: 400ms;
        }

        .delay-500 {
            animation-delay: 500ms;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Calendar Logic ---
            const calendarGrid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('current-month-display');
            const prevBtn = document.getElementById('prev-month');
            const nextBtn = document.getElementById('next-month');

            let currentDate = new Date(); // Start with today
            let selectedDate = new Date(); // Today is selected by default

            function renderCalendar(date) {
                calendarGrid.innerHTML = '';
                const year = date.getFullYear();
                const month = date.getMonth();

                // Update Header
                const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                monthDisplay.textContent = `${monthNames[month]} ${year}`;

                // First day of the month
                const firstDay = new Date(year, month, 1).getDay();
                // Days in month
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                // Padding days (empty cells before 1st)
                for (let i = 0; i < firstDay; i++) {
                    const emptyCell = document.createElement('div');
                    calendarGrid.appendChild(emptyCell);
                }

                // Days
                const today = new Date();

                for (let day = 1; day <= daysInMonth; day++) {
                    const dayBtn = document.createElement('button');
                    dayBtn.textContent = day;
                    dayBtn.className = 'h-10 w-full text-sm font-medium rounded-full transition-all flex items-center justify-center relative';

                    // Check if it's the selected date (visual selection)
                    const isSelected = selectedDate.getDate() === day &&
                        selectedDate.getMonth() === month &&
                        selectedDate.getFullYear() === year;

                    // Check if it's "Today" (current real date)
                    const isToday = today.getDate() === day &&
                        today.getMonth() === month &&
                        today.getFullYear() === year;

                    if (isSelected) {
                        dayBtn.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/30', 'font-bold');
                    } else if (isToday) {
                        // Today but not selected (if user selects another day)
                        dayBtn.classList.add('text-primary', 'border', 'border-primary/30', 'bg-primary/5');
                    } else {
                        dayBtn.classList.add('text-slate-700', 'dark:text-slate-300', 'hover:bg-slate-100', 'dark:hover:bg-slate-700');
                    }

                    // Click handler
                    dayBtn.addEventListener('click', () => {
                        selectedDate = new Date(year, month, day);
                        renderCalendar(currentDate); // Re-render to update selection style
                    });

                    calendarGrid.appendChild(dayBtn);
                }
            }

            prevBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar(currentDate);
            });

            nextBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar(currentDate);
            });

            renderCalendar(currentDate);

            // --- Time Picker Logic (Simple Scroll Mockup) ---
            const hoursScroll = document.getElementById('hours-scroll');
            const minutesScroll = document.getElementById('minutes-scroll');

            function populateTime(container, start, end, step = 1, format = true) {
                // Clear existing content except spacers (if any, but we will rebuild)
                // Actually, let's just clear and re-add spacers to be safe
                container.innerHTML = '<div class="h-10 flex-shrink-0"></div>'; // Top Spacer

                for (let i = start; i <= end; i += step) {
                    const div = document.createElement('div');
                    // Change height to h-10 (40px) to match indicator
                    div.className = 'h-10 flex items-center justify-center snap-center text-sm font-medium text-slate-500 dark:text-slate-400 select-none cursor-pointer hover:text-primary transition-colors flex-shrink-0';
                    div.textContent = format ? i.toString().padStart(2, '0') : i;

                    div.addEventListener('click', function () {
                        // Scroll to this element
                        // Container height 120. Center is 60. Item height 40. Center is 20.
                        // We want top of item to be at (60 - 20) = 40px from top of container.
                        // But spacer is 40px.
                        // If we scroll to 0, Item 0 is at 40px (Spacer pushes it).
                        // So Item N top position relative to container content is (N * 40) + 40.
                        // We want Item N to be at scroll position that places it in middle.
                        // Middle of view is 60px.
                        // Middle of Item is (N*40 + 40 + 20).
                        // ScrollTop = (N*40 + 40 + 20) - 60 = N*40.
                        // So simply N * 40.

                        // Or simply div.offsetTop - spacerHeight
                        // div.offsetTop includes spacer (40).
                        // So offsetTop - 40.

                        // Let's use the spacer approach logic:
                        // Top spacer is 40px.
                        // To center item at index 0: scrollTop = 0.
                        // Item 0 offsetTop is 40.
                        // So scrollTop = offsetTop - 40.

                        container.scrollTo({
                            top: div.offsetTop - 40,
                            behavior: 'smooth'
                        });

                        // Highlight logic
                        updateActiveItem(container);
                    });

                    container.appendChild(div);
                }

                // Bottom Spacer
                const bottomSpacer = document.createElement('div');
                bottomSpacer.className = 'h-10 flex-shrink-0';
                container.appendChild(bottomSpacer);
            }

            populateTime(hoursScroll, 0, 23);
            populateTime(minutesScroll, 0, 55, 5);

            // Highlight Logic
            function updateActiveItem(container) {
                // Find center
                const center = container.scrollTop + (container.offsetHeight / 2);
                const items = container.querySelectorAll('div.snap-center');

                items.forEach(item => {
                    const itemCenter = item.offsetTop + (item.offsetHeight / 2);
                    // Check if close to center (within half item height)
                    if (Math.abs(center - itemCenter) < 20) {
                        item.classList.add('text-primary', 'font-bold', 'scale-110');
                        item.classList.remove('text-slate-500', 'dark:text-slate-400');
                    } else {
                        item.classList.remove('text-primary', 'font-bold', 'scale-110');
                        item.classList.add('text-slate-500', 'dark:text-slate-400');
                    }
                });
            }

            // Set initial scroll position to roughly "Now" (e.g., 09:00)
            setTimeout(() => {
                // Scroll to 09:00 -> 9th item. 9 * 40 = 360.
                hoursScroll.scrollTop = 9 * 40;
                minutesScroll.scrollTop = 0;
                updateActiveItem(hoursScroll);
                updateActiveItem(minutesScroll);
            }, 100);

            // Listen for scroll end to update highlight
            let isScrolling;
            const onScroll = (e) => {
                window.clearTimeout(isScrolling);
                isScrolling = setTimeout(() => {
                        updateActiveItem(e.target);
                }, 50);
            };

            hoursScroll.addEventListener('scroll', onScroll);
            minutesScroll.addEventListener('scroll', onScroll);

            // --- Address Autocomplete Logic (Google Maps) ---
            let currentCoords = null;
            // Tenta obter localização para bias
            navigator.geolocation.getCurrentPosition(pos => {
                currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            }, err => console.warn('Geolocation bias disabled:', err));

            function setupAutocomplete(inputId, listId) {
                const input = document.getElementById(inputId);
                const list = document.getElementById(listId);
                if (!input || !list) return;

                // Espera o Google Maps carregar
                const initService = () => {
                    if (!window.google || !window.google.maps || !window.google.maps.places) {
                        setTimeout(initService, 200);
                        return;
                    }

                    const autocompleteService = new google.maps.places.AutocompleteService();
                    let debounceTimer = null;

                    function showLoading() {
                        list.innerHTML = '<li class="px-4 py-3 text-sm text-slate-400 dark:text-slate-500 flex items-center gap-2"><span class="material-symbols-outlined text-base animate-spin">sync</span>Buscando locais…</li>';
                        list.classList.remove('hidden');
                    }

                    function showResults(predictions) {
                        list.innerHTML = '';
                        if (!predictions || !predictions.length) {
                            list.innerHTML = '<li class="px-4 py-3 text-sm text-slate-400 italic font-medium">Nenhum endereço encontrado</li>';
                            list.classList.remove('hidden');
                            return;
                        }

                        predictions.forEach(prediction => {
                            const li = document.createElement('li');
                            li.className = 'flex items-start gap-3 px-4 py-3.5 cursor-pointer hover:bg-primary/5 active:bg-primary/10 text-sm text-slate-800 dark:text-slate-200 border-b last:border-0 border-slate-100 dark:border-slate-800/50 transition-all';

                            const iconContainer = document.createElement('div');
                            iconContainer.className = 'mt-0.5 size-7 rounded-full bg-primary/5 flex items-center justify-center shrink-0';
                            const icon = document.createElement('span');
                            icon.className = 'material-symbols-outlined text-primary text-lg';
                            icon.textContent = prediction.types.includes('establishment') ? 'location_on' : 'map';
                            iconContainer.appendChild(icon);

                            const textContainer = document.createElement('div');
                            textContainer.className = 'flex flex-col min-w-0';
                            
                            const mainText = document.createElement('span');
                            mainText.className = 'font-bold text-sm truncate';
                            mainText.textContent = prediction.structured_formatting.main_text;
                            
                            const secondaryText = document.createElement('span');
                            secondaryText.className = 'text-[11px] text-slate-500 dark:text-slate-400 truncate mt-0.5';
                            secondaryText.textContent = prediction.structured_formatting.secondary_text;

                            textContainer.appendChild(mainText);
                            textContainer.appendChild(secondaryText);

                            li.appendChild(iconContainer);
                            li.appendChild(textContainer);

                            li.addEventListener('mousedown', e => {
                                e.preventDefault();
                                input.value = prediction.description;
                                list.classList.add('hidden');
                            });

                            list.appendChild(li);
                        });
                        list.classList.remove('hidden');
                    }

                    async function fetchSuggestions(query) {
                        if (query.length < 3) { list.classList.add('hidden'); return; }
                        showLoading();

                        const request = {
                            input: query,
                            componentRestrictions: { country: 'br' },
                            types: ['geocode', 'establishment'],
                            language: 'pt-BR'
                        };

                        if (currentCoords) {
                            request.locationBias = { radius: 50000, center: currentCoords };
                        }

                        autocompleteService.getPlacePredictions(request, (predictions, status) => {
                            if (status !== google.maps.places.PlacesServiceStatus.OK && status !== google.maps.places.PlacesServiceStatus.ZERO_RESULTS) {
                                console.error('Erro Autocomplete Google:', status);
                                return;
                            }
                            showResults(predictions);
                        });
                    }

                    input.addEventListener('input', () => {
                        clearTimeout(debounceTimer);
                        const q = input.value.trim();
                        if (q.length < 3) { list.classList.add('hidden'); return; }
                        debounceTimer = setTimeout(() => fetchSuggestions(q), 400);
                    });

                    input.addEventListener('blur', () => setTimeout(() => list.classList.add('hidden'), 200));
                    input.addEventListener('focus', () => {
                        if (list.children.length && !list.querySelector('.animate-spin')) {
                            list.classList.remove('hidden');
                        }
                    });
                };

                initService();
            }

            setupAutocomplete('origin-input', 'origin-suggestions');
            setupAutocomplete('destination-input', 'destination-suggestions');

            // Fetch Drivers
            const driversContainer = document.getElementById('drivers-list-container');
            if (driversContainer && window.supabaseClient) {
                try {
                    supabaseClient.from('motoristas')
                        .select('*, usuarios(nome, foto_perfil_url)')
                        .eq('status_aprovacao', 'aprovado')
                        .then(({ data: motoristas, error }) => {
                            if (error) throw error;
                            
                            driversContainer.innerHTML = '';
                            if (!motoristas || motoristas.length === 0) {
                                driversContainer.innerHTML = '<p class="text-center text-sm text-slate-500 w-full py-4">Nenhum motorista disponível.</p>';
                                return;
                            }

                            motoristas.forEach((motorista, index) => {
                                const usuario = Array.isArray(motorista.usuarios) ? motorista.usuarios[0] : motorista.usuarios;
                                const displayName = usuario?.nome || 'Motorista';
                                const photoUrl = usuario?.foto_perfil_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=random`;
                                const rating = parseFloat(motorista.avaliacao_media || 5.0).toFixed(1);

                                const btnClass = index === 0 
                                    ? 'bg-primary text-white hover:bg-primary/90 shadow-sm' 
                                    : 'border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700';

                                driversContainer.innerHTML += `
                                    <div class="flex-none w-72 bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 flex flex-col gap-3 shadow-sm snap-center">
                                        <div class="flex items-center gap-3">
                                            <div class="w-12 h-12 rounded-full overflow-hidden bg-slate-300 dark:bg-slate-700 flex-shrink-0 ring-2 ring-primary/20">
                                                <img alt="${displayName}" class="w-full h-full object-cover" src="${photoUrl}" />
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <p class="text-sm font-bold truncate">${displayName}</p>
                                                <p class="text-xs text-slate-500 dark:text-slate-400">${motorista.modelo_veiculo || 'Veículo'} • ${motorista.cor_veiculo || 'Cor'}</p>
                                            </div>
                                            <div class="flex items-center gap-0.5">
                                                <span class="material-symbols-outlined text-yellow-500 text-sm font-fill">star</span>
                                                <span class="text-xs font-bold">${rating}</span>
                                            </div>
                                        </div>
                                        <button class="w-full py-2 text-xs font-bold rounded-lg transition-colors flex items-center justify-center gap-1 ${btnClass}">
                                            Selecionar
                                        </button>
                                    </div>
                                `;
                            });
                        });
                } catch (err) {
                    console.error(err);
                }
            }
        });
    </script>
</body>

</html>
