<!DOCTYPE html>

<html class="h-full" lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Viagem Solicitada - Meu Carro de Linha Salinas</title>
  <!-- Tailwind CSS CDN with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/ui-style.css" />
  <!-- Tailwind Configuration for Custom Colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-dark': '#121520',
            'app-accent-blue': '#3B82F6',
            'app-success-green': '#22C55E',
          }
        }
      }
    }
  </script>
  <style data-purpose="animations">
    /* Success Checkmark Animation */
    @keyframes checkmark-draw {
      0% {
        stroke-dashoffset: 48;
      }

      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes checkmark-circle {
      0% {
        stroke-dashoffset: 166;
      }

      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes checkmark-scale {

      0%,
      100% {
        transform: none;
      }

      50% {
        transform: scale3d(1.1, 1.1, 1);
      }
    }

    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: #22C55E;
      fill: none;
      animation: checkmark-circle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: #fff;
      stroke-miterlimit: 10;
      margin: 10% auto;
      box-shadow: inset 0px 0px 0px #22C55E;
      animation: checkmark-scale .3s ease-in-out .9s both;
    }

    .checkmark-check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: checkmark-draw 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }

    .success-fill {
      animation: fill .4s ease-in-out .4s forwards;
    }

    @keyframes fill {
      100% {
        box-shadow: inset 0px 0px 0px 40px #22C55E;
      }
    }
  </style>
</head>

<body class="bg-app-dark h-full text-slate-100 font-sans flex flex-col items-center justify-center p-6 overflow-hidden">
  <!-- BEGIN: SuccessFeedbackSection -->
  <main class="w-full max-w-md flex flex-col items-center text-center space-y-8" data-purpose="confirmation-content">
    <!-- Animated Checkmark Container -->
    <div class="relative mb-4" data-purpose="animation-container">
      <svg class="checkmark success-fill" viewbox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
        <circle class="checkmark-circle" cx="26" cy="26" fill="none" r="25"></circle>
        <path class="checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8" fill="none"></path>
      </svg>
    </div>
    <!-- Success Messaging -->
    <div class="space-y-4" data-purpose="message-block">
      <h1 class="text-3xl font-bold tracking-tight">
        Tudo pronto!
      </h1>
      <p class="text-xl text-slate-300 font-medium">
        Sua viagem foi solicitada.
      </p>
    </div>
    <!-- Instructions / Info Card -->
    <div class="bg-slate-800/50 border border-slate-700 p-6 rounded-2xl w-full" data-purpose="info-box">
      <div class="flex items-start gap-4 text-left">
        <div class="bg-app-accent-blue/20 p-2 rounded-lg">
          <svg class="h-6 w-6 text-app-accent-blue" fill="none" stroke="currentColor" viewbox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
              stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </div>
        <p class="text-slate-400 text-sm leading-relaxed">
          Fique atento ao seu chat, os motoristas entrarão em contato para negociar.
        </p>
      </div>
    </div>
    <!-- Primary Action Button -->
    <div class="w-full pt-8" data-purpose="actions">
      <button
        class="w-full bg-app-accent-blue hover:bg-blue-600 active:scale-95 transition-all text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 text-lg"
        id="btn-go-to-chat">
        Ir para o Chat
      </button>
      <button class="w-full mt-4 text-slate-500 hover:text-slate-300 py-2 text-sm font-medium transition-colors"
        data-purpose="secondary-action">
        Voltar para o Início
      </button>
    </div>
  </main>
  <!-- END: SuccessFeedbackSection -->

  <!-- Bottom Navigation Bar (Fixed) -->
  <nav class="fixed-navbar">
    <div class="flex justify-around items-end w-full">
      <a class="flex flex-col items-center gap-1 text-primary group transition-colors" href="passageiro.html">
        <span class="material-symbols-outlined text-[28px] font-fill">home</span>
        <span class="text-[10px] font-bold">Início</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 group" href="minhasViagens.html">
        <span class="material-symbols-outlined text-[28px]">history</span>
        <span class="text-[10px] font-medium">Viagens</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 group relative" href="mensagens.html">
        <span class="material-symbols-outlined text-[28px]">chat_bubble</span>
        <span class="text-[10px] font-medium">Mensagens</span>
        <span id="chat-badge"
          class="chat-badge hidden absolute -top-1 right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-[#121520]">0</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 group" href="perfilPassageiro.html">
        <span class="material-symbols-outlined text-[28px]">person</span>
        <span class="text-[10px] font-medium">Perfil</span>
      </a>
    </div>
  </nav>

  <script src="js/ui-transitions.js"></script>
  <!-- BEGIN: LogicScript -->
  <script data-purpose="event-handlers">
    document.addEventListener('DOMContentLoaded', () => {
      const chatBtn = document.getElementById('btn-go-to-chat');
      const homeBtn = document.querySelector('[data-purpose="secondary-action"]');

      chatBtn.addEventListener('click', () => {
        window.location.href = 'mensagens.html';
      });

      if (homeBtn) {
        homeBtn.addEventListener('click', () => {
          window.location.href = 'passageiro.html';
        });
      }
    });
  </script>
  <!-- END: LogicScript -->
</body>

</html>
