<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1949e6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Mensagens de Suporte - Lista</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh;
            user-select: none;
            overscroll-behavior-y: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .active-scale:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased overflow-hidden">
    <!-- Header -->
    <header
        class="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shrink-0">
        <div class="flex items-center justify-between px-4 h-16 max-w-md mx-auto">
            <a href="perfilAdministrador.html"
                class="flex items-center justify-center size-10 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors active-scale">
                <span class="material-symbols-outlined">arrow_back_ios_new</span>
            </a>
            <h1 class="text-lg font-bold tracking-tight">Mensagens de Suporte</h1>
            <div class="size-10"></div>
        </div>
    </header>

    <!-- Search and Filters Section -->
    <div class="px-4 py-4 space-y-4 bg-background-light dark:bg-background-dark shrink-0 max-w-md mx-auto w-full">
        <div class="flex flex-col w-full">
            <div
                class="flex w-full items-stretch rounded-xl h-12 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                <div class="text-slate-400 dark:text-slate-500 flex items-center justify-center pl-4">
                    <span class="material-symbols-outlined">search</span>
                </div>
                <input id="search-input"
                    class="flex w-full min-w-0 flex-1 border-none bg-transparent h-full placeholder:text-slate-500 px-4 pl-2 text-base font-normal focus:ring-0 outline-none"
                    placeholder="Nome ou assunto..." />
            </div>
        </div>
        <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar shrink-0">
            <button data-filter="todos"
                class="filter-btn flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-primary text-white px-4 shadow-lg shadow-primary/20 transition-all active-scale">
                <span class="text-sm font-medium">Todos</span>
            </button>
            <button data-filter="aberto"
                class="filter-btn flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 px-4 border border-slate-200 dark:border-slate-800 transition-all active-scale">
                <span class="text-sm font-medium">Abertos</span>
            </button>
            <button data-filter="resolvido"
                class="filter-btn flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 px-4 border border-slate-200 dark:border-slate-800 transition-all active-scale">
                <span class="text-sm font-medium">Resolvidos</span>
            </button>
        </div>
    </div>

    <!-- Content Area -->
    <main id="tickets-container" class="flex-1 px-4 py-2 space-y-4 overflow-y-auto pb-32 max-w-md mx-auto w-full">
        <!-- Skeleton Loading -->
        <div id="loading-state" class="space-y-4">
            <div class="animate-pulse bg-white dark:bg-slate-800 h-32 rounded-xl"></div>
            <div class="animate-pulse bg-white dark:bg-slate-800 h-32 rounded-xl"></div>
            <div class="animate-pulse bg-white dark:bg-slate-800 h-32 rounded-xl"></div>
        </div>
        <div id="tickets-list" class="space-y-4"></div>
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-12 text-center">
            <span
                class="material-symbols-outlined text-6xl text-slate-300 dark:text-slate-700 mb-4">support_agent</span>
            <p class="text-slate-500 dark:text-slate-400">Nenhuma mensagem encontrada.</p>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl px-4 pt-2 z-50"
        style="padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem)">
        <div class="flex gap-2 max-w-lg mx-auto">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 active-scale"
                href="admin.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">dashboard</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Painel</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 active-scale"
                href="gerenciarUsuarios.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">group</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Usuários</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 active-scale"
                href="historicoGeral.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">route</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Corridas</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary active-scale"
                href="perfilAdministrador.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">settings</span>
                </div>
                <p class="text-[10px] font-bold leading-normal tracking-tight">Ajustes</p>
            </a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const sb = window.supabaseClient;
            const container = document.getElementById('tickets-list');
            const loadingState = document.getElementById('loading-state');
            const emptyState = document.getElementById('empty-state');
            const searchInput = document.getElementById('search-input');
            const filterBtns = document.querySelectorAll('.filter-btn');

            let allMessages = [];
            let currentFilter = 'todos';

            async function loadMessages() {
                loadingState.classList.remove('hidden');
                container.innerHTML = '';
                emptyState.classList.add('hidden');

                try {
                    const { data, error } = await sb
                        .from('suporte')
                        .select('*')
                        .order('criado_em', { ascending: false });

                    if (error) throw error;
                    allMessages = data;
                    renderMessages(allMessages);
                } catch (err) {
                    console.error('Erro ao carregar mensagens:', err);
                    container.innerHTML = `<p class="text-red-500 text-center py-4">Erro ao carregar mensagens.</p>`;
                } finally {
                    loadingState.classList.add('hidden');
                }
            }

            function renderMessages(messages) {
                container.innerHTML = '';

                const filtered = messages.filter(msg => {
                    const matchesSearch = msg.nome?.toLowerCase().includes(searchInput.value.toLowerCase()) ||
                        msg.assunto?.toLowerCase().includes(searchInput.value.toLowerCase());
                    const matchesFilter = currentFilter === 'todos' || msg.status === currentFilter;
                    return matchesSearch && matchesFilter;
                });

                if (filtered.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');

                filtered.forEach(msg => {
                    const date = new Date(msg.criado_em).toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });

                    const statusClass = msg.status === 'aberto' ?
                        'bg-amber-500/10 text-amber-500 border-amber-500/20' :
                        'bg-emerald-500/10 text-emerald-500 border-emerald-500/20';

                    const card = document.createElement('div');
                    card.className = 'bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 shadow-sm active-scale transition-all';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">
                                    ${msg.nome ? msg.nome.substring(0, 2).toUpperCase() : '??'}
                                </div>
                                <div>
                                    <h4 class="text-slate-900 dark:text-slate-100 font-bold text-sm leading-tight">${msg.nome || 'Usuário Anônimo'}</h4>
                                    <p class="text-slate-500 text-[10px] font-medium">${date}</p>
                                </div>
                            </div>
                            <span onclick="toggleStatus('${msg.id}', '${msg.status}')" class="cursor-pointer px-2 py-0.5 rounded-full ${statusClass} text-[9px] font-bold uppercase border hover:opacity-80 transition-opacity">
                                ${msg.status || 'aberto'}
                            </span>
                        </div>
                        <div class="space-y-1 mb-4">
                            <p class="text-primary font-bold text-sm">${msg.assunto || 'Sem Assunto'}</p>
                            <p class="text-slate-600 dark:text-slate-400 text-xs line-clamp-2">${msg.mensagem || ''}</p>
                        </div>
                        <div class="flex gap-2 border-t border-slate-100 dark:border-slate-700/50 pt-3">
                            <a href="mailto:${msg.email}" class="flex-1 flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 py-2.5 rounded-xl text-xs font-bold transition-colors">
                                <span class="material-symbols-outlined text-sm">mail</span>
                                E-mail
                            </a>
                            <a href="https://wa.me/${msg.telefone?.replace(/\D/g, '')}" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-emerald-500 text-white py-2.5 rounded-xl text-xs font-bold transition-colors">
                                <span class="material-symbols-outlined text-sm">chat_bubble</span>
                                WhatsApp
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            // Search Filter
            searchInput.addEventListener('input', () => renderMessages(allMessages));

            // Category Filter
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => {
                        b.classList.remove('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
                        b.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-400', 'border', 'border-slate-200', 'dark:border-slate-800');
                    });
                    btn.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
                    btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-400', 'border', 'border-slate-200', 'dark:border-slate-800');

                    currentFilter = btn.dataset.filter;
                    renderMessages(allMessages);
                });
            });

            window.toggleStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'aberto' ? 'resolvido' : 'aberto';
                
                try {
                    // Otimistic update
                    const msgIndex = allMessages.findIndex(m => m.id === id);
                    if (msgIndex > -1) {
                        allMessages[msgIndex].status = newStatus;
                        renderMessages(allMessages);
                    }

                    const { error } = await sb
                        .from('suporte')
                        .update({ status: newStatus })
                        .eq('id', id);

                    if (error) throw error;
                } catch (err) {
                    console.error('Erro ao atualizar status:', err);
                    alert('Erro ao atualizar status. Tente novamente.');
                    // Revert otimistic update
                    const msgIndex = allMessages.findIndex(m => m.id === id);
                    if (msgIndex > -1) {
                        allMessages[msgIndex].status = currentStatus;
                        renderMessages(allMessages);
                    }
                }
            };

            loadMessages();
        });
    </script>
</body>

</html>
