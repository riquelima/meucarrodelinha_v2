<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "accent-cyan": "#00f2ff",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0c14",
                        "card-dark": "#1a1e2e",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Conversas - Salinas</title>
    <style type="text/tailwindcss">
        body { min-height: 100dvh; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 border-b border-white/10">
            <a href="passageiro.html" class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">
                Conversas</h1>
            <div class="size-10"></div>
        </header>

        <!-- Dynamic List -->
        <main id="conversations-list" class="flex-1 overflow-y-auto pb-navbar">
            <div class="p-8 text-center text-slate-500 animate-pulse">Carregando conversas...</div>
        </main>

        <!-- Navbar -->
        <nav class="fixed-navbar" id="main-nav">
            <a href="passageiro.html" id="nav-home">
                <span class="material-symbols-outlined">home</span>
                <span>Início</span>
            </a>
            <a href="minhasViagens.html" id="nav-trips">
                <span class="material-symbols-outlined">history</span>
                <span>Viagens</span>
            </a>
            <a class="nav-active" href="mensagens.html" id="nav-chats" class="relative">
                <span class="material-symbols-outlined">chat</span>
                <span>Chats</span>
                <span id="chat-badge" class="chat-badge hidden absolute -top-1 right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-[#121520]">0</span>
            </a>
            <a href="perfilPassageiro.html" id="nav-profile">
                <span class="material-symbols-outlined">person</span>
                <span>Perfil</span>
            </a>
        </nav>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('conversations-list');
            const { data: { session } } = await supabaseClient.auth.getSession();
            const user = session?.user;

            if (!user) {
                window.location.href = 'loginPassageiro.html';
                return;
            }

            async function loadConversations() {
                try {
                    // Busca as últimas mensagens trocadas
                    const { data: messages, error } = await supabaseClient
                        .from('mensagens')
                        .select('*, remetente:usuarios!remetente_id(id, nome, foto_perfil_url), destinatario:usuarios!destinatario_id(id, nome, foto_perfil_url)')
                        .or(`remetente_id.eq.${user.id},destinatario_id.eq.${user.id}`)
                        .order('enviada_em', { ascending: false });

                    if (error) throw error;

                    // Agrupar por contato
                    const conversations = {};
                    messages.forEach(msg => {
                        const targetUser = msg.remetente_id === user.id ? msg.destinatario : msg.remetente;
                        if (!targetUser) return;

                        const isBroadcast = msg.conteudo.startsWith('[TRIP_REQUEST]') || msg.conteudo.startsWith('[VALUE_PROPOSAL]');
                        const isFromMe = msg.remetente_id === user.id;

                        if (!conversations[targetUser.id]) {
                            conversations[targetUser.id] = {
                                user: targetUser,
                                lastMessage: msg,
                                unreadCount: msg.destinatario_id === user.id && !msg.lida ? 1 : 0,
                                hasValidInteraction: !isBroadcast || !isFromMe
                            };
                        } else {
                            if (!isBroadcast || !isFromMe) {
                                conversations[targetUser.id].hasValidInteraction = true;
                            }
                            if (msg.destinatario_id === user.id && !msg.lida) {
                                conversations[targetUser.id].unreadCount++;
                            }
                        }
                    });

                    listContainer.innerHTML = '';
                    // Filtrar apenas conversas que tenham interações reais (não apenas broadcast do passageiro)
                    const entries = Object.values(conversations).filter(c => c.hasValidInteraction);

                    if (entries.length === 0) {
                        listContainer.innerHTML = '<div class="p-8 text-center text-slate-500">Nenhuma conversa iniciada.</div>';
                        return;
                    }

                    for (const conv of entries) {
                        const target = conv.user;
                        const lastMsg = conv.lastMessage;
                        const time = new Date(lastMsg.enviada_em).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', hour12: false });
                        const photoUrl = target.foto_perfil_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(target.nome)}&background=random&size=128`;

                        // Busca dados do motorista para pegar o carro/placa para o link
                        const { data: driverInfo } = await supabaseClient
                            .from('motoristas')
                            .select('modelo_veiculo, placa_veiculo')
                            .eq('usuario_id', target.id)
                            .single();

                        const car = driverInfo?.modelo_veiculo || 'Carro';
                        const plate = driverInfo?.placa_veiculo || '';

                        const card = `
                            <a href="chat.html?userId=${target.id}&name=${encodeURIComponent(target.nome)}&photo=${encodeURIComponent(photoUrl)}&car=${encodeURIComponent(car)}&plate=${encodeURIComponent(plate)}" 
                               class="flex items-center gap-4 px-4 py-4 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors border-b border-slate-200 dark:border-slate-800/50 ${conv.unreadCount > 0 ? 'bg-primary/5' : ''}">
                                <img src="${photoUrl}" class="size-14 rounded-full border-2 border-primary/20 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(target.nome)}&background=random'">
                                <div class="flex-1 min-w-0">
                                    <div class="flex justify-between items-baseline mb-0.5">
                                        <p class="text-slate-900 dark:text-slate-100 font-bold truncate">${target.nome}</p>
                                        <p class="text-slate-500 text-xs">${time}</p>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <p class="text-slate-500 dark:text-slate-400 text-sm truncate">
                                            ${lastMsg.conteudo.startsWith('[LOCATION]') ? '📍 Localização' :
                                lastMsg.conteudo.startsWith('[TRIP_REQUEST]') ? '🚗 Solicitação de Viagem' :
                                    lastMsg.conteudo.startsWith('[VALUE_PROPOSAL]') ? '💰 Proposta de Valor' :
                                        lastMsg.conteudo.startsWith('[DRIVER_PROPOSAL]') ? '💰 Proposta do Motorista' :
                                            lastMsg.conteudo.startsWith('[TRIP_ACCEPTED]') ? '✅ Viagem Aceita' :
                                                lastMsg.conteudo}
                                        </p>
                                        ${conv.unreadCount > 0 ? `
                                            <div class="flex size-5 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white">${conv.unreadCount}</div>
                                        ` : ''}
                                    </div>
                                </div>
                            </a>
                        `;
                        listContainer.innerHTML += card;
                    }
                } catch (err) {
                    console.error('Erro ao carregar conversas:', err);
                    listContainer.innerHTML = '<div class="p-8 text-center text-red-500">Erro ao carregar conversas.</div>';
                }
            }

            function setupRealtime() {
                supabaseClient.channel('lista-conversas-passageiro')
                    .on(
                        'postgres_changes',
                        {
                            event: '*',
                            schema: 'public',
                            table: 'mensagens',
                            filter: `destinatario_id=eq.${user.id}`
                        },
                        () => {
                            loadConversations();
                        }
                    )
                    .on(
                        'postgres_changes',
                        {
                            event: 'INSERT',
                            schema: 'public',
                            table: 'mensagens',
                            filter: `remetente_id=eq.${user.id}`
                        },
                        () => {
                            loadConversations();
                        }
                    )
                    .subscribe();
            }

            loadConversations();
            setupRealtime();
        });
    </script>
</body>

</html>
