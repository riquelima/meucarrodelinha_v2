<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "success": "#22c55e",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>Conta Criada com Sucesso - Salinas</title>
    <style type="text/tailwindcss">
        body {
            min-height: 100dvh;
        }
        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex min-h-screen w-full flex-col p-6 items-center justify-between">
        <div class="mt-12"></div>
        <main class="flex flex-col items-center text-center w-full max-w-xs mx-auto">
            <div class="relative mb-10">
                <div class="absolute inset-0 bg-success/20 blur-3xl rounded-full"></div>
                <div
                    class="relative size-32 bg-success/10 border border-success/20 rounded-full flex items-center justify-center shadow-2xl shadow-success/20">
                    <span class="material-symbols-outlined text-7xl text-success fill-1">check_circle</span>
                </div>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-4">
                Conta criada com sucesso!
            </h1>
            <p class="text-slate-400 text-base leading-relaxed mb-10">
                Agora você já pode aproveitar todos os nossos serviços. Clique abaixo para entrar na sua conta.
            </p>
            <a class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center"
                href="loginPassageiro.html">
                Fazer Login
            </a>
        </main>
        <footer class="pb-8 w-full text-center">
            <p class="text-[10px] text-slate-600 uppercase tracking-widest">
                Meu Carro de Linha Salinas
            </p>
        </footer>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
</body>

</html>
