<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Painel Administrativo: Estatísticas e Ações</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .font-3d-orange {
            font-family: 'Titan One', cursive;
            color: #FF9100;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: visible;
            line-height: 1.2;
            padding-bottom: 5px;
            letter-spacing: 1px;
        }

        /* 3D Text Animation */
        @keyframes popIn3D {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(20px) rotateX(20deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.05) translateY(-5px) rotateX(0deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-pop-in-3d {
            animation: popIn3D 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            animation-delay: 0.2s;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101422",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: max(884px, 100dvh);
        }

        .chart-gradient {
            background: linear-gradient(180deg, rgba(15, 56, 189, 0.2) 0%, rgba(15, 56, 189, 0) 100%);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Page Transition */
        main {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Click Animation */
        .active-scale:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* [AESTHETICS]: Floating Deep Sea Navbar Standard */
        .fixed-navbar {
            position: fixed;
            bottom: 24px;
            left: 20px;
            right: 20px;
            height: 72px;
            background: rgba(18, 21, 32, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-item span:first-child {
            font-size: 24px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .nav-item span:last-child {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
        }

        .nav-active {
            color: #FF9100 !important;
        }

        .nav-active span:first-child {
            transform: translateY(-4px) scale(1.1);
            color: #FF9100;
        }

        /* Indicador Ativo */
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: 10px;
            width: 4px;
            height: 4px;
            background: #FF9100;
            border-radius: 50%;
            box-shadow: 0 0 10px #FF9100;
        }

        .view-section {
            padding-bottom: 120px !important;
        }

        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
    </style>
</head>

        <!-- SPA Navigation Logic -->
        <script>
            function switchTab(tabName) {
                const slider = document.getElementById('view-slider');
                const tabs = ['dashboard', 'users', 'trips', 'settings'];
                const index = tabs.indexOf(tabName);
                
                if (index === -1) return;

                // Hardware Accelerated Slider
                slider.style.transform = `translate3d(${-index * 100}vw, 0, 0)`;

                // Update Navbar UI
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.remove('nav-active');
                    if (btn.id === `nav-${tabName}`) btn.classList.add('nav-active');
                });

                // Optimization: Hide sections out of viewport
                document.querySelectorAll('.view-section').forEach((sec, i) => {
                    sec.style.visibility = (Math.abs(i - index) <= 1) ? 'visible' : 'hidden';
                });
            }
        </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const sb = window.supabaseClient;
            if (!sb) return;

            async function updateStats() {
                try {
                    const startOfToday = new Date();
                    startOfToday.setHours(0, 0, 0, 0);
                    const isoStartOfToday = startOfToday.toISOString();

                    function updatePct(elementId, current, past) {
                        const el = document.getElementById(elementId);
                        if (past === 0) {
                            el.textContent = current > 0 ? '+100%' : '0%';
                            el.className = 'text-emerald-500 text-xs font-bold leading-normal';
                            return;
                        }
                        const pct = ((current - past) / past) * 100;
                        const sign = pct >= 0 ? '+' : '';
                        el.textContent = `${sign}${pct.toFixed(1)}%`;
                        el.className = pct >= 0 ? 'text-emerald-500 text-xs font-bold leading-normal' : 'text-red-500 text-xs font-bold leading-normal';
                    }

                    // Total Clientes (Usuários) - Exclui admin
                    const { count: totalUsers, error: err1 } = await sb
                        .from('usuarios')
                        .select('*', { count: 'exact', head: true });

                    const { count: pastUsers, error: err1p } = await sb
                        .from('usuarios')
                        .select('*', { count: 'exact', head: true })
                        .lt('criado_em', isoStartOfToday);

                    if (!err1) {
                        const clientesCount = Math.max(0, totalUsers - 1);
                        const pastClientes = Math.max(0, (pastUsers || 0) - 1);
                        document.getElementById('stat-clientes').textContent = clientesCount.toLocaleString();
                        if (!err1p) updatePct('pct-clientes', clientesCount, pastClientes);
                    }

                    // Total Passageiros
                    const { count: totalPassageiros, error: err2 } = await sb
                        .from('usuarios')
                        .select('*', { count: 'exact', head: true })
                        .eq('tipo_usuario', 'passageiro');

                    const { count: pastPassageiros, error: err2p } = await sb
                        .from('usuarios')
                        .select('*', { count: 'exact', head: true })
                        .eq('tipo_usuario', 'passageiro')
                        .lt('criado_em', isoStartOfToday);

                    if (!err2) {
                        document.getElementById('stat-passageiros').textContent = totalPassageiros.toLocaleString();
                        if (!err2p) updatePct('pct-passageiros', totalPassageiros, pastPassageiros || 0);
                    }

                    // Total Motoristas
                    const { count: totalMotoristas, error: err3 } = await sb
                        .from('usuarios')
                        .select('*', { count: 'exact', head: true })
                        .eq('tipo_usuario', 'motorista');

                    const { count: pastMotoristas, error: err3p } = await sb
                        .from('usuarios')
                        .select('*', { count: 'exact', head: true })
                        .eq('tipo_usuario', 'motorista')
                        .lt('criado_em', isoStartOfToday);

                    if (!err3) {
                        document.getElementById('stat-motoristas').textContent = totalMotoristas.toLocaleString();
                        if (!err3p) updatePct('pct-motoristas', totalMotoristas, pastMotoristas || 0);
                    }

                    // Viagens (Hardcoded as 0 per request)
                    document.getElementById('stat-viagens').textContent = '0';

                } catch (error) {
                    console.error('Erro ao buscar estatísticas:', error);
                }
            }

            async function updateRegistrationChart() {
                try {
                    const days = 7;
                    const labelsContainer = document.getElementById('chart-labels');
                    const pathPas = document.getElementById('path-passageiros');
                    const pathMot = document.getElementById('path-motoristas');

                    // 1. Get dates for the last 7 days
                    const dates = [];
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date();
                        d.setDate(d.getDate() - i);
                        dates.push(d);
                    }

                    // 2. Update X-axis labels
                    const labelsElements = labelsContainer.querySelectorAll('span');
                    dates.forEach((date, i) => {
                        labelsElements[i].textContent = date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                    });

                    // 3. Fetch all users (excluding admins if possible, though we'll just filter in JS)
                    const { data: users, error } = await sb
                        .from('usuarios')
                        .select('tipo_usuario, criado_em');

                    if (error) throw error;

                    // 4. Calculate cumulative counts per day
                    const pasCounts = Array(days).fill(0);
                    const motCounts = Array(days).fill(0);

                    dates.forEach((date, i) => {
                        const endOfDay = new Date(date);
                        endOfDay.setHours(23, 59, 59, 999);

                        pasCounts[i] = users.filter(u => u.tipo_usuario === 'passageiro' && new Date(u.criado_em) <= endOfDay).length;
                        motCounts[i] = users.filter(u => u.tipo_usuario === 'motorista' && new Date(u.criado_em) <= endOfDay).length;
                    });

                    // 5. Generate SVG Paths
                    const maxCount = Math.max(...pasCounts, ...motCounts, 10); // Min scale of 10
                    const width = 472;
                    const height = 150;
                    const padding = 20;
                    const availableHeight = height - (padding * 2);

                    function getPath(counts) {
                        return counts.map((count, i) => {
                            const x = (i / (days - 1)) * width;
                            const y = height - padding - (count / maxCount) * availableHeight;
                            return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
                        }).join(' ');
                    }

                    pathPas.setAttribute('d', getPath(pasCounts));
                    pathMot.setAttribute('d', getPath(motCounts));

                    // 6. Create Interactive Dots and Tooltip Logic
                    const dotsContainer = document.getElementById('chart-dots');
                    const tooltip = document.getElementById('chart-tooltip');
                    dotsContainer.innerHTML = '';

                    dates.forEach((date, i) => {
                        const x = (i / (days - 1)) * width;
                        const yPas = height - padding - (pasCounts[i] / maxCount) * availableHeight;
                        const yMot = height - padding - (motCounts[i] / maxCount) * availableHeight;

                        // Create invisible trigger for better touch area
                        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                        rect.setAttribute("x", (x - 20));
                        rect.setAttribute("y", 0);
                        rect.setAttribute("width", 40);
                        rect.setAttribute("height", height);
                        rect.setAttribute("fill", "transparent");
                        rect.setAttribute("class", "cursor-pointer");
                        
                        const showTooltip = (e) => {
                            tooltip.classList.remove('hidden');
                            setTimeout(() => {
                                tooltip.style.opacity = '1';
                                tooltip.style.transform = 'translate(-50%, -100%) scale(1)';
                            }, 10);
                            
                            tooltip.style.left = `${(x / width) * 100}%`;
                            tooltip.style.top = `${Math.min(yPas, yMot)}px`;
                            
                            document.getElementById('tooltip-date').textContent = date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
                            document.getElementById('tooltip-mot').textContent = motCounts[i];
                            document.getElementById('tooltip-pas').textContent = pasCounts[i];
                            
                            // Highlight dots
                            document.querySelectorAll(`.chart-dot-${i}`).forEach(d => {
                                d.setAttribute('r', '6');
                                d.setAttribute('stroke-width', '4');
                            });
                        };

                        const hideTooltip = () => {
                            tooltip.style.opacity = '0';
                            tooltip.style.transform = 'translate(-50%, -100%) scale(0.9)';
                            setTimeout(() => tooltip.classList.add('hidden'), 300);
                            
                            document.querySelectorAll(`.chart-dot-${i}`).forEach(d => {
                                d.setAttribute('r', '4');
                                d.setAttribute('stroke-width', '2');
                            });
                        };

                        rect.addEventListener('mouseenter', showTooltip);
                        rect.addEventListener('mouseleave', hideTooltip);
                        rect.addEventListener('click', showTooltip);

                        // Visual dots
                        const dotPas = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        dotPas.setAttribute("cx", x);
                        dotPas.setAttribute("cy", yPas);
                        dotPas.setAttribute("r", "4");
                        dotPas.setAttribute("fill", "#a855f7");
                        dotPas.setAttribute("stroke", "white");
                        dotPas.setAttribute("stroke-width", "2");
                        dotPas.setAttribute("class", `chart-dot-${i} transition-all duration-300`);

                        const dotMot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        dotMot.setAttribute("cx", x);
                        dotMot.setAttribute("cy", yMot);
                        dotMot.setAttribute("r", "4");
                        dotMot.setAttribute("fill", "#0f38bd");
                        dotMot.setAttribute("stroke", "white");
                        dotMot.setAttribute("stroke-width", "2");
                        dotMot.setAttribute("class", `chart-dot-${i} transition-all duration-300`);

                        dotsContainer.appendChild(dotPas);
                        dotsContainer.appendChild(dotMot);
                        dotsContainer.appendChild(rect);
                    });

                } catch (error) {
                    console.error('Erro ao buscar dados do gráfico:', error);
                }
            }

            async function updateBlogChart() {
                try {
                    const barsContainer = document.getElementById('blog-bars-container');
                    const labelsContainer = document.getElementById('blog-labels');
                    const growthBadge = document.getElementById('blog-growth');
                    const tooltip = document.getElementById('blog-tooltip');

                    if (!barsContainer || !labelsContainer || !growthBadge || !tooltip) return;

                    // 1. Get Jan-Dec 2026
                    const monthsCount = 12;
                    const year = 2026;
                    const months = [];
                    for (let i = 0; i < monthsCount; i++) {
                        months.push(new Date(year, i, 1));
                    }

                    // 2. Fetch posts
                    const { data: posts, error } = await sb
                        .from('postagens')
                        .select('criado_em')
                        .eq('publicado', true);

                    if (error) throw error;

                    // 3. Count posts per month
                    const monthlyCounts = months.map(m => {
                        return posts.filter(p => {
                            const postDate = new Date(p.criado_em);
                            return postDate.getMonth() === m.getMonth() && 
                                   postDate.getFullYear() === m.getFullYear();
                        }).length;
                    });

                    // 4. Update growth badge (based on current real month if in 2026, otherwise last month)
                    const now = new Date();
                    const currentMonthIdx = (now.getFullYear() === year) ? now.getMonth() : monthsCount - 1;
                    const currentMonthCount = monthlyCounts[currentMonthIdx];
                    const lastMonthCount = monthlyCounts[monthsCount - 2] || 0;
                    const diff = currentMonthCount - lastMonthCount;
                    const sign = diff >= 0 ? '+' : '';
                    growthBadge.textContent = `${sign}${diff}`;
                    growthBadge.className = diff >= 0 ? 
                        'bg-cyan-500/10 text-cyan-600 px-3 py-1 rounded-full text-xs font-bold' : 
                        'bg-red-500/10 text-red-600 px-3 py-1 rounded-full text-xs font-bold';

                    // 5. Render bars and labels
                    barsContainer.innerHTML = '';
                    labelsContainer.innerHTML = '';
                    const maxCount = Math.max(...monthlyCounts, 5); // Min scale of 5

                    months.forEach((date, i) => {
                        const count = monthlyCounts[i];
                        const heightPct = (count / maxCount) * 100;

                        // Create bar
                        const barWrapper = document.createElement('div');
                        barWrapper.className = 'flex-1 h-full relative cursor-pointer flex items-end';
                        
                        const bar = document.createElement('div');
                        bar.style.height = `${Math.max(heightPct, 5)}%`;
                        bar.className = `w-full ${i === currentMonthIdx ? 'bg-cyan-500' : 'bg-cyan-500/20'} rounded-t-sm transition-all duration-300 transform origin-bottom hover:bg-cyan-400`;
                        
                        barWrapper.appendChild(bar);
                        barsContainer.appendChild(barWrapper);

                        // Create label
                        const label = document.createElement('span');
                        label.className = 'text-slate-400 text-[10px] font-bold uppercase tracking-tighter flex-1 text-center';
                        label.textContent = date.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '');
                        labelsContainer.appendChild(label);

                        // Interactivity
                        const showTooltip = (e) => {
                            tooltip.classList.remove('hidden');
                            setTimeout(() => {
                                tooltip.style.opacity = '1';
                                tooltip.style.transform = 'translate(-50%, -100%) scale(1)';
                            }, 10);

                            const rect = barWrapper.getBoundingClientRect();
                            const containerRect = document.querySelector('.group\\/chart2').getBoundingClientRect();
                            
                            tooltip.style.left = `${((rect.left + rect.width / 2) - containerRect.left)}px`;
                            tooltip.style.top = `${((rect.top + rect.height * (1 - heightPct/100)) - containerRect.top)}px`;

                            document.getElementById('blog-tooltip-date').textContent = date.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                            document.getElementById('blog-tooltip-value').textContent = count;
                            
                            bar.classList.add('brightness-125');
                        };

                        const hideTooltip = () => {
                            tooltip.style.opacity = '0';
                            tooltip.style.transform = 'translate(-50%, -100%) scale(0.9)';
                            setTimeout(() => tooltip.classList.add('hidden'), 300);
                            bar.classList.remove('brightness-125');
                        };

                        barWrapper.addEventListener('mouseenter', showTooltip);
                        barWrapper.addEventListener('mouseleave', hideTooltip);
                        barWrapper.addEventListener('click', showTooltip);
                    });

                } catch (error) {
                    console.error('Erro ao buscar dados do blog:', error);
                }
            }

            await updateStats();
            await updateRegistrationChart();
            await updateBlogChart();
        });
    </script>
</body>

</html>
