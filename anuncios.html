<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>Listagem de Todos os Anúncios - Meu Carro de Linha Salinas</title>
    <style type="text/tailwindcss">
        body {
            height: 100dvh;
            overflow: hidden;
        }
        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }
        .ad-card {
            height: 130px;}.no-scrollbar::-webkit-scrollbar {
            display: none;
        }.no-scrollbar {
            -ms-overflow-style: none;scrollbar-width: none;}
    
        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="flex flex-col h-screen w-full">
        <header
            class="flex items-center bg-background-light dark:bg-background-dark px-4 py-4 shrink-0 border-b border-slate-200 dark:border-slate-800 z-50">
            <a href="homepage.html"
                class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors active:scale-95">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios_new</span>
            </a>
            <h1
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">
                Todos os Anúncios
            </h1>
        </header>
        <main id="ads-list-container" class="flex-1 overflow-y-auto no-scrollbar px-4 py-4 space-y-3">
            <!-- Loading State -->
            <div id="loading-state" class="flex flex-col gap-3">
                <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-xl animate-pulse"></div>
                <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-xl animate-pulse"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const adsListContainer = document.getElementById('ads-list-container');
            const loadingState = document.getElementById('loading-state');

            try {
                const { data: ads, error } = await window.supabaseClient
                    .from('anuncios')
                    .select('*')
                    .eq('ativo', true)
                    .order('criado_em', { ascending: false });

                if (error) throw error;

                if (loadingState) loadingState.remove();

                if (!ads || ads.length === 0) {
                    adsListContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-12 px-6 text-center">
                            <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-700 mb-4">campaign</span>
                            <h3 class="text-slate-900 dark:text-slate-100 font-bold">Nenhum anúncio ativo</h3>
                            <p class="text-slate-500 text-sm mt-2">Fique atento para novidades e promoções em breve!</p>
                        </div>
                    `;
                    return;
                }

                adsListContainer.innerHTML = '';
                ads.forEach(ad => {
                    const adCard = document.createElement('a');
                    adCard.href = ad.url || '#';
                    adCard.target = ad.url ? '_blank' : '_self';
                    adCard.className = 'ad-card flex w-full bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm shrink-0 cursor-pointer hover:border-primary/50 transition-colors group active-scale';

                    adCard.innerHTML = `
                        <div class="w-1/3 overflow-hidden bg-slate-200 dark:bg-slate-700 shrink-0">
                            <img alt="${ad.titulo}" class="w-full h-full object-cover" src="${ad.imagem_url}" />
                        </div>
                        <div class="p-3 w-2/3 flex flex-col justify-between relative">
                            <div class="absolute bottom-3 right-3 text-slate-400 group-hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[16px]">open_in_new</span>
                            </div>
                            <div>
                                <div class="flex justify-between items-start mb-1 pr-5">
                                    <h4 class="text-sm font-bold text-slate-900 dark:text-slate-100 line-clamp-1">${ad.titulo}</h4>
                                    <span class="bg-blue-100 dark:bg-primary/20 text-primary dark:text-blue-400 text-[8px] font-bold px-1.5 py-0.5 rounded-full uppercase shrink-0">Ativo</span>
                                </div>
                                <p class="text-[10px] text-primary font-bold uppercase tracking-wider">${ad.descricao || 'Destaque'}</p>
                            </div>
                        </div>
                    `;
                    adsListContainer.appendChild(adCard);
                });

            } catch (err) {
                console.error('Error loading ads:', err);
                if (loadingState) loadingState.innerHTML = '<p class="text-center text-red-500 text-sm p-4">Erro ao carregar anúncios.</p>';
            }

            // General Navigation Fade Effect
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
</body>

</html>
