<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Editar Conta - Meu Carro de Linha Salinas</title>
    <script src="/js/tailwind-cdn.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "primary-dark": "#ea580c",
                        "accent": "#00d4ff",
                        "background-dark": "#0f1320",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { min-height: 100dvh; -webkit-tap-highlight-color: transparent; user-select: none; overscroll-behavior-y: none; }
        input, textarea { user-select: text; -webkit-user-select: text; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-scale { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-scale:active { transform: scale(0.96); }
        .animate-fade-in { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-up { opacity: 0; transform: translateY(24px); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scale-in { opacity: 0; transform: scale(0.92); animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { to { opacity: 1; transform: scale(1); } }
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .input-premium { background: rgba(255, 255, 255, 0.04); border: 1.5px solid rgba(255, 255, 255, 0.08); color: #f1f5f9; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .input-premium:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1), 0 0 20px rgba(249, 115, 22, 0.05); outline: none; background: rgba(255, 255, 255, 0.06); }
        .input-premium::placeholder { color: rgba(148, 163, 184, 0.4); }
        .glow-cta { animation: pulseGlow 3s ease-in-out infinite; }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.15), 0 0 40px rgba(249, 115, 22, 0.05); } 50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.3), 0 0 60px rgba(249, 115, 22, 0.1); } }
        .divider-gradient { height: 1px; background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.15), rgba(0, 212, 255, 0.1), transparent); }
        .bg-premium-grid { background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 40px 40px; }
        .gradient-text { background: linear-gradient(135deg, #f97316 0%, #ff8c42 50%, #fbbf24 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .toast-premium { background: rgba(15, 19, 32, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .toast-premium.success { border-color: rgba(16, 185, 129, 0.3); }
        .toast-premium.error { border-color: rgba(239, 68, 68, 0.3); }
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation: 200ms cubic-bezier(0.4, 0, 1, 1) both fade-out; }
        ::view-transition-new(root) { animation: 250ms cubic-bezier(0, 0, 0.2, 1) both fade-in; }
        body { animation: fadeIn 0.3s ease-in-out; }
        body.fade-out { animation: fadeOut 0.2s ease-in-out forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="bg-background-dark font-body text-slate-100 antialiased bg-premium-grid overflow-hidden">
    <div class="relative min-h-screen flex flex-col overflow-y-auto">

        <div class="fixed top-20 right-10 w-72 h-72 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="fixed bottom-40 left-10 w-60 h-60 bg-accent/5 rounded-full blur-[100px] pointer-events-none"></div>

        <!-- ========== HEADER ========== -->
        <header class="relative z-20 flex items-center justify-between px-4 py-4">
            <a href="perfilPassageiro.html"
                class="active-scale flex items-center justify-center size-10 rounded-xl glass-card text-slate-400 hover:text-white hover:border-white/20 transition-all duration-300">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
            </a>
            <span class="text-xs font-medium text-slate-500 uppercase tracking-[0.15em]">Conta</span>
            <div class="size-10"></div>
        </header>

        <!-- ========== HERO ========== -->
        <div class="px-4 pt-1 pb-4 animate-scale-in">
            <div class="relative overflow-hidden rounded-[2rem] px-5 py-6">
                <div class="absolute inset-0 pointer-events-none bg-gradient-to-br from-primary/5 via-transparent to-accent/5"></div>
                <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 30% 20%, rgba(249, 115, 22, 0.1) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);"></div>

                <div class="relative z-10 flex flex-col items-center text-center">
                    <div class="relative mb-4">
                        <div class="size-24 rounded-full overflow-hidden ring-4 ring-primary/20 shadow-xl shadow-primary/10" id="avatar-wrapper">
                            <img id="profile-avatar" src="https://ui-avatars.com/api/?name=U&background=random" alt="Foto" class="w-full h-full object-cover">
                        </div>
                        <input type="file" id="photo-input" class="hidden" accept="image/*">
                        <button id="btn-edit-photo"
                            class="absolute bottom-0 right-0 size-8 bg-primary hover:bg-primary/90 text-white rounded-full flex items-center justify-center shadow-lg border-2 border-background-dark active:scale-90 transition-all duration-200">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                    </div>
                    <h1 class="font-display font-extrabold text-lg text-white">Editar Perfil</h1>
                    <p class="text-xs text-slate-500 mt-0.5">Mantenha seus dados sempre atualizados</p>
                </div>
            </div>
        </div>

        <div class="divider-gradient mx-4 mb-3"></div>

        <!-- ========== FORM ========== -->
        <main class="flex-1 px-4 pb-32 space-y-4">

            <div class="animate-slide-up delay-200">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings:'FILL'1">badge</span>
                    <h2 class="font-display font-bold text-white text-lg">Dados Pessoais</h2>
                </div>
                <div class="space-y-3.5">
                    <label class="flex flex-col">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-[0.08em] mb-1.5 ml-1">Nome completo</span>
                        <div class="relative">
                            <input id="input-nome" type="text"
                                class="input-premium w-full rounded-2xl h-14 pl-11 pr-4 text-sm font-medium"
                                placeholder="Seu nome" />
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 pointer-events-none">person</span>
                        </div>
                    </label>
                    <label class="flex flex-col">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-[0.08em] mb-1.5 ml-1">E-mail</span>
                        <div class="relative">
                            <input id="input-email" type="email"
                                class="input-premium w-full rounded-2xl h-14 pl-11 pr-4 text-sm font-medium"
                                placeholder="seu@email.com" />
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 pointer-events-none">mail</span>
                        </div>
                    </label>
                    <label class="flex flex-col">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-[0.08em] mb-1.5 ml-1">Telefone</span>
                        <div class="relative">
                            <input id="input-phone" type="tel"
                                class="input-premium w-full rounded-2xl h-14 pl-11 pr-4 text-sm font-medium"
                                placeholder="(71) 99908-8651" maxlength="15" />
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 pointer-events-none">call</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="h-2"></div>
        </main>

        <!-- ========== CTA ========== -->
        <div class="fixed bottom-0 left-0 right-0 z-30 p-4 pb-6 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent animate-slide-up delay-500">
            <button id="btn-salvar"
                class="active-scale glow-cta relative w-full h-16 rounded-2xl bg-gradient-to-br from-primary via-primary-dark to-primary font-display font-bold text-white text-base tracking-wide transition-all duration-300 flex items-center justify-center gap-3 overflow-hidden group">
                <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                <span id="save-text">Salvar Alterações</span>
                <span id="save-loader" class="material-symbols-outlined hidden animate-spin">sync</span>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container" class="fixed bottom-24 left-4 right-4 z-[60] pointer-events-none">
        <div id="toast-msg" class="hidden toast-premium mx-auto max-w-sm rounded-2xl px-5 py-4 shadow-2xl flex items-center gap-3 pointer-events-auto">
            <span id="toast-icon" class="material-symbols-outlined text-xl">check_circle</span>
            <p id="toast-text" class="text-sm font-medium flex-1 text-slate-200"></p>
        </div>
    </div>

    <script defer src="js/navigation-premium.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const sb = window.supabaseClient;
            if (!sb) return;

            const { data: { session } } = await sb.auth.getSession();
            let user = session?.user;
            let migratedUser = null;
            let isMigrado = false;

            if (!user) {
                const custom = localStorage.getItem('mcl_custom_session');
                const mig = localStorage.getItem('mcl_migrado');
                if (custom || mig) {
                    const parsed = custom ? JSON.parse(custom) : JSON.parse(mig);
                    migratedUser = parsed.user || parsed;
                    user = migratedUser;
                    isMigrado = true;
                }
            }

            if (!user) {
                window.location.href = 'loginPassageiro.html';
                return;
            }

            const avatarImg = document.getElementById('profile-avatar');
            const inputNome = document.getElementById('input-nome');
            const inputEmail = document.getElementById('input-email');
            const inputPhone = document.getElementById('input-phone');
            const btnSalvar = document.getElementById('btn-salvar');
            const saveText = document.getElementById('save-text');
            const saveLoader = document.getElementById('save-loader');
            const photoInput = document.getElementById('photo-input');
            const btnEditPhoto = document.getElementById('btn-edit-photo');
            const toastEl = document.getElementById('toast-msg');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            let toastTimer = null;

            function showToast(text, isError) {
                if (toastTimer) clearTimeout(toastTimer);
                toastIcon.textContent = isError ? 'error' : 'check_circle';
                toastText.textContent = text;
                toastEl.className = 'toast-premium mx-auto max-w-sm rounded-2xl px-5 py-4 shadow-2xl flex items-center gap-3 pointer-events-auto ' + (isError ? 'error' : 'success');
                toastEl.classList.remove('hidden');
                toastTimer = setTimeout(() => toastEl.classList.add('hidden'), 3500);
            }

            inputPhone.addEventListener('input', function () {
                let v = this.value.replace(/\D/g, '');
                if (v.length > 11) v = v.slice(0, 11);
                v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                this.value = v;
            });

            if (isMigrado) {
                inputNome.value = migratedUser.nome || '';
                inputEmail.value = migratedUser.email || '';
                const phone = migratedUser.telefone || migratedUser.number || '';
                if (phone) {
                    let v = phone.replace(/\D/g, '');
                    if (v.length > 11) v = v.slice(0, 11);
                    v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                    v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                    inputPhone.value = v;
                }
                if (migratedUser.avatar) avatarImg.src = migratedUser.avatar;
            } else if (user) {
                try {
                    const { data: p } = await sb.from('usuarios').select('nome, email, telefone, foto_perfil_url').eq('id', user.id).single();
                    if (p) {
                        inputNome.value = p.nome || '';
                        inputEmail.value = p.email || '';
                        if (p.telefone) {
                            let v = p.telefone.replace(/\D/g, '');
                            if (v.length > 11) v = v.slice(0, 11);
                            v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                            v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                            inputPhone.value = v;
                        }
                        if (p.foto_perfil_url) avatarImg.src = p.foto_perfil_url;
                    }
                } catch (e) { console.error('Erro carregar dados:', e); }
            }

            btnEditPhoto.addEventListener('click', () => photoInput.click());

            photoInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 50 * 1024 * 1024) { showToast('A imagem deve ter no máximo 50MB.', true); return; }

                const reader = new FileReader();
                reader.onload = (e) => { avatarImg.src = e.target.result; };
                reader.readAsDataURL(file);

                try {
                    btnEditPhoto.innerHTML = '<span class="material-symbols-outlined text-sm animate-spin">sync</span>';
                    btnEditPhoto.disabled = true;

                    const fileName = user.id + '/' + Date.now() + '.' + file.name.split('.').pop();
                    const { error: uploadError } = await sb.storage.from('fotos_perfil').upload(fileName, file, { upsert: true });
                    if (uploadError) throw uploadError;
                    const { data: { publicUrl } } = sb.storage.from('fotos_perfil').getPublicUrl(fileName);

                    if (isMigrado) {
                        await sb.from('users_migrados').update({ avatar: publicUrl }).eq('_id', user.id);
                        migratedUser.avatar = publicUrl;
                        localStorage.setItem('mcl_migrado', JSON.stringify(migratedUser));
                        const custom = localStorage.getItem('mcl_custom_session');
                        if (custom) { const cp = JSON.parse(custom); cp.user = cp.user || {}; cp.user.avatar = publicUrl; localStorage.setItem('mcl_custom_session', JSON.stringify(cp)); }
                    } else {
                        await sb.from('usuarios').update({ foto_perfil_url: publicUrl }).eq('id', user.id);
                    }

                    avatarImg.src = publicUrl;
                    showToast('Foto atualizada com sucesso!', false);
                } catch (error) {
                    console.error('Erro upload:', error);
                    showToast('Erro ao enviar foto.', true);
                } finally {
                    btnEditPhoto.innerHTML = '<span class="material-symbols-outlined text-sm">edit</span>';
                    btnEditPhoto.disabled = false;
                }
            });

            btnSalvar.addEventListener('click', async () => {
                const nome = inputNome.value.trim();
                const email = inputEmail.value.trim();
                const phone = inputPhone.value.trim();
                if (!nome || !email) { showToast('Preencha nome e email.', true); return; }

                btnSalvar.disabled = true;
                saveLoader.classList.remove('hidden');
                saveText.innerText = 'Salvando...';

                try {
                    if (isMigrado) {
                        const updates = { name: nome, email: email };
                        const cleanPhone = phone.replace(/\D/g, '');
                        if (cleanPhone) updates.number = cleanPhone;
                        await sb.from('users_migrados').update(updates).eq('_id', user.id);

                        migratedUser.nome = nome;
                        migratedUser.email = email;
                        if (cleanPhone) migratedUser.telefone = cleanPhone;
                        localStorage.setItem('mcl_migrado', JSON.stringify(migratedUser));
                        const custom = localStorage.getItem('mcl_custom_session');
                        if (custom) {
                            const cp = JSON.parse(custom);
                            cp.user = cp.user || {};
                            cp.user.nome = nome;
                            cp.user.email = email;
                            if (cleanPhone) cp.user.telefone = cleanPhone;
                            localStorage.setItem('mcl_custom_session', JSON.stringify(cp));
                        }
                    } else {
                        const updates = { nome, email };
                        const cleanPhone = phone.replace(/\D/g, '');
                        if (cleanPhone) updates.telefone = cleanPhone;
                        await sb.from('usuarios').update(updates).eq('id', user.id);
                    }

                    showToast('Dados atualizados com sucesso!', false);
                } catch (error) {
                    console.error('Erro salvar:', error);
                    showToast('Erro ao salvar: ' + (error.message || 'desconhecido'), true);
                } finally {
                    btnSalvar.disabled = false;
                    saveLoader.classList.add('hidden');
                    saveText.innerText = 'Salvar Alterações';
                }
            });
        });
    </script>
</body>
</html>
