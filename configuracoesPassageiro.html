<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>ConfiguraÃ§Ãµes - Meu Carro de Linha Salinas</title>
    <script src="/js/tailwind-cdn.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "success": "#10b981",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                        "accent-blue": "#272e45"
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    keyframes: {
                        "slide-up": { "0%": { transform: "translateY(20px)", opacity: "0" }, "100%": { transform: "translateY(0)", opacity: "1" } },
                        "fade-in": { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
                        "scale-in": { "0%": { transform: "scale(0.95)", opacity: "0" }, "100%": { transform: "scale(1)", opacity: "1" } }
                    },
                    animation: { "slide-up": "slide-up 0.4s ease-out", "fade-in": "fade-in 0.3s ease-out", "scale-in": "scale-in 0.2s ease-out" }
                },
            },
        }
    </script>
    <style>
        main > * { animation: slide-up 0.4s ease-out both; }
        main > *:nth-child(1) { animation-delay: 0.05s; }
        main > *:nth-child(2) { animation-delay: 0.1s; }
        main > *:nth-child(3) { animation-delay: 0.15s; }
        .toast { animation: slide-up 0.35s ease-out, fade-in 0.3s ease-out; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">
        <header class="sticky top-0 z-50 flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 border-b border-white/10">
            <a href="perfilPassageiro.html" class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">ConfiguraÃ§Ãµes</h1>
            <div class="size-10"></div>
        </header>

        <main class="flex-1 overflow-y-auto px-4 pt-6 pb-8 no-scrollbar">
            <div class="flex flex-col items-center mb-8">
                <div class="relative">
                    <div class="size-28 rounded-full border-4 border-primary/20 overflow-hidden bg-slate-200 dark:bg-slate-700 shadow-lg shadow-primary/5">
                        <img id="profile-avatar" src="https://ui-avatars.com/api/?name=U&background=random" alt="Foto" class="w-full h-full object-cover">
                    </div>
                    <input type="file" id="photo-input" class="hidden" accept="image/*">
                    <button id="btn-edit-photo" class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full border-2 border-background-light dark:border-background-dark flex items-center justify-center shadow-lg active:scale-95 transition-transform hover:bg-primary/90">
                        <span class="material-symbols-outlined text-sm">edit</span>
                    </button>
                    <span id="photo-status" class="text-[10px] text-green-400 text-center block mt-2 hidden">Foto atualizada</span>
                </div>
            </div>

            <div class="space-y-6 mb-8">
                <div class="bg-white dark:bg-slate-800/80 rounded-2xl p-5 border border-slate-200 dark:border-slate-700/50 shadow-sm space-y-5">
                    <div class="flex items-center gap-3 pb-3 border-b border-slate-100 dark:border-slate-700/30">
                        <div class="size-9 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
                            <span class="material-symbols-outlined">person</span>
                        </div>
                        <div>
                            <p class="font-bold text-sm">Dados Pessoais</p>
                            <p class="text-xs text-slate-500">Suas informaÃ§Ãµes de perfil</p>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 px-1" for="input-nome">Nome completo</label>
                        <input id="input-nome" type="text" class="w-full h-12 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-700/50 px-4 text-sm text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" placeholder="Seu nome" />
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 px-1" for="input-email">E-mail</label>
                        <input id="input-email" type="email" class="w-full h-12 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-700/50 px-4 text-sm text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" placeholder="seu@email.com" />
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 px-1" for="input-phone">Telefone</label>
                        <input id="input-phone" type="tel" class="w-full h-12 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-700/50 px-4 text-sm text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" placeholder="(99) 99999-9999" maxlength="15" />
                    </div>
                </div>
            </div>

            <button id="btn-salvar" class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-2xl transition-all shadow-lg shadow-primary/20 active-scale flex items-center justify-center gap-2 text-base">
                <span id="save-text">Salvar AlteraÃ§Ãµes</span>
                <span id="save-loader" class="material-symbols-outlined animate-spin hidden">sync</span>
            </button>

            <div id="toast-container" class="fixed bottom-24 left-4 right-4 z-[60] pointer-events-none">
                <div id="toast-msg" class="toast hidden mx-auto max-w-sm rounded-xl px-5 py-4 shadow-2xl flex items-center gap-3 pointer-events-auto backdrop-blur-md">
                    <span id="toast-icon" class="material-symbols-outlined text-xl">check_circle</span>
                    <p id="toast-text" class="text-sm font-medium flex-1"></p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const sb = window.supabaseClient;
            if (!sb) return;

            const { data: { session } } = await sb.auth.getSession();
            let user = session?.user;
            let migratedUser = null;
            let isMigrado = false;

            if (!user) {
                const custom = localStorage.getItem('mcl_custom_session');
                const mig = localStorage.getItem('mcl_migrado');
                if (custom || mig) {
                    const parsed = custom ? JSON.parse(custom) : JSON.parse(mig);
                    migratedUser = parsed.user || parsed;
                    user = migratedUser;
                    isMigrado = true;
                }
            }

            if (!user) {
                window.location.href = 'loginPassageiro.html';
                return;
            }

            const avatarImg = document.getElementById('profile-avatar');
            const inputNome = document.getElementById('input-nome');
            const inputEmail = document.getElementById('input-email');
            const inputPhone = document.getElementById('input-phone');
            const btnSalvar = document.getElementById('btn-salvar');
            const saveText = document.getElementById('save-text');
            const saveLoader = document.getElementById('save-loader');
            const photoInput = document.getElementById('photo-input');
            const btnEditPhoto = document.getElementById('btn-edit-photo');
            const photoStatus = document.getElementById('photo-status');
            const toastEl = document.getElementById('toast-msg');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            let toastTimer = null;

            function showToast(text, isError) {
                if (toastTimer) clearTimeout(toastTimer);
                toastIcon.textContent = isError ? 'error' : 'check_circle';
                toastText.textContent = text;
                toastEl.className = 'toast mx-auto max-w-sm rounded-xl px-5 py-4 shadow-2xl flex items-center gap-3 pointer-events-auto backdrop-blur-md ' + (isError ? 'bg-red-600/90 text-white' : 'bg-green-600/90 text-white');
                toastEl.classList.remove('hidden');
                toastTimer = setTimeout(() => toastEl.classList.add('hidden'), 3500);
            }

            // Phone mask
            inputPhone.addEventListener('input', function () {
                let v = this.value.replace(/\D/g, '');
                if (v.length > 11) v = v.slice(0, 11);
                v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                this.value = v;
            });

            // Load current data
            if (isMigrado) {
                inputNome.value = migratedUser.nome || '';
                inputEmail.value = migratedUser.email || '';
                const phone = migratedUser.telefone || migratedUser.number || '';
                if (phone) {
                    let v = phone.replace(/\D/g, '');
                    if (v.length > 11) v = v.slice(0, 11);
                    v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                    v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                    inputPhone.value = v;
                }
                if (migratedUser.avatar) avatarImg.src = migratedUser.avatar;
            } else if (user) {
                try {
                    const { data: p } = await sb.from('usuarios').select('nome, email, telefone, foto_perfil_url').eq('id', user.id).single();
                    if (p) {
                        inputNome.value = p.nome || '';
                        inputEmail.value = p.email || '';
                        if (p.telefone) {
                            let v = p.telefone.replace(/\D/g, '');
                            if (v.length > 11) v = v.slice(0, 11);
                            v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                            v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                            inputPhone.value = v;
                        }
                        if (p.foto_perfil_url) avatarImg.src = p.foto_perfil_url;
                    }
                } catch (e) { console.error('Erro carregar dados:', e); }
            }

            // Photo upload
            btnEditPhoto.addEventListener('click', () => photoInput.click());

            photoInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 50 * 1024 * 1024) { showToast('A imagem deve ter no mÃ¡ximo 50MB.', true); return; }

                const reader = new FileReader();
                reader.onload = (e) => { avatarImg.src = e.target.result; };
                reader.readAsDataURL(file);

                try {
                    btnEditPhoto.innerHTML = '<span class="material-symbols-outlined text-sm animate-spin">sync</span>';
                    btnEditPhoto.disabled = true;

                    const fileName = user.id + '/' + Date.now() + '.' + file.name.split('.').pop();
                    const { error: uploadError } = await sb.storage.from('fotos_perfil').upload(fileName, file, { upsert: true });
                    if (uploadError) throw uploadError;
                    const { data: { publicUrl } } = sb.storage.from('fotos_perfil').getPublicUrl(fileName);

                    if (isMigrado) {
                        await sb.from('users_migrados').update({ avatar: publicUrl }).eq('_id', user.id);
                        migratedUser.avatar = publicUrl;
                        localStorage.setItem('mcl_migrado', JSON.stringify(migratedUser));
                        const custom = localStorage.getItem('mcl_custom_session');
                        if (custom) { const cp = JSON.parse(custom); cp.user = cp.user || {}; cp.user.avatar = publicUrl; localStorage.setItem('mcl_custom_session', JSON.stringify(cp)); }
                    } else {
                        await sb.from('usuarios').update({ foto_perfil_url: publicUrl }).eq('id', user.id);
                    }

                    avatarImg.src = publicUrl;
                    photoStatus.classList.remove('hidden');
                    setTimeout(() => photoStatus.classList.add('hidden'), 3000);
                } catch (error) {
                    console.error('Erro upload:', error);
                    showToast('Erro ao enviar foto.', true);
                } finally {
                    btnEditPhoto.innerHTML = '<span class="material-symbols-outlined text-sm">edit</span>';
                    btnEditPhoto.disabled = false;
                }
            });

            // Save data
            btnSalvar.addEventListener('click', async () => {
                const nome = inputNome.value.trim();
                const email = inputEmail.value.trim();
                const phone = inputPhone.value.trim();
                if (!nome || !email) { showToast('Preencha nome e email.', true); return; }

                btnSalvar.disabled = true;
                saveLoader.classList.remove('hidden');
                saveText.innerText = 'Salvando...';

                try {
                    if (isMigrado) {
                        const updates = { name: nome, email: email };
                        const cleanPhone = phone.replace(/\D/g, '');
                        if (cleanPhone) updates.number = cleanPhone;
                        await sb.from('users_migrados').update(updates).eq('_id', user.id);

                        migratedUser.nome = nome;
                        migratedUser.email = email;
                        if (cleanPhone) migratedUser.telefone = cleanPhone;
                        localStorage.setItem('mcl_migrado', JSON.stringify(migratedUser));
                        const custom = localStorage.getItem('mcl_custom_session');
                        if (custom) {
                            const cp = JSON.parse(custom);
                            cp.user = cp.user || {};
                            cp.user.nome = nome;
                            cp.user.email = email;
                            if (cleanPhone) cp.user.telefone = cleanPhone;
                            localStorage.setItem('mcl_custom_session', JSON.stringify(cp));
                        }
                    } else {
                        const updates = { nome, email };
                        const cleanPhone = phone.replace(/\D/g, '');
                        if (cleanPhone) updates.telefone = cleanPhone;
                        await sb.from('usuarios').update(updates).eq('id', user.id);
                    }

                    showToast('Dados atualizados com sucesso!', false);
                } catch (error) {
                    console.error('Erro salvar:', error);
                    showToast('Erro ao salvar: ' + (error.message || 'desconhecido'), true);
                } finally {
                    btnSalvar.disabled = false;
                    saveLoader.classList.add('hidden');
                    saveText.innerText = 'Salvar AlteraÃ§Ãµes';
                }
            });
        });
    </script>
</body>
</html>
