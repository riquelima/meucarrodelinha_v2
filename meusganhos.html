<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Meus Ganhos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "success": "#22c55e",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                        "border-dark": "#2d3446",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="page-container">
        <!-- Header -->
        <header
            class="flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 shadow-sm z-20 shrink-0 border-b border-white/10 sticky top-0">
            <a href="motorista.html"
                class="text-white p-2 -ml-2 rounded-full hover:bg-white/20 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-lg font-bold text-white">Meus Ganhos</h1>
            <div class="w-10"></div>
        </header>

        <!-- Main Content -->
        <main class="page-content px-4 pt-6 no-scrollbar">
            <!-- Balance Card -->
            <div class="bg-primary p-6 rounded-2xl shadow-xl shadow-primary/20 mb-8 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                <p class="text-white/80 text-xs font-bold uppercase tracking-widest mb-1">Ganhos Totais</p>
                <h2 id="total-earnings" class="text-4xl font-black text-white mb-6">R$ 0,00</h2>
                <div class="flex gap-4">
                    <div class="flex-1 bg-white/10 p-3 rounded-xl backdrop-blur-sm">
                        <p class="text-white/60 text-[10px] uppercase font-bold">Hoje</p>
                        <p id="today-earnings" class="text-white font-bold text-lg">R$ 0,00</p>
                    </div>
                    <div class="flex-1 bg-white/10 p-3 rounded-xl backdrop-blur-sm">
                        <p class="text-white/60 text-[10px] uppercase font-bold">Semana</p>
                        <p id="week-earnings" class="text-white font-bold text-lg">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <!-- History -->
            <div class="space-y-4">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-slate-900 dark:text-slate-100">Últimos Lançamentos</h3>
                </div>

                <!-- Transactions List -->
                <div id="transactions-list" class="space-y-4">
                    <div class="flex flex-col items-center justify-center py-10 text-slate-500">
                        <span class="material-symbols-outlined animate-spin mb-2">sync</span>
                        <p>Carregando ganhos...</p>
                    </div>
                </div>
        </main>

        <!-- Navigation Bar -->
        <nav class="fixed-navbar" id="main-nav">
            <a href="motorista.html" id="nav-home">
                <span class="material-symbols-outlined">home</span>
                <span>Início</span>
            </a>
            <a class="nav-active" href="meusganhos.html" id="nav-earnings">
                <span class="material-symbols-outlined">payments</span>
                <span>Ganhos</span>
            </a>
            <a href="mensagensMotorista.html" id="nav-chats">
                <span class="material-symbols-outlined">chat</span>
                <span>Chat</span>
                <span id="chat-badge" class="chat-badge hidden absolute top-0 right-4 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-background-dark">0</span>
            </a>
            <a href="historicoViagens.html" id="nav-history">
                <span class="material-symbols-outlined">history</span>
                <span>Histórico</span>
            </a>
            <a href="perfilMotorista.html" id="nav-profile">
                <span class="material-symbols-outlined">account_circle</span>
                <span>Perfil</span>
            </a>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
    <script src="js/pwa-register.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = window.supabaseClient;
            const totalEl = document.getElementById('total-earnings');
            const todayEl = document.getElementById('today-earnings');
            const weekEl = document.getElementById('week-earnings');
            const listEl = document.getElementById('transactions-list');

            // Auth Check
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'loginMotorista.html';
                return;
            }

            // Fetch Trips
            const { data: trips, error } = await supabase
                .from('viagens')
                .select('*')
                .eq('motorista_id', user.id)
                .eq('status', 'Finalizado')
                .order('criado_em', { ascending: false });

            if (error) {
                console.error('Error fetching earnings:', error);
                listEl.innerHTML = '<p class="text-center text-red-500">Erro ao carregar dados.</p>';
                return;
            }

            // Calculations
            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            // Week start (Sunday)
            const startOfWeek = new Date(startOfDay);
            startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

            let total = 0;
            let today = 0;
            let week = 0;

            trips.forEach(trip => {
                const val = parseFloat(trip.valor_final || 0);
                const date = new Date(trip.criado_em);

                total += val;

                if (date >= startOfDay) {
                    today += val;
                }

                if (date >= startOfWeek) {
                    week += val;
                }
            });

            // Update UI
            const formatCurrency = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            totalEl.textContent = formatCurrency(total);
            todayEl.textContent = formatCurrency(today);
            weekEl.textContent = formatCurrency(week);

            // Render List
            if (trips.length === 0) {
                listEl.innerHTML = '<p class="text-center text-slate-500 py-10">Nenhuma viagem finalizada ainda.</p>';
                return;
            }

            listEl.innerHTML = '';
            trips.forEach(trip => {
                const date = new Date(trip.criado_em);
                const isToday = date >= startOfDay;
                const dateStr = isToday 
                    ? `Hoje, ${date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`
                    : date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

                const item = document.createElement('div');
                item.className = 'bg-white dark:bg-surface-dark p-4 rounded-xl border border-slate-200 dark:border-border-dark flex items-center gap-4 animate-slide-up';
                item.innerHTML = `
                    <div class="size-10 rounded-lg bg-success/10 text-success flex items-center justify-center">
                        <span class="material-symbols-outlined">add_circle</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm">Viagem #${trip.id.substring(0, 8)}</p>
                        <p class="text-xs text-slate-500">${dateStr}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-success">${formatCurrency(trip.valor_final || 0)}</p>
                        <p class="text-[10px] text-slate-400">Finalizada</p>
                    </div>
                `;
                listEl.appendChild(item);
            });
        });
    </script>
</body>

</html>
