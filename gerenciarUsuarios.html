<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Gerenciar Usuários</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f38bd",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101422",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Stagger Delays */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .delay-400 {
            animation-delay: 400ms;
        }

        .delay-500 {
            animation-delay: 500ms;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <!-- Top Navigation & Header -->
    <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="flex items-center justify-between py-3 px-4 max-w-2xl mx-auto w-full">
            <a href="admin.html" class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">
                Gerenciar Usuários</h1>
            <div class="size-10"></div>
        </div>
        <!-- Tab Bar -->
        <div class="max-w-2xl mx-auto w-full px-4">
            <div class="flex border-b border-white/10">
                <button id="tab-motoristas" class="flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-4 flex-1">
                    <span class="text-sm font-bold tracking-wide">Motoristas</span>
                </button>
                <button id="tab-passageiros" class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 flex-1 hover:text-primary transition-colors">
                    <span class="text-sm font-bold tracking-wide">Passageiros</span>
                </button>
            </div>
        </div>
    </header>
    <main class="max-w-2xl mx-auto w-full p-4 space-y-4">
        <!-- Search Bar -->
        <div class="relative">
            <label class="flex flex-col w-full group">
                <div
                    class="flex w-full items-stretch rounded-xl h-12 bg-slate-200 dark:bg-slate-800 focus-within:ring-2 ring-primary/50 transition-all">
                    <div class="text-slate-500 dark:text-slate-400 flex items-center justify-center pl-4">
                        <span class="material-symbols-outlined">search</span>
                    </div>
                    <input
                        class="w-full bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-500 dark:placeholder:text-slate-400 px-3 text-base"
                        placeholder="Pesquisar motoristas em Salinas..." value="" />
                    <div class="text-slate-500 dark:text-slate-400 flex items-center justify-center pr-4">
                        <span class="material-symbols-outlined text-xl">tune</span>
                    </div>
                </div>
            </label>
        </div>

        <!-- User List -->
        <div id="drivers-list" class="space-y-3">
            <!-- Managed by gerenciar-usuarios.js -->
        </div>

        <div id="passengers-list" class="space-y-3 hidden">
            <!-- Managed by gerenciar-usuarios.js -->
        </div>
        <!-- Pagination/Footer State Info -->
        <div class="py-6 text-center pb-24">
            <p class="text-slate-500 dark:text-slate-400 text-xs">Carregando...</p>
            <button
                class="mt-4 text-primary font-bold text-sm px-6 py-2 rounded-full bg-primary/10 hover:bg-primary/20 transition-colors hidden">
                Carregar mais
            </button>
        </div>
    </main>
    <!-- Floating Action Button (Optional for Admin Screens) -->
    <!-- Edit User Modal -->
    <div id="edit-user-modal"
        class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300"
        role="dialog" aria-modal="true">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl border border-slate-800 overflow-hidden transform scale-95 transition-transform duration-300"
            onclick="event.stopPropagation()">
            <!-- Modal Header -->
            <div class="flex items-center justify-between p-6 border-b border-slate-800">
                <h2 class="text-xl font-bold text-white">Editar Usuário</h2>
                <button class="text-slate-400 hover:text-white transition-colors" onclick="closeModal()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <!-- Modal Body / Form -->
            <form class="p-6 space-y-4" onsubmit="event.preventDefault();">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300" for="nome">Nome Completo</label>
                    <input
                        class="w-full bg-slate-800 border-slate-700 rounded-lg text-white focus:ring-primary focus:border-primary placeholder:text-slate-500"
                        id="nome" type="text" value="" />
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300" for="email">E-mail</label>
                    <input
                        class="w-full bg-slate-800 border-slate-700 rounded-lg text-white focus:ring-primary focus:border-primary placeholder:text-slate-500"
                        id="email" type="email" value="" />
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300" for="telefone">Telefone</label>
                    <input
                        class="w-full bg-slate-800 border-slate-700 rounded-lg text-white focus:ring-primary focus:border-primary placeholder:text-slate-500"
                        id="telefone" type="tel" value="" />
                </div>
            </form>
            <!-- Modal Footer -->
            <div class="p-6 pt-0 flex gap-3">
                <button
                    class="flex-1 px-4 py-2.5 rounded-lg font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition-colors"
                    onclick="closeModal()">
                    Cancelar
                </button>
                <button
                    class="flex-1 px-4 py-2.5 rounded-lg font-bold text-white bg-[#1e40af] hover:bg-blue-700 transition-colors shadow-lg shadow-blue-900/20"
                    onclick="saveUser()">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-user-modal"
        class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300"
        role="dialog" aria-modal="true">
        <div class="bg-slate-900 w-full max-w-sm rounded-2xl shadow-2xl border border-slate-800 overflow-hidden transform scale-95 transition-transform duration-300"
            onclick="event.stopPropagation()">
            <!-- Modal Body -->
            <div class="p-6 text-center">
                <div
                    class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-red-500/10 text-red-500 mb-4">
                    <span class="material-symbols-outlined text-4xl">warning</span>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Excluir Usuário</h3>
                <p class="text-slate-400 text-sm">
                    Atenção: Tem certeza que deseja excluir o usuário <strong id="delete-user-name"
                        class="text-white"></strong>? Esta ação removerá permanentemente os dados deste usuário do
                    sistema.
                </p>
            </div>
            <!-- Modal Footer -->
            <div class="p-6 pt-0 flex flex-col gap-3">
                <button
                    class="w-full rounded-lg bg-red-600 px-4 py-3 text-sm font-bold text-white hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20 text-center flex items-center justify-center"
                    onclick="confirmDeleteUser()" id="confirm-delete-btn">
                    Sim, Excluir Agora
                </button>
                <button
                    class="w-full rounded-lg bg-slate-800 px-4 py-3 text-sm font-bold text-slate-300 hover:bg-slate-700 transition-colors text-center"
                    onclick="closeDeleteModal()">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/pwa-register.js"></script>
    <script src="js/gerenciar-usuarios.js?v=3"></script>

    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl px-4 pb-6 pt-2 z-50">
        <div class="flex gap-2 max-w-lg mx-auto">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="admin.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">dashboard</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Painel</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="gerenciarUsuarios.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">group</span>
                </div>
                <p class="text-[10px] font-bold leading-normal tracking-tight">Usuários</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400"
                href="historicoGeral.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">route</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Corridas</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400"
                href="perfilAdministrador.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">settings</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Ajustes</p>
            </a>
        </div>
    </nav>
</body>

</html>
