<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                        "background-dark": "#121520",

    <title>Login do Passageiro - Salinas</title>

        }
        .ios-input-focus:focus-within {
            @apply border-primary ring-1 ring-primary;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex min-h-screen w-full flex-col p-6 overflow-y-auto pt-16">
        <!-- Back Button - Top Left Screen -->

        <div class="w-full flex items-center justify-center mb-10 mt-6">

                <div
                    class="size-20 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-5xl text-white fill-1">directions_car</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Meu Carro de Linha</h1>
                <p class="text-slate-400 font-medium">Salinas - PA</p>

        </div>
        <div class="mb-8">
            <h2 class="text-xl font-bold text-white">Olá, passageiro!</h2>
            <p class="text-slate-400 text-sm">Faça login para começar sua viagem.</p>
        </div>
        <form class="space-y-4" onsubmit="return false;">

                    <span class="material-symbols-outlined absolute left-4 text-slate-500">mail</span>
                    <input
                        class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="seu@email.com" type="email" />
                </div>
            </div>
            <div class="space-y-1.5">
                <div class="flex justify-between items-center px-1">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Senha</label>
                    <a class="text-xs font-bold text-primary" href="#">Esqueci minha senha</a>
                </div>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">

                    <input
                        class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-white placeholder:text-slate-600 focus:ring-0"

                    <button class="absolute right-4 text-slate-500" type="button">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <button
                class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all mt-4 active:scale-[0.98]"
                type="submit">
                Entrar
            </button>
        </form>
        <div class="mt-8 text-center">
            <p class="text-slate-400 text-sm">
                Não tem uma conta?
                <a class="text-primary font-bold ml-1" href="criarConta.html">Cadastre-se</a>
            </p>
        </div>
        <div class="relative my-10">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-800"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-background-dark px-4 text-slate-500 font-medium tracking-widest">Ou entre com</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-10">
            <button
                class="flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl bg-white text-slate-900 font-semibold text-sm transition-all active:scale-[0.98]">
                <img alt="Google" class="size-5"

            <button
                class="flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl bg-slate-900 border border-slate-800 text-white font-semibold text-sm transition-all active:scale-[0.98]">
                <img alt="Apple" class="size-5 invert"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCs81WzBL_B5nLpgyiN3ozzMdggYbUf3dwEI8aZqswSKzx4AR0nYrXfQqokEzJOWh4kWInp_nXb2cAGrWX0IH_4NeGRTzZaBKXjzn9g-_ILMsdG9eSNrAoKwC5fMwVf2pKNJ1z0O29VMmyUXSWusrxhCsBlMtpEPUkkAMnASRDJEpiUU_v0KR-gJJ5omNk2hmpsjJWct-jyqECu4E7Uo_UBfRCv8JA5wiqbw42XDfCxuekWpaU_IrtJhBvPyphM7igs7kTatTu3rirU" />

            </button>
        </div>
        <footer class="mt-auto pb-6 text-center">
            <p class="text-[10px] text-slate-600 uppercase tracking-widest">
                Segurança e Praticidade em Salinas
            </p>
        </footer>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
</body>

</html>
