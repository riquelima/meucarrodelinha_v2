<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Social Share & PWA Icons -->
    <meta property="og:title" content="Login do Passageiro - Salinas">
    <meta property="og:description" content="Chame seu transporte em Salinas da Margarida, BA">
    <meta property="og:image" content="https://meucarrodelinhasalinas.vercel.app/splashScreen.jpeg">
    <meta property="og:url" content="https://meucarrodelinhasalinas.vercel.app/loginPassageiro.html">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/jpeg" href="/splashScreen.jpeg">
    <link rel="apple-touch-icon" href="/splashScreen.jpeg">

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>Login do Passageiro - Salinas</title>
    <style type="text/tailwindcss">
        body {
            min-height: 100dvh;
        }
        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }
        .ios-input-focus:focus-within {
            @apply border-primary ring-1 ring-primary;
        }
    
        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex min-h-screen w-full flex-col p-6 overflow-y-auto pt-16">
        <!-- Back Button - Top Left Screen -->
        <a href="homepage.html"
            class="absolute top-6 left-6 size-10 flex items-center justify-center rounded-xl bg-slate-800 text-slate-200 hover:text-white hover:bg-slate-700 transition-colors shadow-md">
            <span class="material-symbols-outlined text-2xl">chevron_left</span>
        </a>

        <div class="w-full flex items-center justify-center mb-2 mt-4">
            <header class="flex flex-col items-center w-full">
                <img src="logoLoginPassageiro.png" alt="Logo Meu Carro de Linha"
                    class="w-full max-w-[320px] object-contain drop-shadow-2xl mx-auto">
            </header>
        </div>
        <div class="mb-6 text-center">
            <p class="text-slate-400 text-sm">Faça login para começar sua viagem.</p>
        </div>
        <form class="space-y-4 animate-slide-up delay-100" onsubmit="handleLogin(event)">
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">E-mail</label>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">
                    <span class="material-symbols-outlined absolute left-4 text-slate-500">mail</span>
                    <input id="email" required
                        class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="seu@email.com" type="email" />
                </div>
            </div>
            <div class="space-y-1.5">
                <div class="flex justify-between items-center px-1">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Senha</label>
                    <a class="text-xs font-bold text-primary" href="#">Esqueci minha senha</a>
                </div>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">
                    <span class="material-symbols-outlined absolute left-4 text-slate-500">lock</span>
                    <input id="senha" required
                        class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="••••••••" type="password" />
                    <button class="absolute right-4 text-slate-500" type="button"
                        onclick="const p = document.getElementById('senha'); p.type = p.type === 'password' ? 'text' : 'password';">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <button id="btn-login"
                class="active-scale w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all mt-4"
                type="submit">
                Entrar
            </button>
        </form>
        <div class="mt-8 text-center">
            <p class="text-slate-400 text-sm">
                Não tem uma conta?
                <a class="text-primary font-bold ml-1" href="criarConta.html">Cadastre-se</a>
            </p>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const btn = document.getElementById('btn-login');
            const originalText = btn.textContent;
            btn.textContent = 'Aguarde...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;

            const result = await signIn(email, password);
            if (result.success) {
                document.body.classList.add('fade-out');

                // Consulta o tipo_usuario na tabela do banco (não nos user_metadata)
                try {
                    const userId = result.data.user.id;
                    const { data: usuarioData } = await supabaseClient
                        .from('usuarios')
                        .select('tipo_usuario')
                        .eq('id', userId)
                        .single();

                    const tipoUsuario = usuarioData?.tipo_usuario;
                    let destino = 'passageiro.html';
                    if (tipoUsuario === 'admin') {
                        destino = 'admin.html';
                    } else if (tipoUsuario === 'motorista') {
                        destino = 'motorista.html';
                    }
                    setTimeout(() => { window.location.href = destino; }, 200);
                } catch (err) {
                    console.error('Erro ao verificar tipo de usuário:', err);
                    setTimeout(() => { window.location.href = 'passageiro.html'; }, 200);
                }
            } else {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
    <script src="js/pwa-register.js"></script>
</body>

</html>
