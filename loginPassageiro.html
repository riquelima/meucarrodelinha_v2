<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <meta property="og:title" content="Login do Passageiro - Salinas">
    <meta property="og:description" content="Chame seu transporte em Salinas da Margarida, BA">
    <meta property="og:image" content="https://meucarrodelinhasalinas.vercel.app/splashScreen.jpeg">
    <meta property="og:url" content="https://meucarrodelinhasalinas.vercel.app/loginPassageiro.html">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/jpeg" href="/splashScreen.jpeg">
    <link rel="apple-touch-icon" href="/splashScreen.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Login - Meu Carro de Linha Salinas</title>
    <script>if('scrollRestoration' in history)history.scrollRestoration='manual';window.scrollTo(0,0);</script>
    <script src="/js/tailwind-cdn.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "primary-dark": "#ea580c",
                        "accent": "#00d4ff",
                        "background-dark": "#0f1320",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        .animate-fade-in { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-up { opacity: 0; transform: translateY(24px); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scale-in { opacity: 0; transform: scale(0.92); animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.15), 0 0 40px rgba(249, 115, 22, 0.05); }
            50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.3), 0 0 60px rgba(249, 115, 22, 0.1); }
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-600 { animation-delay: 600ms; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .input-premium {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .input-premium:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1), 0 0 20px rgba(249, 115, 22, 0.05);
            outline: none;
            background: rgba(255, 255, 255, 0.06);
        }
        .input-premium::placeholder {
            color: rgba(148, 163, 184, 0.4);
        }
        .glow-primary {
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.08), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-cta {
            animation: pulseGlow 3s ease-in-out infinite;
        }
        .gradient-text {
            background: linear-gradient(135deg, #f97316 0%, #ff8c42 50%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bg-premium-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .divider-gradient {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.15), rgba(0, 212, 255, 0.1), transparent);
        }
        .logo-glow {
            filter: drop-shadow(0 8px 32px rgba(249, 115, 22, 0.12));
        }
        body { animation: fadeIn 0.3s ease-in-out; }
        body.fade-out { animation: fadeOut 0.2s ease-in-out forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>

<body class="bg-background-dark font-body text-slate-100 antialiased bg-premium-grid overflow-hidden">
    <div class="relative min-h-screen flex flex-col overflow-y-auto">

        <!-- Decorative glow -->
        <div class="fixed top-20 right-10 w-72 h-72 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="fixed bottom-40 left-10 w-60 h-60 bg-accent/5 rounded-full blur-[100px] pointer-events-none"></div>

        <!-- ========== HERO ========== -->
        <div class="relative z-10 px-4 pt-2 pb-2 animate-scale-in">
            <div class="relative overflow-hidden rounded-[2rem] px-5 py-7">

                <!-- Back Button -->
                <a href="homepage.html"
                    class="active-scale absolute top-4 left-4 z-20 flex items-center justify-center size-9 rounded-xl glass-card text-slate-400 hover:text-white hover:border-white/20 transition-all duration-300 shadow-lg shadow-black/20">
                    <span class="material-symbols-outlined text-xl">arrow_back</span>
                </a>
                <div class="absolute inset-0 pointer-events-none bg-gradient-to-br from-primary/5 via-transparent to-accent/5"></div>
                <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 30% 20%, rgba(249, 115, 22, 0.1) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);"></div>

                <div class="relative z-10 flex flex-col items-center text-center">
                    <img src="logoLoginPassageiro.png" alt="Meu Carro de Linha" loading="eager" decoding="async"
                        class="w-full max-w-[260px] object-contain logo-glow mx-auto mb-5">

                    <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/10 border border-primary/20 mb-3">
                        <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings:'FILL'1">near_me</span>
                        <span class="text-[10px] font-bold text-primary uppercase tracking-[0.15em]">Passageiro</span>
                    </div>

                    <h1 class="font-display font-extrabold leading-[1.1] tracking-tight text-white"
                        style="font-size: clamp(24px, 6vw, 36px);">
                        Sua viagem<br />
                        <span class="gradient-text">começa aqui</span>
                    </h1>

                    <p class="mt-2 text-slate-400 font-medium leading-relaxed max-w-xs mx-auto"
                        style="font-size: clamp(13px, 3vw, 16px);">
                        Faça login e encontre motoristas disponíveis perto de você.
                    </p>
                </div>
            </div>
        </div>

        <div class="divider-gradient mx-4 mb-4"></div>

        <!-- ========== FORM ========== -->
        <div class="px-4 flex-1">
            <form class="space-y-4 animate-slide-up delay-200" onsubmit="handleLogin(event)">
                <label class="flex flex-col">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-[0.08em] mb-1.5 ml-1">E-mail</span>
                    <div class="relative">
                        <input id="email" required autocomplete="email"
                            class="input-premium w-full rounded-2xl h-14 pl-11 pr-4 text-sm font-medium"
                            placeholder="seu@email.com" type="email" oninput="checkEmailLogin(this.value)" />
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 pointer-events-none">mail</span>
                    </div>
                </label>

                <div id="senha-container" class="flex flex-col">
                    <label class="flex flex-col">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-[0.08em] mb-1.5 ml-1">Senha</span>
                        <div class="relative">
                            <input id="senha"
                                class="input-premium w-full rounded-2xl h-14 pl-11 pr-12 text-sm font-medium"
                                placeholder="Digite sua senha" type="password" />
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 pointer-events-none">lock</span>
                            <button type="button" onclick="const p = document.getElementById('senha'); p.type = p.type === 'password' ? 'text' : 'password';"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 p-1 transition-colors">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                    </label>
                </div>

                <button id="btn-login" type="submit"
                    class="active-scale glow-cta relative w-full h-14 rounded-2xl bg-gradient-to-br from-primary via-primary-dark to-primary font-display font-bold text-white text-sm tracking-wide transition-all duration-300 flex items-center justify-center gap-2 overflow-hidden group mt-2">
                    <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                    <span>Entrar</span>
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </form>

            <div class="mt-6 text-center animate-slide-up delay-300">
                <p class="text-sm text-slate-500">
                    Não tem uma conta?
                    <a class="text-primary font-bold hover:text-primary/80 transition-colors" href="criarConta.html">Cadastre-se</a>
                </p>
            </div>

            <div class="mt-8 pb-8 text-center">
                <p class="text-[10px] text-slate-600 uppercase tracking-[0.15em] font-medium">
                    Segurança e praticidade em Salinas
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const EDGE_AUTH_URL = 'https://gnhsfrwixhhcdsbyyqhg.supabase.co/functions/v1/auth-migrado';

        let migratedUserFound = false;

        async function checkEmailLogin(email) {
            const container = document.getElementById('senha-container');
            const senhaInput = document.getElementById('senha');

            if (!email || !email.includes('@')) {
                container.style.display = '';
                senhaInput.required = true;
                migratedUserFound = false;
                return;
            }

            try {
                const res = await fetch(EDGE_AUTH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email.toLowerCase().trim(), checkOnly: true })
                });

                if (res.ok) {
                    const data = await res.json();
                    if (data.exists) {
                        container.style.display = 'none';
                        senhaInput.required = false;
                        migratedUserFound = true;
                        return;
                    }
                }
            } catch (e) {
                console.warn('Erro ao verificar email:', e);
            }

            container.style.display = '';
            senhaInput.required = true;
            migratedUserFound = false;
        }

        async function handleLogin(event) {
            event.preventDefault();

            const btn = document.getElementById('btn-login');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="font-bold">Entrando...</span>
            `;
            btn.disabled = true;

            const email = document.getElementById('email').value.trim().toLowerCase();

            if (migratedUserFound) {
                try {
                    const res = await fetch(EDGE_AUTH_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();

                    if (data.success && data.migrado) {
                        localStorage.setItem('mcl_migrado', JSON.stringify(data.user));
                        localStorage.setItem('mcl_custom_session', JSON.stringify({ user: data.user }));
                        document.body.classList.add('fade-out');
                        var destino = data.user.tipo_usuario === 'admin' ? 'admin.html' :
                                      data.user.tipo_usuario === 'motorista' ? 'motorista.html' : 'passageiro.html';
                        setTimeout(() => { window.location.href = destino; }, 200);
                        return;
                    }
                } catch (e) {
                    console.warn('Erro no login migrado:', e);
                }

                btn.innerHTML = originalContent;
                btn.disabled = false;
                return;
            }

            const password = document.getElementById('senha').value;
            const result = await signIn(email, password);
            if (result.success) {
                document.body.classList.add('fade-out');
                try {
                    var u = result.data.user;
                    var tipoUsuario = u.tipo_usuario || (u.user_metadata && u.user_metadata.tipo_usuario) || null;
                    if (!tipoUsuario && u.id) {
                        var { data: usuarioData } = await supabaseClient
                            .from('usuarios')
                            .select('tipo_usuario')
                            .eq('id', u.id)
                            .single();
                        tipoUsuario = usuarioData?.tipo_usuario;
                    }
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    var destino = 'passageiro.html';
                    if (redirect) { destino = redirect; }
                    else if (tipoUsuario === 'admin') { destino = 'admin.html'; }
                    else if (tipoUsuario === 'motorista') { destino = 'motorista.html'; }
                    setTimeout(function() { window.location.href = destino; }, 200);
                } catch (e) {
                    console.error('Erro ao definir destino:', e);
                    setTimeout(function() { window.location.href = 'passageiro.html'; }, 200);
                }
                return;
            }

            btn.innerHTML = originalContent;
            btn.disabled = false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
    <script defer src="js/navigation-premium.js"></script>
    <script src="js/pwa-register.js"></script>
    <script>
        window.addEventListener('load', function() {
            window.scrollTo(0, 0);
            setTimeout(function() { if (document.activeElement && document.activeElement.tagName.match(/^(INPUT|TEXTAREA|SELECT)$/)) document.activeElement.blur(); }, 100);
        });
    </script>
</body>

</html>
