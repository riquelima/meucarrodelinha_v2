<!DOCTYPE html>

<head>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97316",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 10px rgba(249, 115, 22, 0.4)' },
                            '50%': { boxShadow: '0 0 20px rgba(249, 115, 22, 0.8)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'float': 'float 3s ease-in-out infinite',
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            min-height: max(884px, 100dvh);
        }
        @keyframes custom-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.05); }
        }
        .animate-subtle-pulse {
            animation: custom-pulse 2s infinite ease-in-out;
        }
    
        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col overflow-x-hidden pt-16">
        <!-- Back Button - Top Left Screen -->
        <a href="homepage.html"
            class="absolute top-6 left-6 size-10 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors shadow-md z-50">
            <span class="material-symbols-outlined text-2xl">chevron_left</span>
        </a>

        <main class="flex-1 flex flex-col px-6 pt-4 overflow-y-auto">
            <div class="@container w-full mb-8 relative animate-fade-in">
                <div class="absolute top-2 right-0 z-10 animate-float">
                    <a class="active-scale flex items-center gap-1.5 bg-primary text-white text-[10px] font-bold px-3 py-2 rounded-full shadow-lg shadow-primary/40 border border-primary/50 animate-subtle-pulse"
                        href="cadastroMotorista.html">
                        <span class="material-symbols-outlined text-[14px] fill-1">person_add</span>
                        QUERO SER MOTORISTA
                    </a>
                </div>
                <img src="logoLoginMotorista.png" alt="Logo Meu Carro de Linha Motorista" class="w-full max-w-[320px] object-contain drop-shadow-2xl mx-auto">
            </div>
            <div class="mb-8 animate-slide-up delay-100">
                <p class="text-slate-400 text-base font-normal">Faça login para gerenciar suas rotas, passageiros e
                    ganhos diários.</p>
            </div>
            <form class="space-y-6 animate-slide-up delay-200" onsubmit="handleLoginMotorista(event)">
                <div class="space-y-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-300 text-sm font-medium ml-1">E-mail</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span
                                    class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors">account_circle</span>
                            </div>
                            <input id="email" required
                                class="block w-full bg-slate-900/50 border border-slate-700 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="seu@email.com" type="email" />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-300 text-sm font-medium ml-1">Senha de Acesso</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span
                                    class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
                            </div>
                            <input id="senha" required
                                class="block w-full bg-slate-900/50 border border-slate-700 rounded-xl py-4 pl-12 pr-12 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="••••••••" type="password" />
                            <button class="absolute inset-y-0 right-0 pr-4 flex items-center" type="button"
                                onclick="const p = document.getElementById('senha'); p.type = p.type === 'password' ? 'text' : 'password';">
                                <span
                                    class="material-symbols-outlined text-slate-500 hover:text-slate-300 transition-colors">visibility</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="pt-2">
                    <button id="btn-login-motorista"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]"
                        type="submit">
                        <span>Acessar Painel</span>
                        <span class="material-symbols-outlined">login</span>
                    </button>
                </div>
                <div class="text-center">
                    <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="#">Esqueceu
                        sua senha?</a>
                </div>
            </form>
            <footer class="mt-auto py-8">
                <div class="bg-primary/5 border border-primary/10 rounded-xl p-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary">support_agent</span>
                        </div>
                        <div>
                            <p class="text-slate-100 text-sm font-semibold">Precisa de ajuda?</p>
                            <p class="text-slate-500 text-xs">Fale com o suporte técnico</p>
                        </div>
                    </div>
                    <a class="bg-primary/20 hover:bg-primary/30 text-primary text-xs font-bold py-2 px-4 rounded-lg transition-colors"
                        href="faleConosco.html">
                        SUPORTE
                    </a>
                </div>
            </footer>
        </main>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleLoginMotorista(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-login-motorista');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Aguarde...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;

            // Bypass temporário para admin local se necessário
            if (email === 'meucarrodelinha.adm@gmail.com' && password === '310311') {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = 'admin.html'; }, 200);
                return;
            }

            const result = await signIn(email, password);
            if (result.success) {
                // Busca perfil completo para verificar tipo e foto
                const { data: userData, error: userError } = await supabaseClient
                    .from('usuarios')
                    .select('tipo_usuario, foto_perfil_url')
                    .eq('id', result.data.user.id)
                    .single();

                if (userError) {
                    console.error('Erro ao buscar dados do usuário:', userError);
                    // Fallback para comportamento anterior caso falhe
                    if (result.data.user.user_metadata?.tipo_usuario === 'motorista') {
                        window.location.href = 'motorista.html';
                    } else {
                        window.location.href = 'passageiro.html';
                    }
                    return;
                }

                document.body.classList.add('fade-out');
                setTimeout(() => {
                    if (userData.tipo_usuario === 'motorista') {
                        // Se não tem foto, vai direto pro perfil
                        if (!userData.foto_perfil_url) {
                            window.location.href = 'perfilMotorista.html';
                        } else {
                            window.location.href = 'motorista.html';
                        }
                    } else {
                        window.location.href = 'passageiro.html';
                    }
                }, 200);
            } else {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
    <script src="js/pwa-register.js"></script>
</body>

</html>
