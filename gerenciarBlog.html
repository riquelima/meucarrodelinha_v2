<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Gerenciar Blog - Meu Carro de Linha Salinas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f38bd",
                        "accent-cyan": "#06b6d4",
                        "background-dark": "#0a0c16",
                        "card-dark": "#161b2c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .status-badge {
            @apply px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider;
        }
    
        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const postsContainer = document.querySelector('.flex-col.gap-4.mt-2');
        const searchInput = document.querySelector('input[type="text"]');

        async function loadPosts(searchTerm = '') {
            try {
                postsContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-10 gap-2 opacity-50">
                            <span class="material-symbols-outlined animate-spin">sync</span>
                            <p class="text-sm">Carregando postagens...</p>
                        </div>
                    `;

                let query = supabaseClient
                    .from('postagens')
                    .select('*')
                    .order('criado_em', { ascending: false });

                if (searchTerm) {
                    query = query.ilike('titulo', `%${searchTerm}%`);
                }

                const { data: posts, error } = await query;

                if (error) throw error;

                postsContainer.innerHTML = '';

                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = `
                            <div class="flex flex-col items-center justify-center py-10 gap-2 text-slate-500">
                                <span class="material-symbols-outlined text-4xl">article</span>
                                <p class="text-sm italic">Nenhuma postagem encontrada.</p>
                            </div>
                        `;
                    return;
                }

                posts.forEach(post => {
                    const postDate = new Date(post.criado_em).toLocaleDateString('pt-BR', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    });

                    const postCard = document.createElement('div');
                    postCard.className = "bg-card-dark border border-slate-800 rounded-2xl overflow-hidden shadow-sm flex flex-col";
                    postCard.innerHTML = `
                            <div class="flex p-3 gap-3">
                                <div class="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 bg-slate-800">
                                    <img alt="Thumbnail" class="w-full h-full object-cover" src="${post.imagem_capa_url || 'splashScreen.jpeg'}"/>
                                </div>
                                <div class="flex flex-col justify-between py-0.5 flex-1 min-w-0">
                                    <div>
                                        <div class="flex justify-between items-start mb-1">
                                            <span class="status-badge ${post.publicado ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}">
                                                ${post.publicado ? 'Publicado' : 'Rascunho'}
                                            </span>
                                            <span class="text-[11px] text-slate-500">${postDate}</span>
                                        </div>
                                        <h3 class="text-sm font-semibold text-slate-100 leading-snug line-clamp-2">${post.titulo}</h3>
                                    </div>
                                    <div class="flex items-center gap-4 mt-2">
                                        <button onclick="window.location.href='novoPost.html?id=${post.id}'" class="flex items-center gap-1.5 text-xs font-medium text-accent-cyan active:opacity-50">
                                            <span class="material-symbols-outlined text-base">edit</span>
                                            Editar
                                        </button>
                                        <button onclick="deletePost('${post.id}')" class="flex items-center gap-1.5 text-xs font-medium text-red-400 active:opacity-50">
                                            <span class="material-symbols-outlined text-base">delete</span>
                                            Excluir
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    postsContainer.appendChild(postCard);
                });
            } catch (err) {
                console.error('Error:', err);
                postsContainer.innerHTML = '<p class="text-center py-10 text-red-500">Erro ao carregar postagens.</p>';
            }
        }

        window.deletePost = async (id) => {
            if (!confirm('Tem certeza que deseja excluir esta postagem?')) return;
            try {
                const { error } = await supabaseClient.from('postagens').delete().eq('id', id);
                if (error) throw error;
                loadPosts(searchInput.value);
            } catch (err) {
                alert('Erro ao excluir: ' + err.message);
            }
        };

        // Search logic
        let debounce;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounce);
            debounce = setTimeout(() => {
                loadPosts(e.target.value);
            }, 300);
        });

        // Initial load
        loadPosts();

        // Setup "Add" button
        document.querySelector('.fixed.bottom-28').addEventListener('click', () => {
            window.location.href = 'novoPost.html';
        });
    });
</script>
</body>

</html>
