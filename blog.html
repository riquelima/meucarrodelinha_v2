<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1949e6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Blog - Galeria de Postagens</title>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Stagger Delays */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .delay-400 {
            animation-delay: 400ms;
        }

        .delay-500 {
            animation-delay: 500ms;
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 border-b border-white/10">
            <a href="homepage.html" class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">
                Blog</h1>
            <div class="size-10"></div>
        </header>
        <!-- Category Tabs -->
        <nav class="bg-background-light dark:bg-background-dark sticky top-[73px] z-40">
            <div class="flex border-b border-slate-200 dark:border-slate-800 px-4 gap-6 overflow-x-auto no-scrollbar"
                id="category-tabs">
                <button
                    class="category-tab flex flex-col items-center justify-center border-b-2 border-[#f97316] text-[#f97316] pb-3 pt-4 shrink-0 transition-colors"
                    data-category="all">
                    <span class="text-sm font-bold">Tudo</span>
                </button>
                <button
                    class="category-tab flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 shrink-0 hover:text-[#f97316] transition-colors"
                    data-category="noticias">
                    <span class="text-sm font-bold">Notícias</span>
                </button>
                <button
                    class="category-tab flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 shrink-0 hover:text-[#f97316] transition-colors"
                    data-category="dicas">
                    <span class="text-sm font-bold">Dicas</span>
                </button>
                <button
                    class="category-tab flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 shrink-0 hover:text-[#f97316] transition-colors"
                    data-category="viagens">
                    <span class="text-sm font-bold">Viagens</span>
                </button>
                <button
                    class="category-tab flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 shrink-0 hover:text-[#f97316] transition-colors"
                    data-category="seguranca">
                    <span class="text-sm font-bold">Segurança</span>
                </button>
            </div>
        </nav>
        <!-- Main Grid -->
        <main class="p-4 grid grid-cols-1 gap-6 pb-24" id="blog-grid">
            <div id="loading-state" class="flex flex-col items-center justify-center py-20 gap-4">
                <span class="material-symbols-outlined text-4xl text-primary animate-spin">sync</span>
                <p class="text-slate-500 font-medium">Carregando postagens...</p>
            </div>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const blogGrid = document.getElementById('blog-grid');
            const tabs = document.querySelectorAll('.category-tab');
            let currentCategory = 'all';

            async function loadPosts(category = 'all') {
                try {
                    blogGrid.innerHTML = `
                        <div id="loading-state" class="flex flex-col items-center justify-center py-20 gap-4">
                            <span class="material-symbols-outlined text-4xl text-primary animate-spin">sync</span>
                            <p class="text-slate-500 font-medium">Carregando postagens...</p>
                        </div>
                    `;

                    let query = supabaseClient
                        .from('postagens')
                        .select('*')
                        .eq('publicado', true)
                        .order('criado_em', { ascending: false });

                    if (category !== 'all') {
                        query = query.eq('categoria', category);
                    }

                    const { data: posts, error } = await query;

                    if (error) throw error;

                    blogGrid.innerHTML = '';

                    if (!posts || posts.length === 0) {
                        blogGrid.innerHTML = `
                            <div class="flex flex-col items-center justify-center py-20 gap-4 text-center">
                                <span class="material-symbols-outlined text-5xl text-slate-300">article</span>
                                <p class="text-slate-500 font-medium">Nenhuma postagem encontrada nesta categoria.</p>
                            </div>
                        `;
                        return;
                    }

                    posts.forEach((post, index) => {
                        const postDate = new Date(post.criado_em).toLocaleDateString('pt-BR', {
                            day: '2-digit',
                            month: 'short',
                            year: 'numeric'
                        });

                        const postElement = document.createElement('a');
                        postElement.href = `blogPost.html?slug=${post.slug}`;

                        const isFeatured = index === 0 && category === 'all';

                        if (isFeatured) {
                            // Featured Card Style
                            postElement.className = "blog-card flex flex-col overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 cursor-pointer transition-all hover:border-[#f97316]/50 group block animate-slide-up";
                            postElement.innerHTML = `
                                <div class="w-full aspect-video bg-cover bg-center transition-transform duration-700 group-hover:scale-105" 
                                    style='background-image: url("${post.imagem_capa_url || "/splashScreen.jpeg"}");'>
                                </div>
                                <div class="p-4 flex flex-col gap-2">
                                    <span class="text-[#f97316] text-xs font-bold uppercase tracking-wider">Destaque</span>
                                    <h2 class="text-xl font-bold leading-tight group-hover:text-[#f97316] transition-colors">${post.titulo}</h2>
                                    <div class="text-slate-600 dark:text-slate-400 text-sm line-clamp-2">${post.conteudo}</div>
                                    <div class="flex items-center justify-between mt-2">
                                        <span class="text-slate-500 text-xs italic">${postDate}</span>
                                        <div class="bg-[#f97316] text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors group-hover:bg-[#f97316]/90">
                                            Ler post
                                        </div>
                                    </div>
                                </div>
                            `;
                        } else {
                            // Standard Card Style
                            postElement.className = "blog-card flex gap-4 p-3 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 cursor-pointer transition-all hover:border-[#f97316]/50 group block animate-slide-up";
                            postElement.innerHTML = `
                                <div class="w-24 h-24 shrink-0 rounded-lg bg-cover bg-center transition-transform duration-500 group-hover:scale-110"
                                    style='background-image: url("${post.imagem_capa_url || "/splashScreen.jpeg"}");'>
                                </div>
                                <div class="flex flex-col justify-between py-1 relative w-full overflow-hidden">
                                    <div>
                                        <span class="text-[#f97316] text-[10px] font-bold uppercase">${post.categoria}</span>
                                        <h3 class="font-bold text-sm leading-tight mt-1 line-clamp-2 group-hover:text-[#f97316] transition-colors">
                                            ${post.titulo}
                                        </h3>
                                    </div>
                                    <span class="text-slate-500 text-[10px] mt-2">${postDate}</span>
                                    <div class="absolute right-0 bottom-1 bg-[#f97316]/10 text-[#f97316] text-[10px] font-bold px-2 py-1 rounded transition-colors group-hover:bg-[#f97316] group-hover:text-white">
                                        Ler post
                                    </div>
                                </div>
                            `;
                        }
                        blogGrid.appendChild(postElement);
                    });

                } catch (err) {
                    console.error('Error:', err);
                    blogGrid.innerHTML = '<p class="text-center py-20 text-red-500">Erro ao carregar postagens.</p>';
                }
            }

            // Initial load
            loadPosts();

            // Tab Switch Logic
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const category = tab.getAttribute('data-category');
                    if (category === currentCategory) return;

                    currentCategory = category;

                    // Update UI
                    tabs.forEach(t => {
                        t.classList.remove('border-[#f97316]', 'text-[#f97316]');
                        t.classList.add('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                    });
                    tab.classList.remove('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                    tab.classList.add('border-[#f97316]', 'text-[#f97316]');

                    loadPosts(category);
                });
            });

            // Navigation cleanup
            document.addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (link && link.href && !link.href.includes('#') && !link.target) {
                    e.preventDefault();
                    if (document.startViewTransition) {
                        document.startViewTransition(() => { window.location.href = link.href; });
                    } else {
                        window.location.href = link.href;
                    }
                }
            });
        });
    </script>
</body>

</html>
