<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Histórico de Viagens</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />

    <!-- Google Maps SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8&libraries=places,marker&callback=initMap&loading=async" async defer></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-scale:active {
            transform: scale(0.96);
        }

        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Stagger Delays */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .delay-400 {
            animation-delay: 400ms;
        }

        .delay-500 {
            animation-delay: 500ms;
        }

        /* Proteção do Navbar */
        nav {
            transform: none !important;
            animation: none !important;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 flex flex-col bg-black/80 backdrop-blur-md border-b border-white/10 shrink-0">
            <div class="flex items-center justify-between py-3 px-4">
                <a href="passageiro.html" class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-white/20 rounded-full transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">
                    Minhas Viagens</h1>
                <div class="size-10"></div>
            </div>
            <div class="flex px-4 relative">
                <button id="btn-recentes"
                    class="flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-colors duration-300">
                    Recentes
                </button>
                <button id="btn-anteriores"
                    class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors duration-300">
                    Anteriores
                </button>
            </div>
        </header>

        <!-- Main Content (Scrollable) -->
        <main class="flex-1 relative overflow-hidden">
            <!-- Recentes View -->
            <div id="view-recentes"
                class="absolute inset-0 overflow-y-auto p-4 space-y-4 pb-24 transition-all duration-300 ease-in-out opacity-100 translate-x-0">
                <!-- Data will be injected here -->
                <div class="skeleton-container space-y-4">
                    <div class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl p-4 animate-pulse">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-800"></div>
                                <div class="space-y-2">
                                    <div class="h-2 w-24 bg-slate-200 dark:bg-slate-800 rounded"></div>
                                    <div class="h-3 w-32 bg-slate-200 dark:bg-slate-800 rounded"></div>
                                </div>
                            </div>
                            <div class="h-4 w-16 bg-slate-200 dark:bg-slate-800 rounded"></div>
                        </div>
                        <div class="space-y-3 pl-6 border-l-2 border-slate-100 dark:border-slate-800">
                            <div class="h-3 w-full bg-slate-100 dark:bg-slate-800 rounded"></div>
                            <div class="h-3 w-4/5 bg-slate-100 dark:bg-slate-800 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Anteriores View -->
            <div id="view-anteriores"
                class="absolute inset-0 overflow-y-auto p-4 space-y-4 pb-24 transition-all duration-300 ease-in-out opacity-0 translate-x-full pointer-events-none">
                <!-- Data will be injected here -->
                <div class="skeleton-container space-y-4">
                    <div class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl p-4 animate-pulse">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-800"></div>
                                <div class="space-y-2">
                                    <div class="h-2 w-24 bg-slate-200 dark:bg-slate-800 rounded"></div>
                                    <div class="h-3 w-32 bg-slate-200 dark:bg-slate-800 rounded"></div>
                                </div>
                            </div>
                            <div class="h-4 w-16 bg-slate-200 dark:bg-slate-800 rounded"></div>
                        </div>
                        <div class="space-y-3 pl-6 border-l-2 border-slate-100 dark:border-slate-800">
                            <div class="h-3 w-full bg-slate-100 dark:bg-slate-800 rounded"></div>
                            <div class="h-3 w-4/5 bg-slate-100 dark:bg-slate-800 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed-navbar">
            <a class="flex flex-col items-center gap-1 text-slate-400 group hover:text-slate-300 transition-colors"
                href="passageiro.html">
                <span
                    class="material-symbols-outlined text-[28px] font-fill group-hover:scale-110 transition-transform">home</span>
                <span class="text-[10px] font-medium">Início</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary group transition-colors" href="minhasViagens.html">
                <span
                    class="material-symbols-outlined text-[28px] font-fill group-hover:scale-110 transition-transform">history</span>
                <span class="text-[10px] font-bold">Viagens</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 group hover:text-slate-300 transition-colors relative"
                href="conversas.html">
                <span
                    class="material-symbols-outlined text-[28px] font-fill group-hover:scale-110 transition-transform">chat</span>
                <span class="text-[10px] font-medium">Chats</span>
                <span id="chat-badge"
                    class="chat-badge hidden absolute -top-1 right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-[#121520]">0</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 group hover:text-slate-300 transition-colors"
                href="perfilPassageiro.html">
                <span
                    class="material-symbols-outlined text-[28px] font-fill group-hover:scale-110 transition-transform">person</span>
                <span class="text-[10px] font-medium">Perfil</span>
            </a>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const btnRecentes = document.getElementById('btn-recentes');
            const btnAnteriores = document.getElementById('btn-anteriores');
            const viewRecentes = document.getElementById('view-recentes');
            const viewAnteriores = document.getElementById('view-anteriores');
            const supabase = window.supabaseClient;

            // Tabs Logic
            function switchTo(tab) {
                if (tab === 'recentes') {
                    btnRecentes.classList.add('border-primary', 'text-primary');
                    btnRecentes.classList.remove('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                    btnAnteriores.classList.remove('border-primary', 'text-primary');
                    btnAnteriores.classList.add('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                    viewRecentes.classList.replace('opacity-0', 'opacity-100');
                    viewRecentes.classList.replace('translate-x-[-100%]', 'translate-x-0');
                    viewRecentes.classList.remove('pointer-events-none');
                    viewAnteriores.classList.replace('opacity-100', 'opacity-0');
                    viewAnteriores.classList.replace('translate-x-0', 'translate-x-full');
                    viewAnteriores.classList.add('pointer-events-none');
                } else {
                    btnAnteriores.classList.add('border-primary', 'text-primary');
                    btnAnteriores.classList.remove('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                    btnRecentes.classList.remove('border-primary', 'text-primary');
                    btnRecentes.classList.add('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                    viewAnteriores.classList.replace('opacity-0', 'opacity-100');
                    viewAnteriores.classList.replace('translate-x-full', 'translate-x-0');
                    viewAnteriores.classList.remove('pointer-events-none');
                    viewRecentes.classList.replace('opacity-100', 'opacity-0');
                    viewRecentes.classList.replace('translate-x-0', 'translate-x-[-100%]');
                    viewRecentes.classList.add('pointer-events-none');
                }
            }

            btnRecentes.addEventListener('click', () => switchTo('recentes'));
            btnAnteriores.addEventListener('click', () => switchTo('anteriores'));

            // Load Data from Supabase
            const { data: { session } } = await supabase.auth.getSession();
            const user = session?.user;
            if (!user) {
                window.location.href = 'loginPassageiro.html';
                return;
            }

            async function loadTrips() {
                // Show skeleton container in both if not already present or just use existing ones
                const skeletonRecent = viewRecentes.querySelector('.skeleton-container');
                
                const { data: trips, error } = await supabase
                    .from('viagens')
                    .select('*, motorista:motoristas(usuarios(nome, foto_perfil_url))')
                    .eq('passageiro_id', user.id)
                    .order('criado_em', { ascending: false });

                // Remove skeletons
                viewRecentes.innerHTML = '';
                viewAnteriores.innerHTML = '';

                if (error) {
                    console.error("Erro ao carregar viagens:", error);
                    viewRecentes.innerHTML = '<div class="flex flex-col items-center justify-center h-64 text-slate-500"><span class="material-symbols-outlined text-4xl mb-2 text-red-500">error</span><p>Erro ao carregar suas viagens.</p></div>';
                    return;
                }

                if (!trips || trips.length === 0) {
                    const emptyState = '<div class="flex flex-col items-center justify-center h-64 text-slate-500 animate-fade-in"><span class="material-symbols-outlined text-5xl mb-3 opacity-20">directions_car</span><p class="font-medium">Você ainda não realizou viagens.</p><p class="text-xs opacity-60">Suas futuras viagens aparecerão aqui.</p></div>';
                    viewRecentes.innerHTML = emptyState;
                    viewAnteriores.innerHTML = emptyState;
                    return;
                }

                const now = new Date();
                let recentCount = 0;
                let olderCount = 0;

                trips.forEach((trip, index) => {
                    const tripDate = new Date(trip.criado_em);
                    const isRecent = (now - tripDate) < (24 * 60 * 60 * 1000); // 24h
                    const container = isRecent ? viewRecentes : viewAnteriores;
                    
                    if (isRecent) recentCount++; else olderCount++;

                    const card = createTripCard(trip, index);
                    container.appendChild(card);
                });

                // If one of the tabs is empty, show small message
                if (recentCount === 0) {
                    viewRecentes.innerHTML = '<div class="flex flex-col items-center justify-center h-64 text-slate-500 opacity-60"><p class="text-sm">Nenhuma viagem nas últimas 24h.</p></div>';
                }
                if (olderCount === 0) {
                    viewAnteriores.innerHTML = '<div class="flex flex-col items-center justify-center h-64 text-slate-500 opacity-60"><p class="text-sm">Nenhum histórico anterior encontrado.</p></div>';
                }
            }

            function createTripCard(trip, index) {
                const dateStr = new Date(trip.criado_em).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                
                // Nesting correction: trip -> motorista (motoristas table) -> usuarios (usuarios table)
                const usuario = trip.motorista?.usuarios;
                const driverName = usuario?.nome || 'Motorista';
                const driverPhoto = usuario?.foto_perfil_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(driverName)}&background=random`;
                
                const statusLabel = trip.status === 'concluida' ? 'Concluída' : 
                                  trip.status === 'aceita' ? 'Confirmada' : 
                                  trip.status === 'cancelada' ? 'Cancelada' : 'Em andamento';
                
                const valorDisplay = trip.valor_final ? `R$ ${trip.valor_final.toFixed(2).replace('.', ',')}` : 'Sob consulta';

                // Static Maps URL
                const apiKey = 'AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8';
                let staticMapUrl = '';
                
                if (trip.origem_lat && trip.destino_lat) {
                    staticMapUrl = `https://maps.googleapis.com/maps/api/staticmap?size=600x300&scale=2&maptype=roadmap&markers=color:blue%7Clabel:A%7C${trip.origem_lat},${trip.origem_lng}&markers=color:red%7Clabel:B%7C${trip.destino_lat},${trip.destino_lng}&path=color:0x1e3fae%7Cweight:5%7C${trip.origem_lat},${trip.origem_lng}%7C${trip.destino_lat},${trip.destino_lng}&key=${apiKey}`;
                } else {
                    // Fallback se não tiver coordenadas (busca por endereço - menos preciso mas funciona)
                    staticMapUrl = `https://maps.googleapis.com/maps/api/staticmap?size=600x300&scale=2&maptype=roadmap&markers=color:blue%7Clabel:A%7C${encodeURIComponent(trip.origem_endereco)}&markers=color:red%7Clabel:B%7C${encodeURIComponent(trip.destino_endereco)}&key=${apiKey}`;
                }

                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm animate-slide-up';
                div.style.animationDelay = `${index * 100}ms`;
                
                div.innerHTML = `
                    <div class="p-4 space-y-4">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center overflow-hidden border-2 border-primary/20">
                                    <img class="w-full h-full object-cover" alt="Foto de ${driverName}" src="${driverPhoto}" />
                                </div>
                                <div>
                                    <p class="text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">${dateStr} • ${statusLabel}</p>
                                    <p class="font-bold text-slate-900 dark:text-slate-100">${driverName}</p>
                                </div>
                            </div>
                            <p class="text-lg font-black text-primary dark:text-blue-400">${valorDisplay}</p>
                        </div>
                        <div class="space-y-3 relative pl-6">
                            <div class="absolute left-1.5 top-1.5 bottom-1.5 w-0.5 bg-slate-200 dark:bg-slate-800"></div>
                            <div class="absolute left-0 top-1.5 w-3 h-3 rounded-full border-2 border-primary bg-white dark:bg-slate-900"></div>
                            <div class="absolute left-0 bottom-1.5 w-3 h-3 bg-orange-500 rounded-sm"></div>
                            <div class="flex flex-col">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">Origem</span>
                                <span class="text-sm font-medium truncate text-slate-700 dark:text-slate-200">${trip.origem_endereco}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">Destino</span>
                                <span class="text-sm font-medium truncate text-slate-700 dark:text-slate-200">${trip.destino_endereco}</span>
                            </div>
                        </div>
                    </div>
                    <div class="h-44 w-full bg-slate-100 dark:bg-slate-800 relative group overflow-hidden">
                        <img src="${staticMapUrl}" class="absolute inset-0 w-full h-full object-cover grayscale-[0.2] group-hover:grayscale-0 transition-all duration-500" alt="Mapa da Viagem" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent z-10 pointer-events-none"></div>
                        <div class="absolute bottom-3 left-4 z-20 flex items-center gap-2">
                             <span class="px-2 py-0.5 bg-primary/90 backdrop-blur-md rounded text-[9px] font-bold text-white uppercase border border-white/10 italic">Visualização da Rota</span>
                        </div>
                        <div class="absolute top-3 right-4 z-20">
                             <span class="px-2 py-1 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md rounded-full text-[10px] font-black text-primary dark:text-blue-400 shadow-lg">Google Maps</span>
                        </div>
                    </div>
                `;
                return div;
            }


            loadTrips();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
    <script src="js/pwa-register.js"></script>
</body>

</html>
