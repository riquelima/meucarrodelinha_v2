<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Histórico de Corridas - Administrador</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f38bd",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101422",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <!-- Google Maps SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8&libraries=places,marker&callback=initMap&loading=async" async defer></script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    
        /* Global Mobile Native Fixes */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* Native-like click effect */
        .active-scale {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        /* Entrance Animations */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            opacity: 0;
            transform: translateX(20px);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        /* Stagger Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 border-b border-white/10">
            <a href="admin.html" class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">
                Histórico de Viagens</h1>
            <div class="size-10"></div>
        </header>
        <div class="flex flex-col gap-4 p-4 sticky top-[53px] bg-background-light dark:bg-background-dark z-20">
            <div class="relative group">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
                <input
                    class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-800/50 border-none rounded-xl text-sm focus:ring-2 focus:ring-primary/50 placeholder:text-slate-500"
                    placeholder="Buscar por passageiro ou motorista..." type="text" />
            </div>
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                <button
                    class="flex items-center gap-1.5 px-4 py-2 bg-primary text-white rounded-full text-xs font-semibold whitespace-nowrap">
                    <span class="material-symbols-outlined text-sm">calendar_month</span>
                    Hoje
                </button>
                <button
                    class="flex items-center gap-1.5 px-4 py-2 bg-white dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 rounded-full text-xs font-semibold whitespace-nowrap border border-slate-200 dark:border-slate-700">
                    <span class="material-symbols-outlined text-sm">filter_list</span>
                    Status
                </button>
                <button
                    class="flex items-center gap-1.5 px-4 py-2 bg-white dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 rounded-full text-xs font-semibold whitespace-nowrap border border-slate-200 dark:border-slate-700">
                    Período
                </button>
            </div>
        </di        <main id="trips-container" class="flex flex-col gap-4 px-4 pb-24">
            <!-- Loading state -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-12 gap-3">
                <div class="size-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                <p class="text-sm text-slate-500 font-medium">Carregando viagens...</p>
            </div>
            
            <!-- Empty state -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-12 gap-4">
                <div class="size-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-4xl text-slate-400">route_off</span>
                </div>
                <div class="flex flex-col gap-1">
                    <p class="text-lg font-bold">Nenhuma viagem encontrada</p>
                    <p class="text-sm text-slate-500">Tente ajustar seus filtros ou busca.</p>
                </div>
            </div>

            <!-- Trips list injected here -->
        </main>
    </div>
    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl px-4 pt-2 z-50"
        style="padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem)">
        <div class="flex gap-2 max-w-lg mx-auto">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="admin.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">dashboard</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Painel</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="gerenciarUsuarios.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">group</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Usuários</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="historicoGeral.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">route</span>
                </div>
                <p class="text-[10px] font-bold leading-normal tracking-tight">Viagens</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400"
                href="perfilAdministrador.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">settings</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Ajustes</p>
            </a>
        </div>
    </nav>

    <!-- Supabase and Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/authGuard.js"></script>
    <script>
        let allTrips = [];
        let googleMapsLoaded = false;

        async function initMap() {
            googleMapsLoaded = true;
            if (allTrips.length > 0) {
                renderTrips(allTrips);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const sb = window.supabaseClient;
            if (!sb) return;

            const tripsContainer = document.getElementById('trips-container');
            const loadingState = document.getElementById('loading-state');
            const emptyState = document.getElementById('empty-state');
            const searchInput = document.querySelector('input[type="text"]');

            async function fetchTrips() {
                try {
                    // Fetch trips with passenger and driver info
                    // Note: viagens.motorista_id references motoristas(usuario_id), 
                    // which in turn references usuarios(id)
                    const { data, error } = await sb
                        .from('viagens')
                        .select(`
                            *,
                            passageiro:usuarios!passageiro_id(nome, foto_perfil_url),
                            motorista_rel:motoristas!motorista_id(
                                usuario_info:usuarios(nome, foto_perfil_url)
                            )
                        `)
                        .order('criado_em', { ascending: false });

                    if (error) throw error;
                    console.log('Viagens buscadas:', data?.length || 0);
                    return data || [];
                } catch (err) {
                    console.error('Erro ao buscar viagens:', err);
                    return [];
                }
            }

            function renderTrips(trips) {
                // Remove existing trip cards
                const existingCards = document.querySelectorAll('.trip-card');
                existingCards.forEach(c => c.remove());

                loadingState.classList.add('hidden');
                
                if (trips.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');

                trips.forEach((trip, index) => {
                    const card = document.createElement('div');
                    card.className = 'trip-card bg-white dark:bg-slate-800/40 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 shadow-sm animate-slide-up';
                    card.style.animationDelay = `${index * 50}ms`;
                    
                    const dateFormatted = new Date(trip.criado_em).toLocaleString('pt-BR', {
                        day: '2-digit',
                        month: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const passengerName = trip.passageiro?.nome || 'Usuário Desconhecido';
                    const passengerPhoto = trip.passageiro?.foto_perfil_url || 'https://via.placeholder.com/150';
                    const driverName = trip.motorista_rel?.usuario_info?.nome || 'Aguardando...';
                    const driverPhoto = trip.motorista_rel?.usuario_info?.foto_perfil_url || 'https://via.placeholder.com/150';
                    const valor = trip.valor_final || trip.valor_estimado || 0;

                    card.innerHTML = `
                        <div class="flex h-32 w-full bg-slate-200 dark:bg-slate-700 relative overflow-hidden" id="map-${trip.id}">
                            <div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none">
                                <span class="material-symbols-outlined text-4xl">map</span>
                            </div>
                        </div>
                        <div class="p-4 flex flex-col gap-3">
                            <div class="flex justify-between items-start">
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Passageiro</span>
                                    <span class="text-sm font-semibold">${passengerName}</span>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Valor</span>
                                    <p class="text-lg font-bold text-primary dark:text-blue-400">R$ ${valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 pt-3 border-t border-slate-100 dark:border-slate-800">
                                <div class="flex items-center gap-2">
                                    <div class="size-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-600">
                                        <img alt="Driver" class="size-full object-cover" src="${driverPhoto}" onerror="this.src='https://via.placeholder.com/150'" />
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="text-[10px] text-slate-500 font-medium">Motorista</span>
                                        <span class="text-xs font-semibold truncate max-w-[80px]">${driverName}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 justify-end">
                                    <span class="material-symbols-outlined text-slate-400 text-lg">calendar_today</span>
                                    <div class="flex flex-col text-right">
                                        <span class="text-[10px] text-slate-500 font-medium">Data/Hora</span>
                                        <span class="text-xs font-semibold">${dateFormatted}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col gap-1 mt-1">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                                    <p class="text-[10px] text-slate-500 truncate">${trip.origem_endereco}</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full bg-red-500"></div>
                                    <p class="text-[10px] text-slate-500 truncate">${trip.destino_endereco}</p>
                                </div>
                            </div>
                        </div>
                    `;

                    tripsContainer.appendChild(card);

                    // Initialize Map for this card
                    if (googleMapsLoaded) {
                        initSingleTripMap(trip);
                    }
                });
            }

            function initSingleTripMap(trip) {
                if (typeof google === 'undefined') return;
                const mapEl = document.getElementById(`map-${trip.id}`);
                if (!mapEl) return;

                const map = new google.maps.Map(mapEl, {
                    center: { lat: Number(trip.origem_lat), lng: Number(trip.origem_lng) },
                    zoom: 14,
                    disableDefaultUI: true,
                    gestureHandling: "none",
                    styles: [
                        {
                            featureType: "poi",
                            elementType: "labels",
                            stylers: [{ visibility: "off" }]
                        }
                    ]
                });

                const directionsService = new google.maps.DirectionsService();
                const directionsRenderer = new google.maps.DirectionsRenderer({
                    map: map,
                    suppressMarkers: false,
                    polylineOptions: {
                        strokeColor: "#0f38bd",
                        strokeWeight: 4
                    }
                });

                const origin = { lat: Number(trip.origem_lat), lng: Number(trip.origem_lng) };
                const destination = { lat: Number(trip.destino_lat), lng: Number(trip.destino_lng) };

                directionsService.route({
                    origin: origin,
                    destination: destination,
                    travelMode: google.maps.TravelMode.DRIVING
                }, (response, status) => {
                    if (status === 'OK') {
                        directionsRenderer.setDirections(response);
                    } else {
                        // Fallback: Just markers if route fails
                        new google.maps.Marker({ position: origin, map: map, label: 'A' });
                        new google.maps.Marker({ position: destination, map: map, label: 'B' });
                    }
                });
            }

            // Initial load
            allTrips = await fetchTrips();
            renderTrips(allTrips);

            // Search functionality
            searchInput?.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allTrips.filter(t => 
                    (t.passageiro?.nome || '').toLowerCase().includes(term) ||
                    (t.motorista_rel?.usuario_info?.nome || '').toLowerCase().includes(term) ||
                    (t.origem_endereco || '').toLowerCase().includes(term) ||
                    (t.destino_endereco || '').toLowerCase().includes(term)
                );
                renderTrips(filtered);
            });
        });
    </script>
</body>

</html>
