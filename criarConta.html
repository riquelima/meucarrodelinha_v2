<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carro de Linha" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>Cadastro de Passageiro - Salinas</title>
    <style type="text/tailwindcss">
        body {
            min-height: 100dvh;
        }
        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }
        .ios-input-focus:focus-within {
            @apply border-primary ring-1 ring-primary;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <!-- Page Transitions Settings -->
    <meta name="view-transition" content="same-origin" />
    <style>
        /* View Transitions API */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: 90ms cubic-bezier(0.4, 0, 1, 1) both fade-out;
        }

        ::view-transition-new(root) {
            animation: 210ms cubic-bezier(0, 0, 0.2, 1) 90ms both fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Fallback Fade */
        body {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased">
    <div class="relative flex min-h-screen w-full flex-col p-6 overflow-y-auto pt-16">
        <!-- Back Button - Top Left Screen -->
        <a href="loginPassageiro.html"
            class="absolute top-6 left-6 size-10 flex items-center justify-center rounded-xl bg-slate-800 text-slate-200 hover:text-white hover:bg-slate-700 transition-colors shadow-md">
            <span class="material-symbols-outlined text-sm font-bold">arrow_back_ios_new</span>
        </a>
        <header class="flex flex-col items-center mt-6 mb-12 relative">
            <div
                class="size-20 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-5xl text-white fill-1">directions_car</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Meu Carro de Linha</h1>
            <p class="text-slate-400 font-medium">Salinas - PA</p>
        </header>
        <div class="mb-8">
            <h2 class="text-xl font-bold text-white">Crie sua conta</h2>
            <p class="text-slate-400 text-sm">Preencha os dados para começar.</p>
        </div>
        <form class="space-y-4" onsubmit="window.location.href='contaCriada.html'; return false;">
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Nome Completo</label>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">
                    <span class="material-symbols-outlined absolute left-4 text-slate-500">person</span>
                    <input
                        class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="Seu nome completo" type="text" />
                </div>
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">E-mail</label>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">
                    <span class="material-symbols-outlined absolute left-4 text-slate-500">mail</span>
                    <input
                        class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="seu@email.com" type="email" />
                </div>
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Telefone</label>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">
                    <span class="material-symbols-outlined absolute left-4 text-slate-500">call</span>
                    <input
                        class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="(91) 90000-0000" type="tel" />
                </div>
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Senha</label>
                <div
                    class="relative flex items-center ios-input-focus border border-slate-800 bg-slate-900/50 rounded-xl overflow-hidden transition-all">
                    <span class="material-symbols-outlined absolute left-4 text-slate-500">lock</span>
                    <input
                        class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-white placeholder:text-slate-600 focus:ring-0"
                        placeholder="••••••••" type="password" />
                    <button class="absolute right-4 text-slate-500" type="button">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <button
                class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all mt-6 active:scale-[0.98]"
                type="submit">
                Cadastrar
            </button>
        </form>
        <div class="mt-8 text-center pb-12">
            <p class="text-slate-400 text-sm">
                Já tem uma conta?
                <a class="text-primary font-bold ml-1" href="loginPassageiro.html">Faça login</a>
            </p>
        </div>
        <footer class="mt-auto pb-6 text-center">
            <p class="text-[10px] text-slate-600 uppercase tracking-widest">
                Segurança e Praticidade em Salinas
            </p>
        </footer>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('a[href]').forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('http') && link.target !== '_blank') {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => { window.location.href = href; }, 200);
                    }
                });
            });
        });
    </script>
</body>

</html>
