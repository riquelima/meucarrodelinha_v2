<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "success": "#22c55e",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Meu Carro de Linha Salinas - Nova Solicitação</title>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-b border-orange-500/10">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-orange-500/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="relative">
<div class="size-10 rounded-full bg-orange-500/20 flex items-center justify-center overflow-hidden border border-orange-500/30" data-alt="Passenger Carlos portrait profile picture" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC1DwMDvY5muYSK0iYhQveHzQvPqeLMvygo9liopWOM8T9wr3BropEdGjnR7Mako4z7TBiva6k0jS5o6m_LDn6kYZuSSJWO24ocYiesvcuxGfEc-lEgg6B8DyMaHL0SwLwGbNYhF7FRGmyAHDHoCZlk9GabRj0f6HdOVQAIf37sMzqNUErh2eyV1VUzeRM63IUYu1KhUA_5XmCDcxNP1S9xxY_Aak2iEUqqDdUriETlN7tTkEfRQqnv1UgvCnerW6JviP4NxSZrxImv"); background-size: cover;'>
</div>
<div class="absolute bottom-0 right-0 size-3 bg-green-500 rounded-full border-2 border-background-dark"></div>
</div>
<div>
<h2 class="text-base font-bold leading-tight">Carlos</h2>
<p class="text-xs text-orange-500 font-medium">Passageiro • Salinas - MG</p>
</div>
</div>
<div class="flex flex-1 justify-end gap-2">
<button class="flex size-10 items-center justify-center rounded-full bg-orange-500/10 text-orange-500 hover:bg-orange-500/20 transition-colors">
<span class="material-symbols-outlined">call</span>
</button>
<button class="flex size-10 items-center justify-center rounded-full bg-orange-500/10 text-orange-500 hover:bg-orange-500/20 transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Chat Content -->
<main class="flex-1 overflow-y-auto p-4 space-y-4">
<!-- New Trip Request Card -->
<div class="flex flex-col gap-2 max-w-[95%]">
<div class="bg-orange-500/10 dark:bg-slate-800/50 px-4 py-3 rounded-xl rounded-bl-none border border-orange-500/10">
<h3 class="text-orange-500 font-bold text-sm uppercase tracking-wider mb-2">Nova Solicitação de Viagem</h3>
<!-- Mini Map -->
<div class="relative h-32 w-full bg-slate-700 rounded-lg overflow-hidden mb-3 border border-orange-500/20">
<img alt="Route map" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-nJY_myfbt-ppHWtzIUPIArtqnek1l4npkifJyvzesWDhO3RvhSRCrbbxkq1hM6IiwYE6ZuJJaBTx2RQlyjeTqbitqZUL2jVvdAdhReuyIq8vmvZ8v7adAvbwbitggYbs6zjx-PtEW1a5BV-NQqFLLbYI2kFhPWwLeoCBJ2B9rdScu_XifLi9oS0nOzSjXlka5xmHeeQD65yRPlR4qtAlXg7WT4AdUpXZkahZVgTS0b59fjN5z9uiyCSjew6oqkz09Jxgh23ydrWo"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-orange-500 text-4xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1">route</span>
</div>
</div>
<!-- Addresses -->
<div class="space-y-3 mb-4">
<div class="flex gap-3">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-success text-lg" style="font-variation-settings: 'FILL' 1">fiber_manual_record</span>
<div class="w-0.5 h-4 bg-slate-600"></div>
</div>
<div>
<p class="text-[10px] text-slate-500 font-bold uppercase">ORIGEM</p>
<p class="text-sm font-medium">Rua Central, 123 - Centro</p>
</div>
</div>
<div class="flex gap-3">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-orange-500 text-lg" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
<div>
<p class="text-[10px] text-slate-500 font-bold uppercase">DESTINO</p>
<p class="text-sm font-medium">Rodoviária de Salinas</p>
</div>
</div>
</div>
<button class="w-full bg-orange-500/20 hover:bg-orange-500/30 text-orange-500 font-bold py-2 rounded-lg flex items-center justify-center gap-2 transition-colors border border-orange-500/30">
<span class="material-symbols-outlined text-lg">map</span>
<span class="text-sm">Ver no Maps</span>
</button>
</div>
<span class="text-[10px] text-slate-500 ml-1">14:45</span>
</div>
<!-- Value Proposal Section -->
<div class="bg-slate-900/40 border border-orange-500/20 rounded-xl p-4 space-y-4 backdrop-blur-sm">
<div class="flex flex-col items-center text-center gap-1">
<h4 class="text-xs font-bold text-orange-500 uppercase tracking-widest">Proposta de Valor</h4>
<div class="flex items-baseline gap-1">
<span class="text-xs font-medium text-slate-500">VALOR SUGERIDO:</span>
<span class="text-lg font-bold text-orange-500">R$ 85,00</span>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">R$</span>
<input class="w-full bg-slate-800 border-2 border-orange-500/30 rounded-xl py-3 pl-10 pr-4 text-xl font-bold text-center focus:ring-orange-500 focus:border-orange-500" type="number" value="85.00"/>
</div>
<div class="grid grid-cols-2 gap-2">
<button class="bg-slate-800 hover:bg-slate-700 py-2 rounded-lg text-sm font-bold border border-slate-700 transition-colors">+ R$ 5,00</button>
<button class="bg-slate-800 hover:bg-slate-700 py-2 rounded-lg text-sm font-bold border border-slate-700 transition-colors">+ R$ 10,00</button>
</div>
</div>
<div class="flex gap-3 pt-2">
<button class="flex-1 border border-slate-600 text-slate-400 font-bold py-3 rounded-xl hover:bg-slate-800 transition-colors">
                    Recusar
                </button>
<button class="flex-[2] bg-success hover:bg-success/90 text-white font-bold py-3 rounded-xl shadow-lg shadow-success/20 transition-all active:scale-[0.98]">
                    Aceitar Corrida
                </button>
</div>
</div>
</main>
<!-- Input Area -->
<div class="p-4 bg-background-light dark:bg-background-dark border-t border-orange-500/10">
<div class="flex items-center gap-3">
<button class="text-slate-400 hover:text-orange-500 transition-colors">
<span class="material-symbols-outlined">add_circle</span>
</button>
<div class="flex-1 relative">
<input class="w-full bg-slate-800/50 border-none rounded-full py-3 px-5 text-sm focus:ring-2 focus:ring-orange-500/50 placeholder:text-slate-500" placeholder="Responder proposta..." type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined">sentiment_satisfied</span>
</button>
</div>
<button class="size-11 rounded-full bg-orange-500 text-white flex items-center justify-center shadow-lg shadow-orange-500/30">
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
<!-- Navigation Bar -->
<nav class="flex border-t border-orange-500/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Início</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-orange-500" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">chat</span>
<span class="text-[10px] font-medium">Chat</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium">Histórico</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</a>
</nav>
</body></html>
