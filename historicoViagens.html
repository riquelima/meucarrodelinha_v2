<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Histórico</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

    <!-- Google Maps SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8&libraries=places,marker&callback=initMap&loading=async" async defer></script>

    <div class="page-container">
        <!-- Header -->
        <header
            class="flex items-center justify-between bg-white dark:bg-[#121520] p-4 shadow-sm z-20 shrink-0 border-b border-slate-200 dark:border-slate-800">
            <h1 class="text-lg font-bold">Histórico de Viagens</h1>
            <div class="w-10"></div>
        </header>

        <!-- Main Content -->
        <main class="page-content px-4 pt-6 no-scrollbar pb-24">
            <!-- Filter Tabs -->
            <div class="flex gap-2 mb-6" id="filter-tabs">
                <button class="filter-btn px-4 py-2 rounded-full bg-primary text-white text-xs font-bold active" data-filter="tudo">Tudo</button>
                <button class="filter-btn px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-500 text-xs font-bold" data-filter="concluida">Finalizadas</button>
                <button class="filter-btn px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-500 text-xs font-bold" data-filter="cancelada">Canceladas</button>
            </div>

            <!-- List -->
            <div id="trips-list" class="space-y-4">
                <div class="flex flex-col items-center justify-center py-20 text-slate-500">
                    <span class="material-symbols-outlined animate-spin text-4xl mb-2">sync</span>
                    <p>Carregando histórico...</p>
                </div>
            </div>
        </main>

        <nav class="fixed-navbar">
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="motorista.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="meusganhos.html">
                <span class="material-symbols-outlined">payments</span>
                <span class="text-[10px] font-bold">Ganhos</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500 relative"
                href="conversasMotorista.html">
                <span class="material-symbols-outlined">chat</span>
                <span class="text-[10px] font-bold">Chat</span>
                <span id="chat-badge"
                    class="chat-badge hidden absolute top-0 right-4 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-background-dark">0</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-primary no-effect" href="historicoViagens.html">
                <span class="material-symbols-outlined font-fill">history</span>
                <span class="text-[10px] font-bold">Histórico</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="perfilMotorista.html">
                <span class="material-symbols-outlined">account_circle</span>
                <span class="text-[10px] font-bold">Perfil</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = window.supabaseClient;
            const tripsList = document.getElementById('trips-list');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            let allTrips = [];

            // Load User
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'loginMotorista.html';
                return;
            }

            // Load Trips
            async function loadHistory() {
                const { data, error } = await supabase
                    .from('viagens')
                    .select('*, passageiro:usuarios!viagens_passageiro_id_fkey(nome, foto_perfil_url)')
                    .eq('motorista_id', user.id)
                    .order('criado_em', { ascending: false });

                if (error) {
                    console.error("Erro:", error);
                    tripsList.innerHTML = '<p class="text-center text-red-500">Erro ao carregar histórico.</p>';
                    return;
                }

                allTrips = data;
                renderTrips('tudo');
            }

            function renderTrips(filter) {
                tripsList.innerHTML = '';
                const filtered = filter === 'tudo' ? allTrips : allTrips.filter(t => t.status === filter);

                if (filtered.length === 0) {
                    tripsList.innerHTML = '<div class="text-center py-20 text-slate-500"><p>Nenhuma viagem encontrada.</p></div>';
                    return;
                }

                filtered.forEach((trip, index) => {
                    const card = createCard(trip, index);
                    tripsList.appendChild(card);
                    initMap(trip, `map-${index}`);
                });
            }

            function createCard(trip, index) {
                const dateStr = new Date(trip.criado_em).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const passName = trip.passageiro?.nome || 'Passageiro';
                const statusColor = trip.status === 'concluida' ? 'bg-green-500/10 text-green-500' : (trip.status === 'cancelada' ? 'bg-red-500/10 text-red-500' : 'bg-primary/10 text-primary');

                const div = document.createElement('div');
                div.className = "bg-white dark:bg-surface-dark rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden";
                div.innerHTML = `
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="font-bold text-sm text-slate-900 dark:text-white">Passageiro: ${passName}</p>
                                <p class="text-[10px] text-slate-500">${dateStr} • R$ ${trip.valor_final?.toFixed(2).replace('.', ',') || '0,00'}</p>
                            </div>
                            <span class="px-2 py-1 rounded-md ${statusColor} text-[10px] font-bold uppercase">${trip.status}</span>
                        </div>
                        <div class="flex gap-3 text-xs text-slate-500 mb-4">
                            <div class="flex flex-col items-center gap-1">
                                <span class="size-2 rounded-full bg-primary"></span>
                                <div class="w-0.5 h-4 bg-slate-300 dark:bg-slate-700"></div>
                                <span class="size-2 rounded-full bg-orange-500"></span>
                            </div>
                            <div class="flex flex-col gap-2 overflow-hidden">
                                <p class="truncate text-slate-700 dark:text-slate-300">${trip.origem_endereco}</p>
                                <p class="truncate text-slate-700 dark:text-slate-300">${trip.destino_endereco}</p>
                            </div>
                        </div>
                        <div class="h-32 w-full bg-slate-100 dark:bg-slate-800/50 rounded-lg overflow-hidden relative">
                             <div id="map-${index}" class="absolute inset-0"></div>
                             <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
                        </div>
                    </div>
                `;
                return div;
            }

            function initMap(trip, id) {
                if (!window.google) return;
                const geocoder = new google.maps.Geocoder();
                const map = new google.maps.Map(document.getElementById(id), {
                    zoom: 14,
                    disableDefaultUI: true,
                    gestureHandling: "none",
                    styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
                });

                geocoder.geocode({ address: trip.origem_endereco }, (results, status) => {
                    if (status === 'OK') {
                        map.setCenter(results[0].geometry.location);
                        new google.maps.Marker({ position: results[0].geometry.location, map: map });
                    }
                });
            }

            // Filter functionality
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('bg-primary', 'text-white'));
                    filterBtns.forEach(b => b.classList.add('bg-slate-200', 'dark:bg-surface-dark', 'text-slate-500'));
                    
                    btn.classList.add('bg-primary', 'text-white');
                    btn.classList.remove('bg-slate-200', 'dark:bg-surface-dark', 'text-slate-500');
                    
                    renderTrips(btn.dataset.filter);
                });
            });

            loadHistory();
        });
    </script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
    <script src="js/pwa-register.js"></script>
</body>

</html>
