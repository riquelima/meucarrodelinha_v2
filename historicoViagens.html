<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Histórico</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">
        <!-- Header -->
        <header
            class="flex items-center justify-between bg-white dark:bg-[#121520] p-4 shadow-sm z-20 shrink-0 border-b border-slate-200 dark:border-slate-800">
            <h1 class="text-lg font-bold">Histórico de Viagens</h1>
            <div class="w-10"></div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pb-24 px-4 pt-6 no-scrollbar">
            <!-- Filter Tabs -->
            <div class="flex gap-2 mb-6">
                <button class="px-4 py-2 rounded-full bg-primary text-white text-xs font-bold">Tudo</button>
                <button
                    class="px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-500 text-xs font-bold">Finalizadas</button>
                <button
                    class="px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-500 text-xs font-bold">Canceladas</button>
            </div>

            <!-- List -->
            <div class="space-y-4">
                <div
                    class="bg-white dark:bg-surface-dark p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="font-bold text-sm">Passageiro: Ana Silva</p>
                            <p class="text-[10px] text-slate-500">Ontem, 18:30 • R$ 15,00</p>
                        </div>
                        <span
                            class="px-2 py-1 rounded-md bg-green-500/10 text-green-500 text-[10px] font-bold uppercase">Finalizada</span>
                    </div>
                    <div class="flex gap-3 text-xs text-slate-500">
                        <div class="flex flex-col items-center gap-1">
                            <span class="size-2 rounded-full bg-primary"></span>
                            <div class="w-0.5 h-4 bg-slate-300"></div>
                            <span class="size-2 rounded-full bg-orange-500"></span>
                        </div>
                        <div class="flex flex-col gap-2">
                            <p class="truncate">Centro, Salinas</p>
                            <p class="truncate">Orla, Salinas</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation Bar (Fixed) -->
        <nav class="fixed bottom-0 left-0 right-0 bg-[#121520] border-t border-slate-800 py-3 z-50 pb-safe pb-4">
            <div class="flex justify-around items-end px-2">
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="motorista.html">
                    <span class="material-symbols-outlined">home</span>
                    <span class="text-[10px] font-bold">Início</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="meusganhos.html">
                    <span class="material-symbols-outlined">payments</span>
                    <span class="text-[10px] font-bold">Ganhos</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="conversasMotorista.html">
                    <span class="material-symbols-outlined">chat</span>
                    <span class="text-[10px] font-bold">Chat</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-primary" href="#">
                    <span class="material-symbols-outlined font-fill">history</span>
                    <span class="text-[10px] font-bold">Histórico</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="perfilMotorista.html">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span class="text-[10px] font-bold">Perfil</span>
                </a>
            </div>
        </nav>
    </div>
    <script src="js/pwa-register.js"></script>
</body>

</html>
