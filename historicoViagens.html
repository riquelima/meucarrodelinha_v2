<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Histórico</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ui-style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

    <!-- Google Maps SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8&libraries=places,marker&loading=async" async defer></script>

    <div class="page-container">
        <!-- Header -->
        <header
            class="flex items-center justify-between bg-black/80 backdrop-blur-md py-3 px-4 shadow-sm z-20 shrink-0 border-b border-white/10 sticky top-0">
            <a href="motorista.html" class="text-white p-2 -ml-2 rounded-full hover:bg-white/20 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-lg font-bold text-white">Histórico de Viagens</h1>
            <div class="w-10"></div>
        </header>

        <!-- Main Content -->
        <main class="page-content px-4 pt-6 no-scrollbar pb-24">
            <!-- Filter Tabs -->
            <div class="flex gap-2 mb-6" id="filter-tabs">
                <button class="filter-btn px-4 py-2 rounded-full bg-primary text-white text-xs font-bold active" data-filter="tudo">Tudo</button>
                <button class="filter-btn px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-500 text-xs font-bold" data-filter="concluida">Finalizadas</button>
                <button class="filter-btn px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-500 text-xs font-bold" data-filter="cancelada">Canceladas</button>
            </div>

            <!-- List -->
            <div id="trips-list" class="space-y-4">
                <div class="flex flex-col items-center justify-center py-20 text-slate-500">
                    <span class="material-symbols-outlined animate-spin text-4xl mb-2">sync</span>
                    <p>Carregando histórico...</p>
                </div>
            </div>
        </main>

        <nav class="fixed-navbar">
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="motorista.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="meusganhos.html">
                <span class="material-symbols-outlined">payments</span>
                <span class="text-[10px] font-bold">Ganhos</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500 relative"
                href="conversasMotorista.html">
                <span class="material-symbols-outlined">chat</span>
                <span class="text-[10px] font-bold">Chat</span>
                <span id="chat-badge"
                    class="chat-badge hidden absolute top-0 right-4 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-background-dark">0</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-primary no-effect" href="historicoViagens.html">
                <span class="material-symbols-outlined font-fill">history</span>
                <span class="text-[10px] font-bold">Histórico</span>
            </a>
            <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="perfilMotorista.html">
                <span class="material-symbols-outlined">account_circle</span>
                <span class="text-[10px] font-bold">Perfil</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = window.supabaseClient;
            const tripsList = document.getElementById('trips-list');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            let allTrips = [];

            // Load User
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'loginMotorista.html';
                return;
            }

            // Load Trips
            async function loadHistory() {
                const { data, error } = await supabase
                    .from('viagens')
                    .select('*, passageiro:usuarios!viagens_passageiro_id_fkey(nome, foto_perfil_url)')
                    .eq('motorista_id', user.id)
                    .order('criado_em', { ascending: false });

                if (error) {
                    console.error("Erro:", error);
                    tripsList.innerHTML = '<p class="text-center text-red-500">Erro ao carregar histórico.</p>';
                    return;
                }

                allTrips = data;
                renderTrips('tudo');
            }

            function renderTrips(filter) {
                tripsList.innerHTML = '';
                const filtered = filter === 'tudo' ? allTrips : allTrips.filter(t => t.status === filter);

                if (filtered.length === 0) {
                    tripsList.innerHTML = '<div class="text-center py-20 text-slate-500"><p>Nenhuma viagem encontrada.</p></div>';
                    return;
                }

                filtered.forEach((trip, index) => {
                    const card = createCard(trip, index);
                    tripsList.appendChild(card);
                });
            }

            function createCard(trip, index) {
                const dateStr = new Date(trip.criado_em).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const passName = trip.passageiro?.nome || 'Passageiro';
                const passPhoto = trip.passageiro?.foto_perfil_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(passName)}&background=random`;
                
                const statusColor = trip.status === 'concluida' ? 'bg-green-500/10 text-green-500' : 
                                   (trip.status === 'cancelada' ? 'bg-red-500/10 text-red-500' : 
                                   (trip.status === 'aceita' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-primary/10 text-primary'));
                
                const statusLabel = trip.status === 'concluida' ? 'Finalizada' : 
                                  trip.status === 'cancelada' ? 'Cancelada' : 
                                  trip.status === 'aceita' ? 'Confirmada' : 'Em andamento';

                // Static Maps URL
                const apiKey = 'AIzaSyCpZFpqrSF2kfWsT7uoCWnXVjagCZANiD8';
                let staticMapUrl = '';
                
                if (trip.origem_lat && trip.destino_lat) {
                    staticMapUrl = `https://maps.googleapis.com/maps/api/staticmap?size=600x300&scale=2&maptype=roadmap&markers=color:blue%7Clabel:A%7C${trip.origem_lat},${trip.origem_lng}&markers=color:red%7Clabel:B%7C${trip.destino_lat},${trip.destino_lng}&path=color:0x1e3fae%7Cweight:5%7C${trip.origem_lat},${trip.origem_lng}%7C${trip.destino_lat},${trip.destino_lng}&key=${apiKey}`;
                } else {
                    staticMapUrl = `https://maps.googleapis.com/maps/api/staticmap?size=600x300&scale=2&maptype=roadmap&markers=color:blue%7Clabel:A%7C${encodeURIComponent(trip.origem_endereco)}&markers=color:red%7Clabel:B%7C${encodeURIComponent(trip.destino_endereco)}&key=${apiKey}`;
                }

                const div = document.createElement('div');
                div.className = "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-lg overflow-hidden animate-slide-up transition-all hover:scale-[1.01]";
                div.style.animationDelay = `${index * 100}ms`;
                
                div.innerHTML = `
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="size-12 rounded-full overflow-hidden border-2 border-primary/20 bg-slate-100 dark:bg-slate-800 flex-shrink-0">
                                    <img src="${passPhoto}" class="size-full object-cover" alt="${passName}" />
                                </div>
                                <div class="min-w-0">
                                    <p class="font-black text-slate-900 dark:text-white truncate text-base leading-tight">${passName}</p>
                                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-0.5">${dateStr}</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-1">
                                <span class="px-2.5 py-1 rounded-full ${statusColor} text-[9px] font-black uppercase tracking-tighter border border-current/10">${statusLabel}</span>
                                <p class="text-lg font-black text-orange-500">R$ ${trip.valor_final?.toFixed(2).replace('.', ',') || '0,00'}</p>
                            </div>
                        </div>
                        
                        <div class="space-y-4 relative pl-7 mb-5">
                            <div class="absolute left-2.5 top-1 bottom-1 w-0.5 bg-slate-100 dark:bg-slate-800/50"></div>
                            <div class="absolute left-[6px] top-1 size-3 rounded-full border-2 border-primary bg-white dark:bg-slate-900"></div>
                            <div class="absolute left-[6px] bottom-1 size-3 bg-orange-500 rounded-sm"></div>
                            
                            <div class="space-y-0.5 min-w-0">
                                <p class="text-[9px] font-black text-slate-400 uppercase leading-none">Origem</p>
                                <p class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate">${trip.origem_endereco}</p>
                            </div>
                            <div class="space-y-0.5 min-w-0">
                                <p class="text-[9px] font-black text-slate-400 uppercase leading-none">Destino</p>
                                <p class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate">${trip.destino_endereco}</p>
                            </div>
                        </div>

                        <div class="h-40 w-full bg-slate-100 dark:bg-slate-800/50 rounded-xl overflow-hidden relative group">
                             <img src="${staticMapUrl}" class="size-full object-cover grayscale-[0.2] group-hover:grayscale-0 transition-all duration-500" alt="Mapa da Rota" />
                             <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent pointer-events-none"></div>
                             <div class="absolute bottom-3 left-4 flex items-center gap-2">
                                 <span class="px-2 py-0.5 bg-primary/90 text-white text-[8px] font-black uppercase rounded shadow-lg backdrop-blur-md">Visualização Rota</span>
                                 <span class="px-2 py-0.5 bg-white/90 dark:bg-slate-900/90 text-primary dark:text-blue-400 text-[8px] font-black uppercase rounded shadow-lg backdrop-blur-md border border-primary/10">Google Maps</span>
                             </div>
                        </div>
                    </div>
                `;
                return div;
            }


            // Filter functionality
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('bg-primary', 'text-white'));
                    filterBtns.forEach(b => b.classList.add('bg-slate-200', 'dark:bg-surface-dark', 'text-slate-500'));
                    
                    btn.classList.add('bg-primary', 'text-white');
                    btn.classList.remove('bg-slate-200', 'dark:bg-surface-dark', 'text-slate-500');
                    
                    renderTrips(btn.dataset.filter);
                });
            });

            loadHistory();
        });
    </script>
    <script src="js/chat-notifications.js"></script>
    <script src="js/ui-transitions.js"></script>
</body>

</html>
