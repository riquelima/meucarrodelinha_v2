<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meu Carro de Linha Salinas - Conversas Motorista</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40ae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                        "surface-dark": "#1c2131",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .font-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">
        <!-- Header -->
        <header
            class="flex items-center justify-between bg-white dark:bg-[#121520] p-4 shadow-sm z-20 shrink-0 border-b border-slate-200 dark:border-slate-800">
            <h1 class="text-lg font-bold">Mensagens</h1>
            <div class="w-10"></div>
        </header>

        <!-- Main Content (Scrollable List) -->
        <main class="flex-1 overflow-y-auto pb-24 px-4 pt-6 no-scrollbar">
            <!-- Active Conversation -->
            <a href="chatMotorista.html"
                class="flex items-center gap-4 p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 shadow-sm mb-4 active:scale-[0.98] transition-all">
                <div class="relative">
                    <div class="size-14 rounded-full border-2 border-primary overflow-hidden">
                        <img src="https://randomuser.me/api/portraits/women/42.jpg" alt="Passageira"
                            class="w-full h-full object-cover">
                    </div>
                    <div
                        class="absolute bottom-0 right-0 size-3.5 bg-green-500 border-2 border-white dark:border-surface-dark rounded-full">
                    </div>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-baseline mb-0.5">
                        <p class="font-bold text-slate-900 dark:text-slate-100 truncate">Mariana Costa</p>
                        <p class="text-[10px] text-primary font-bold">14:05</p>
                    </div>
                    <p class="text-slate-500 dark:text-slate-400 text-sm truncate font-medium">Estou te esperando na
                        esquina...</p>
                </div>
                <div class="size-5 bg-primary rounded-full flex items-center justify-center">
                    <p class="text-[10px] text-white font-bold">1</p>
                </div>
            </a>

            <!-- History -->
            <a href="#"
                class="flex items-center gap-4 p-4 rounded-2xl bg-white/50 dark:bg-surface-dark/50 border border-slate-200/50 dark:border-slate-800/50 mb-3 opacity-90">
                <div class="size-14 rounded-full border-2 border-primary/20 overflow-hidden">
                    <img src="https://randomuser.me/api/portraits/men/85.jpg" alt="Passageiro"
                        class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-baseline mb-0.5">
                        <p class="font-semibold text-slate-900 dark:text-slate-100 truncate">João Santos</p>
                        <p class="text-[10px] text-slate-500">Ontem</p>
                    </div>
                    <p class="text-slate-500 dark:text-slate-400 text-sm truncate">Obrigado pela viagem!</p>
                </div>
            </a>
        </main>

        <!-- Bottom Navigation Bar (Fixed) -->
        <nav class="fixed bottom-0 left-0 right-0 bg-[#121520] border-t border-slate-800 py-3 z-50 pb-safe pb-4">
            <div class="flex justify-around items-end px-2">
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="motorista.html">
                    <span class="material-symbols-outlined">home</span>
                    <span class="text-[10px] font-bold">Início</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="meusganhos.html">
                    <span class="material-symbols-outlined">payments</span>
                    <span class="text-[10px] font-bold">Ganhos</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-primary" href="#">
                    <span class="material-symbols-outlined font-fill">chat</span>
                    <span class="text-[10px] font-bold">Chat</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="historicoViagens.html">
                    <span class="material-symbols-outlined">history</span>
                    <span class="text-[10px] font-bold">Histórico</span>
                </a>
                <a class="flex flex-col items-center gap-1 px-4 py-1 text-slate-500" href="perfilMotorista.html">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span class="text-[10px] font-bold">Perfil</span>
                </a>
            </div>
        </nav>
    </div>
    <script src="js/pwa-register.js"></script>
</body>

</html>
