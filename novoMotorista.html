<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro de Motorista - Meu Carro de Linha Salinas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#193db3",
                        "accent": "#00d4ff",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="sticky top-0 z-50 flex items-center bg-background-light dark:bg-background-dark px-4 h-16 border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-start w-12">
<a href="admin.html" class="flex items-center justify-center -ml-2 p-2 text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-[28px]">chevron_left</span>
</a>
</div>
<div class="flex-1 flex justify-center">
<h1 class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight tracking-tight">Novo Motorista</h1>
</div>
<div class="w-12"></div>
</div>
<div class="flex flex-col gap-6 px-4 py-8 pb-32">
<div class="space-y-4">
<label class="flex flex-col">
<span class="text-slate-800 dark:text-slate-200 text-sm font-semibold mb-2">Nome Completo</span>
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base" placeholder="Digite o nome do motorista" type="text"/>
</label>
<div class="grid grid-cols-2 gap-4">
<label class="flex flex-col">
<span class="text-slate-800 dark:text-slate-200 text-sm font-semibold mb-2">CPF</span>
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base" placeholder="000.000.000-00" type="text"/>
</label>
<label class="flex flex-col">
<span class="text-slate-800 dark:text-slate-200 text-sm font-semibold mb-2">Telefone</span>
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base" placeholder="(00) 00000-0000" type="tel"/>
</label>
</div>
</div>
<div class="pt-2">
<h3 class="text-slate-500 dark:text-accent text-xs font-bold uppercase tracking-widest mb-4">Dados do Veículo</h3>
<div class="space-y-4">
<label class="flex flex-col">
<span class="text-slate-800 dark:text-slate-200 text-sm font-semibold mb-2">Modelo do Veículo</span>
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base" placeholder="Ex: Toyota Corolla 2023" type="text"/>
</label>
<label class="flex flex-col">
<span class="text-slate-800 dark:text-slate-200 text-sm font-semibold mb-2">Placa</span>
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base uppercase" placeholder="ABC-1234" type="text"/>
</label>
</div>
</div>
<div class="pt-2">
<h3 class="text-slate-500 dark:text-accent text-xs font-bold uppercase tracking-widest mb-4">Documentação</h3>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col items-center justify-center p-6 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/30 text-center cursor-pointer hover:border-primary transition-colors">
<span class="material-symbols-outlined text-primary mb-2 text-3xl">badge</span>
<span class="text-xs font-medium text-slate-700 dark:text-slate-300">CNH</span>
<span class="text-[10px] text-slate-500 dark:text-slate-500 mt-1">Clique para enviar</span>
</div>
<div class="flex flex-col items-center justify-center p-6 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/30 text-center cursor-pointer hover:border-primary transition-colors">
<span class="material-symbols-outlined text-primary mb-2 text-3xl">description</span>
<span class="text-xs font-medium text-slate-700 dark:text-slate-300">Doc. Veículo</span>
<span class="text-[10px] text-slate-500 dark:text-slate-500 mt-1">Clique para enviar</span>
</div>
</div>
</div>
<div class="flex items-start gap-3 mt-2 mb-8">
<input class="rounded text-primary focus:ring-primary mt-1 border-slate-300 dark:border-slate-700 bg-transparent" type="checkbox"/>
<p class="text-sm text-slate-600 dark:text-slate-400 leading-snug">
                Confirmo que verifiquei todos os documentos originais e o motorista está apto para operar.
            </p>
</div>
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] mb-8">
<span class="material-symbols-outlined">person_add</span>
            Cadastrar Motorista
        </button>
</div>
<!-- Fixed Bottom Navbar -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl px-4 pb-6 pt-2 z-50">
<div class="flex gap-2 max-w-lg mx-auto">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="admin.html">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">dashboard</span>
</div>
<p class="text-[10px] font-bold leading-normal tracking-tight">Painel</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="gerenciarUsuarios.html">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">group</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-tight">Usuários</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="historicoGeral.html">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">route</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-tight">Corridas</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="perfilAdministrador.html">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-tight">Ajustes</p>
</a>
</div>
</nav>
</body></html>
